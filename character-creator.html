        const tagsDiv = document.createElement('div'); tagsDiv.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';
        for (const opt of entry.options) {

          const tag = document.createElement('span');
          tag.className = 'tag' + (isChosen ? ' sel-class' : '');
          tag.style.cssText = 'cursor:pointer;user-select:none;' + (atMax ? 'opacity:0.4;cursor:not-allowed;' : '');

          const nameNode = document.createTextNode(opt.name);
          tag.appendChild(nameNode);

          if (opt.src) {
            const srcSpan = document.createElement('span');

    // Class Table (PHB p.47 style) — collapsible
    {
      const tblCard=document.createElement('div'); tblCard.className='card'; tblCard.style.marginBottom='14px';
      const tblHdr=document.createElement('div'); tblHdr.style.cssText='display:flex;justify-content:space-between;align-items:center;cursor:pointer;';
      tblHdr.innerHTML=`<div class="label" style="margin-bottom:0;">Class Table (All 20 Levels)</div><span style="color:var(--parchment-dim);font-size:12px;" id="cls-table-toggle">▶ Show</span>`;
      const tblBody=document.createElement('div'); tblBody.style.display='none'; tblBody.style.marginTop='10px'; tblBody.style.overflowX='auto';
      let tblOpen=false;
      tblHdr.addEventListener('click',()=>{tblOpen=!tblOpen;tblBody.style.display=tblOpen?'block':'none';tblHdr.querySelector('#cls-table-toggle').textContent=tblOpen?'▼ Hide':'▶ Show';});
      // Determine slot array for this class
      const casterType=(()=>{
        if(!cls.caster) return null;
        if(['Wizard','Cleric','Druid','Bard','Sorcerer','Warlock (partial)'].includes(C.cls)) return 'full';
        if(C.cls==='Warlock') return 'warlock';

      })();
      const slotLabels=casterType==='warlock'?['Slots','Slot Lvl']:casterType==='full'||casterType==='half'||casterType==='art'?['1st','2nd','3rd','4th','5th','6th','7th','8th','9th']:[];
      const table=document.createElement('table');
      table.style.cssText='width:100%;border-collapse:collapse;font-size:11px;';

      const hr=document.createElement('tr');

      for(const h of ths){const th=document.createElement('th');th.style.cssText='text-align:left;padding:4px 6px;font-family:Cinzel,serif;font-size:9px;color:var(--gold);border-bottom:1px solid var(--border);white-space:nowrap;';th.textContent=h;hr.appendChild(th);}
      thead.appendChild(hr); table.appendChild(thead);
      const tbody=document.createElement('tbody');
      for(let lvl=1;lvl<=20;lvl++){
        const isCurrent=lvl===C.level;
        const tr=document.createElement('tr');
        tr.style.cssText=`border-bottom:1px solid rgba(184,134,11,0.1);${isCurrent?'background:rgba(201,168,76,0.12);':''}`;
        const profB2=Math.ceil(lvl/4)+1;
        const featureNames=(cls.feats&&cls.feats[lvl])||[];
        const allASI=ASI_LEVELS[C.cls]||DEFAULT_ASI_LEVELS;
        const featureStrs=[...featureNames,...(allASI.includes(lvl)?['ASI']:[]),(lvl===(SUBCLASS_LVL[C.cls]||3))?'Subclass':''].filter(Boolean);
        let slotCells=[];
        if(casterType==='full'&&FULL_SLOTS[lvl-1]) slotCells=FULL_SLOTS[lvl-1].map(String);
        else if(casterType==='half'&&HALF_SLOTS[lvl-1]) slotCells=HALF_SLOTS[lvl-1].map(String);
        else if(casterType==='art'&&ART_SLOTS[lvl-1]) slotCells=ART_SLOTS[lvl-1].map(String);
        else if(casterType==='warlock'&&WARLOCK_SLOTS[lvl-1]) slotCells=WARLOCK_SLOTS[lvl-1].map(String);
        // Pad slot cells to match header count
        while(slotCells.length<slotLabels.length) slotCells.push('—');
        const cells=[`${isCurrent?'▶ ':''}${lvl}`,`+${profB2}`,featureStrs.join(', ')||'—',...slotCells];
        for(let i=0;i<cells.length;i++){
          const td=document.createElement('td');
          td.style.cssText=`padding:4px 6px;${isCurrent?'color:var(--gold);font-weight:600;':'color:var(--parchment-dim);'}${i===0?'font-family:Cinzel,serif;':''}`;
          td.textContent=cells[i]; tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody); tblBody.appendChild(table);
      tblCard.appendChild(tblHdr); tblCard.appendChild(tblBody);
      el.appendChild(tblCard);

  }

  // ── Multiclassing Section ──────────────────────────────────────────────────
  if (C.cls) {
    const mcSection = document.createElement('div'); mcSection.style.marginTop='20px';
    const mcTitleRow = document.createElement('div'); mcTitleRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;border-top:1px solid var(--border);padding-top:16px;';

    mcTitleRow.innerHTML=`<div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);">⊕ Multiclassing <span style="font-size:10px;color:var(--parchment-dim);font-family:Lora,serif;">(PHB p.163)</span></div><span style="font-size:11px;color:${totalLvl>=20?'#e07a50':'var(--parchment-dim)'};">Total Character Level: ${totalLvl}/20</span>`;
    mcSection.appendChild(mcTitleRow);

    // Render each multiclass entry
    (C.multiclasses||[]).forEach((mc, mci) => {
      const mcCard = document.createElement('div'); mcCard.className='card'; mcCard.style.cssText='margin-bottom:12px;border-left:3px solid var(--gold);';
      // Header
      const mcHdr = document.createElement('div'); mcHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;';
      const mcTitle = document.createElement('div'); mcTitle.style.cssText="font-family:'Cinzel',serif;font-size:12px;color:var(--gold);";
      mcTitle.textContent = (mc.cls||'New Multiclass') + (mc.level>1?` — Class Lv${mc.level}`:'');
      const removeBtn = document.createElement('button'); removeBtn.className='btn-sm'; removeBtn.textContent='✕ Remove';
      removeBtn.addEventListener('click',()=>{ C.multiclasses=(C.multiclasses||[]).filter((_,i)=>i!==mci); render(); });
      mcHdr.appendChild(mcTitle); mcHdr.appendChild(removeBtn); mcCard.appendChild(mcHdr);

      // Class + level selectors
      const mcG2 = document.createElement('div'); mcG2.className='g2';
      // Class selector
      const mcClsWrap = document.createElement('div'); mcClsWrap.style.marginBottom='14px';
      mcClsWrap.innerHTML='<div class="label">Class</div>';
      const mcClsSel = document.createElement('select');
      mcClsSel.innerHTML='<option value="">Select class...</option>';
      const excludedCls = [C.cls, ...(C.multiclasses||[]).filter((_,i)=>i!==mci).map(m=>m.cls)];
      for (const c of Object.keys(CLASSES)) {
        if (excludedCls.includes(c)) continue;
        const ok = meetsMulticlassPrereq(c);
        const op = document.createElement('option'); op.value=c;
        op.textContent = c + (ok?'':' ⚠');
        if (c===mc.cls) op.selected=true;
        mcClsSel.appendChild(op);
      }
      mcClsSel.addEventListener('change',e=>{ C.multiclasses[mci]={cls:e.target.value,level:1,subclass:'',classSkills:[],classChoices:{},subclassChoices:{}}; render(); });
      mcClsWrap.appendChild(mcClsSel); mcG2.appendChild(mcClsWrap);

      // Level selector
      const otherLevels = C.level + (C.multiclasses||[]).filter((m,i)=>i!==mci&&m.cls).reduce((s,m)=>s+(m.level||0),0);
      const maxMcLvl = Math.max(1, 20 - otherLevels);
      const mcLvlWrap = document.createElement('div'); mcLvlWrap.style.marginBottom='14px';
      mcLvlWrap.innerHTML='<div class="label">Class Level</div>';
      const mcLvlSel = document.createElement('select');
      for (let i=1;i<=maxMcLvl;i++) { const op=document.createElement('option');op.value=i;op.textContent='Level '+i;if(i===mc.level)op.selected=true;mcLvlSel.appendChild(op); }
      mcLvlSel.addEventListener('change',e=>{ C.multiclasses[mci].level=parseInt(e.target.value); render(); });
      mcLvlWrap.appendChild(mcLvlSel); mcG2.appendChild(mcLvlWrap);
      mcCard.appendChild(mcG2);

      if (mc.cls) {
        // Prereq warning
        if (!meetsMulticlassPrereq(mc.cls)) {
          const warn = document.createElement('div'); warn.style.cssText='font-size:11px;color:#e07a50;margin-bottom:10px;padding:6px 10px;background:rgba(224,122,80,0.1);border-radius:4px;';
          warn.textContent=`⚠ Prerequisite not met: ${prereqStr(mc.cls)}`;
          mcCard.appendChild(warn);
        }
        // Barbarian+Monk conflict
        const allClsNames = getAllClasses().map(e=>e.cls);
        if ((mc.cls==='Barbarian'||mc.cls==='Monk') && allClsNames.includes('Barbarian') && allClsNames.includes('Monk')) {
          const warn2 = document.createElement('div'); warn2.style.cssText='font-size:11px;color:#e0c050;margin-bottom:10px;padding:6px 10px;background:rgba(224,192,80,0.1);border-radius:4px;';
          warn2.textContent='⚠ Barbarian and Monk Unarmored Defense features cannot be combined (PHB p.164).';
          mcCard.appendChild(warn2);
        }
        // Multiclass proficiency info
        const mcProfs = MC_PROFS[mc.cls]||{};
        const profLines=[];
        if (mcProfs.armor?.length) profLines.push('Armor: '+mcProfs.armor.join(', '));
        if (mcProfs.weapons?.length) profLines.push('Weapons: '+mcProfs.weapons.join(', '));
        if (mcProfs.skills) profLines.push(mcProfs.skills+' skill from class list');
        if (mcProfs.tools?.length) profLines.push('Tools: '+mcProfs.tools.join(', '));
        if (mcProfs.instruments) profLines.push('1 musical instrument');
        const profNote = document.createElement('div'); profNote.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:10px;';
        profNote.innerHTML=profLines.length?`<strong style="color:var(--gold);">Multiclass Proficiencies:</strong> ${profLines.join(' · ')}`:'No additional proficiencies from multiclassing into this class.';
        mcCard.appendChild(profNote);

        // Subclass selector
        const mcSubLvl = SUBCLASS_LVL[mc.cls]||3;
        if (mc.level >= mcSubLvl) {
          const subSel = mkSelect('Subclass',(CLASSES[mc.cls].sub||[]).map(s=>({v:s,l:s})),mc.subclass,v=>{ C.multiclasses[mci].subclass=v; C.multiclasses[mci].subclassChoices={}; render(); },'Select subclass...');
          mcCard.appendChild(subSel);
        } else {
          const lockDiv=document.createElement('div'); lockDiv.style.marginBottom='14px';
          lockDiv.innerHTML=`<div class="label">Subclass</div><div style="font-size:11px;color:var(--parchment-dim);padding:6px 10px;border:1px solid var(--border);border-radius:6px;">Unlocks at class level ${mcSubLvl}</div>`;

          for (const s of skillOpts) {
            const alreadyHas = existingSkillsWithoutThis.includes(s);
            const sp=document.createElement('span');
            sp.className='tag'+((mc.classSkills||[]).includes(s)?' sel-class':'');
            if (alreadyHas){sp.style.cssText='opacity:0.35;cursor:not-allowed;';sp.title='Already proficient';}
            sp.textContent=s;
            sp.addEventListener('click',()=>{
              if (alreadyHas) return;
              const cur=C.multiclasses[mci].classSkills||[];
              if (cur.includes(s)) C.multiclasses[mci].classSkills=cur.filter(x=>x!==s);
              else if (cur.length<(mcProfs.skills||0)) C.multiclasses[mci].classSkills=[...cur,s];
              render();

            skillDiv.appendChild(sp);

        // Class choices (fighting styles, etc.)
        const mcChoiceDefs=(CLASS_CHOICES[mc.cls]||[]).filter(e=>{
          if((e.counts[mc.level-1]||0)===0) return false;
          if(e.requiresChoice){const dep=(mc.classChoices||{})[e.requiresChoice.key]||[];if(!dep.includes(e.requiresChoice.value))return false;}

            const sec=document.createElement('div'); sec.style.marginBottom='10px';
            const hdrR=document.createElement('div'); hdrR.style.cssText='display:flex;justify-content:space-between;margin-bottom:4px;';
            hdrR.innerHTML=`<span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold);">${entry.label}</span><span style="font-size:11px;color:${chosen.length>=count?'#6abf6a':'var(--parchment-dim)'};">${chosen.length}/${count}</span>`;
            sec.appendChild(hdrR);
            const tagsDiv=document.createElement('div'); tagsDiv.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';
            const mcAllProfs = getAllSkillProfs();
            for (const opt of entry.options) {
              if (entry.isExpertise && ALL_SKILLS.includes(opt.name) && !mcAllProfs.includes(opt.name)) continue;
              const isChosen=chosen.includes(opt.name); const atMax=chosen.length>=count&&!isChosen;
              const tag=document.createElement('span'); tag.className='tag'+(isChosen?' sel-class':'');
              tag.style.cssText='cursor:pointer;'+(atMax?'opacity:0.4;cursor:not-allowed;':'');
              tag.textContent=opt.name;
              if (opt.desc){const info=document.createElement('span');info.textContent=' ⓘ';info.style.cssText='font-size:9px;cursor:pointer;color:var(--gold);';info.addEventListener('click',e2=>{e2.stopPropagation();showPopup(opt.name,opt.desc,opt.src||'PHB');});tag.appendChild(info);}
              tag.addEventListener('click',()=>{
                if (!C.multiclasses[mci].classChoices) C.multiclasses[mci].classChoices={};
                const cur2=(C.multiclasses[mci].classChoices||{})[entry.key]||[];
                if (cur2.includes(opt.name)) C.multiclasses[mci].classChoices[entry.key]=cur2.filter(n=>n!==opt.name);
                else if (cur2.length<count) C.multiclasses[mci].classChoices[entry.key]=[...cur2,opt.name];
                render();

              tagsDiv.appendChild(tag);

        // Subclass features (condensed)

          scDiv.innerHTML=`<div class="label" style="margin-bottom:4px;">${mc.subclass}</div>`;
          for (const f of (si.feats||[]).filter(f=>f.lvl<=mc.level)) {
            const fr=document.createElement('div'); fr.style.cssText='font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);cursor:pointer;';
            fr.innerHTML=`<span style="font-family:'Cinzel',serif;color:var(--gold);font-size:9px;">Lv${f.lvl} </span><span style="color:var(--gold);">${f.name}</span>`;
            fr.addEventListener('click',()=>showPopup(f.name,f.desc,si.src||'PHB'));
            scDiv.appendChild(fr);
          }
          mcCard.appendChild(scDiv);
        }

        // Subclass choice pickers for MC entry
        const mcScChoiceDefs = ((SUBCLASS_CHOICES[mc.cls]||{})[mc.subclass]||[]).filter(e=>(e.counts[mc.level-1]||0)>0);
        if (mcScChoiceDefs.length) {
          const mcScCard=document.createElement('div'); mcScCard.style.cssText='margin-top:8px;';
          mcScCard.innerHTML='<div class="label" style="margin-bottom:8px;">Subclass Choices</div>';
          for (const entry of mcScChoiceDefs) {
            const count=entry.counts[mc.level-1]||0;
            const chosen=(mc.subclassChoices||{})[entry.key]||[];
            const sec=document.createElement('div'); sec.style.marginBottom='10px';
            const hdrR=document.createElement('div'); hdrR.style.cssText='display:flex;justify-content:space-between;margin-bottom:4px;';
            hdrR.innerHTML=`<span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold);">${entry.label}</span><span style="font-size:11px;color:${chosen.length>=count?'#6abf6a':'var(--parchment-dim)'};">${chosen.length}/${count}</span>`;
            sec.appendChild(hdrR);
            if (entry.help) {
              const helpEl=document.createElement('div'); helpEl.style.cssText='font-size:10px;color:var(--parchment-dim);margin-bottom:6px;';
              helpEl.textContent=entry.help; sec.appendChild(helpEl);
            }
            if (entry.isExpertise) {
              const note=document.createElement('div'); note.style.cssText='font-size:10px;color:var(--gold);margin-bottom:6px;opacity:0.8;';
              note.textContent='★ Only skills you are already proficient in can be chosen.'; sec.appendChild(note);
            }
            const tagsDiv2=document.createElement('div'); tagsDiv2.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';
            const mcScAllProfs=getAllSkillProfs();
            const mcScPotentialSkills=((SUBCLASS_CHOICES[mc.cls]||{})[mc.subclass]||[])
              .filter(d=>d.isSkillGrant&&(d.counts[mc.level-1]||0)>0&&d.key!==entry.key)
              .flatMap(d=>(d.options||[]).map(o=>o.name).filter(n=>ALL_SKILLS.includes(n)));
            for (const opt of entry.options) {
              if (entry.isExpertise && ALL_SKILLS.includes(opt.name) && !mcScAllProfs.includes(opt.name) && !mcScPotentialSkills.includes(opt.name)) continue;
              const isChosen=chosen.includes(opt.name); const atMax=chosen.length>=count&&!isChosen;
              const tag=document.createElement('span'); tag.className='tag'+(isChosen?' sel-class':'');
              tag.style.cssText='cursor:pointer;user-select:none;'+(atMax?'opacity:0.4;cursor:not-allowed;':'');
              tag.textContent=opt.name;
              if (opt.desc){const info=document.createElement('span');info.textContent=' ⓘ';info.style.cssText='font-size:9px;cursor:pointer;color:var(--gold);';info.addEventListener('click',e2=>{e2.stopPropagation();showPopup(opt.name,opt.desc,opt.src||'PHB');});tag.appendChild(info);}
              tag.addEventListener('click',()=>{
                if (!C.multiclasses[mci].subclassChoices) C.multiclasses[mci].subclassChoices={};
                const cur3=(C.multiclasses[mci].subclassChoices||{})[entry.key]||[];
                if (cur3.includes(opt.name)) C.multiclasses[mci].subclassChoices[entry.key]=cur3.filter(n=>n!==opt.name);
                else if (cur3.length<count) C.multiclasses[mci].subclassChoices[entry.key]=[...cur3,opt.name];
                render();
              });
              tagsDiv2.appendChild(tag);
            }
            sec.appendChild(tagsDiv2); mcScCard.appendChild(sec);
          }
          mcCard.appendChild(mcScCard);
        }
      }
      mcSection.appendChild(mcCard);
    });

    // Add multiclass button
    const hasPendingEmpty = (C.multiclasses||[]).some(m=>!m.cls);
    const canAdd = totalLvl < 20 && !hasPendingEmpty && (C.multiclasses||[]).filter(m=>m.cls).length < Object.keys(CLASSES).length - 1;
    const addBtn=document.createElement('button'); addBtn.className='btn-sm'; addBtn.style.marginTop='4px';
    addBtn.textContent='+ Add Multiclass';
    addBtn.disabled=!canAdd;
    if (totalLvl>=20) addBtn.title='Character level is already 20';
    addBtn.addEventListener('click',()=>{ if(!C.multiclasses)C.multiclasses=[]; C.multiclasses.push({cls:'',level:1,subclass:'',classSkills:[],classChoices:{},subclassChoices:{}}); render(); });
    mcSection.appendChild(addBtn);
    el.appendChild(mcSection);
  }
}

      sk1.addEventListener('change',e=>{cb.skills[0]=e.target.value;});
      sk1Wrap.appendChild(sk1); g.appendChild(sk1Wrap);
      // Skill 2
      const sk2Wrap=document.createElement('div');
      sk2Wrap.innerHTML=`<div class="label">Skill Proficiency 2</div>`;
      const sk2=document.createElement('select');
      sk2.innerHTML=`<option value="">— Choose skill —</option>`+ALL_SKILLS.map(s=>`<option value="${s}"${cb.skills[1]===s?' selected':''}>${s}</option>`).join('');
      sk2.addEventListener('change',e=>{cb.skills[1]=e.target.value;});
      sk2Wrap.appendChild(sk2); g.appendChild(sk2Wrap);
      // Tool/language slots
      const toolsAll=['Alchemist\'s supplies','Brewer\'s supplies','Calligrapher\'s supplies','Carpenter\'s tools','Cobbler\'s tools','Cook\'s utensils','Glassblower\'s tools','Jeweler\'s tools','Leatherworker\'s tools','Mason\'s tools','Painter\'s supplies','Potter\'s tools','Smith\'s tools','Tinker\'s tools','Weaver\'s tools','Woodcarver\'s tools','Disguise kit','Forgery kit','Herbalism kit',"Navigator's tools","Poisoner's kit","Thieves' tools",'Bagpipes','Drum','Dulcimer','Flute','Lute','Lyre','Horn','Pan flute','Shawm','Viol'];
      const langsAll=['Abyssal','Celestial','Deep Speech','Draconic','Dwarvish','Elvish','Giant','Gnomish','Goblin','Halfling','Infernal','Orc','Primordial','Sylvan','Undercommon'];
      const tlOpts=[...toolsAll,...langsAll];
      const tl1Wrap=document.createElement('div'); tl1Wrap.innerHTML=`<div class="label">Tool / Language 1</div>`;
      const tl1=document.createElement('select'); tl1.innerHTML=`<option value="">— Choose —</option>`+tlOpts.map(o=>`<option value="${o}"${cb.tool1===o?' selected':''}>${o}</option>`).join('');
      tl1.addEventListener('change',e=>{cb.tool1=e.target.value;});
      tl1Wrap.appendChild(tl1); g.appendChild(tl1Wrap);
      const tl2Wrap=document.createElement('div'); tl2Wrap.innerHTML=`<div class="label">Tool / Language 2</div>`;
      const tl2=document.createElement('select'); tl2.innerHTML=`<option value="">— Choose —</option>`+tlOpts.map(o=>`<option value="${o}"${cb.tool2===o?' selected':''}>${o}</option>`).join('');
      tl2.addEventListener('change',e=>{cb.tool2=e.target.value;});
      tl2Wrap.appendChild(tl2); g.appendChild(tl2Wrap);
      card.appendChild(g);
      // Feature name
      const fWrap=document.createElement('div'); fWrap.style.marginTop='12px';
      fWrap.innerHTML=`<div class="label">Background Feature Name</div>`;
      const fInp=document.createElement('input'); fInp.type='text'; fInp.value=cb.feature; fInp.placeholder='e.g. "Insider Knowledge", "Criminal Contact"...';
      fInp.addEventListener('input',e=>{cb.feature=e.target.value;});

        s1.appendChild(conflictNote);

          // All skills already held: race + class + other bg skills (not this conflict) + other replacement choices (not this slot)

          const alreadyHeld=new Set([...raceSkillsNow,...clsSkillsNow,...bg.skills.filter(s=>s!==sk),...otherReplacements]);
          rSel.innerHTML=`<option value="">— Choose replacement —</option>`+ALL_SKILLS.map(s=>{
            const isChosen=C.bgSkillReplacements[sk]===s;

          rSel.addEventListener('change',e=>{if(!C.bgSkillReplacements)C.bgSkillReplacements={};C.bgSkillReplacements[sk]=e.target.value||null;render();});
          rWrap.appendChild(rLbl); rWrap.appendChild(rSel); s1.appendChild(rWrap);

      // Tool proficiencies — with pickers for vague entries
      const s2=document.createElement('div');
      s2.innerHTML=`<div class="label">Tool Proficiencies</div>`;
      if (!C.bgToolChoices) C.bgToolChoices = {};
      if (bg.tools.length===0) {
        const none=document.createElement('div'); none.style.cssText='font-size:13px;'; none.textContent='None'; s2.appendChild(none);
      } else {
        for (const tool of bg.tools) {

          if (opts) {

            sel.addEventListener('change',e=>{C.bgToolChoices[tool]=e.target.value||null;});

            const d=document.createElement('div'); d.style.cssText='font-size:13px;'; d.textContent=tool; s2.appendChild(d);
          }
        }
      }
      // Language choices
      const s3=document.createElement('div');
      s3.innerHTML=`<div class="label">Languages</div>`;
      if (!C.bgLangChoices) C.bgLangChoices = [];
      if (bg.langs<=0) {
        const none=document.createElement('div'); none.style.cssText='font-size:13px;'; none.textContent='None'; s3.appendChild(none);
      } else {
        const racialExtraLangs=Object.entries(C.racialChoices||{}).filter(([k])=>k.toLowerCase().includes('lang')).map(([,v])=>v).filter(Boolean);
        const alreadyKnown=new Set([...(RACE_LANGS[C.race]||['Common']),...racialExtraLangs]);
        for (let i=0;i<bg.langs;i++){
          const li=i;
          const sel=document.createElement('select'); sel.style.cssText='font-size:12px;width:100%;margin-bottom:4px;';
          const otherChosen=new Set(C.bgLangChoices.filter((v,idx)=>idx!==li&&v));
          sel.innerHTML=`<option value="">— Choose language ${bg.langs>1?li+1:''} —</option>`+LANGUAGES.map(l=>{
            const taken=alreadyKnown.has(l)||otherChosen.has(l);
            return`<option value="${l}"${C.bgLangChoices[li]===l?' selected':''}${taken?' disabled':''} style="${taken?'color:#666;':''}">${l}${taken?' (already known)':''}</option>`;
          }).join('');
          sel.addEventListener('change',e=>{
            if(!C.bgLangChoices) C.bgLangChoices=[];
            C.bgLangChoices[li]=e.target.value||null;
            render();
          });
          s3.appendChild(sel);
        }
      }
      // Feature with clickable popup
      const s4=document.createElement('div');
      const featDesc=BG_FEATURE_DESC[bg.feature];
      s4.innerHTML=`<div class="label">Feature</div>`;
      const featSpan=document.createElement('span');
      featSpan.style.cssText=`font-size:14px;font-weight:600;color:var(--gold);${featDesc?'cursor:pointer;text-decoration:underline dotted;':''}`;
      featSpan.textContent=bg.feature;
      if(featDesc) featSpan.addEventListener('click',()=>showPopup(bg.feature, featDesc, 'PHB'));
      s4.appendChild(featSpan);
      if(featDesc){ const info=document.createElement('span'); info.style.cssText='font-size:11px;color:var(--parchment-dim);margin-left:6px;cursor:pointer;'; info.textContent='ⓘ'; info.addEventListener('click',()=>showPopup(bg.feature, featDesc, 'PHB')); s4.appendChild(info); }
      g.appendChild(s1);g.appendChild(s2);g.appendChild(s3);g.appendChild(s4);
      card.appendChild(g); el.appendChild(card);
    }
  }
}

function renderAbility(el) {
  const title=document.createElement('div'); title.className='step-title'; title.textContent='Set Ability Scores';
  el.appendChild(title);
  const race=RACES[C.race]||{bonus:{}};
  const subObj=(race.sub||[]).find(s=>s.name===C.subrace);
  const subBonus=subObj?subObj.bonus:{};
  const activeFlex2 = race.flexBonus || (subObj && subObj.flexBonus);
  const totalBonus=ab=>(race.bonus[ab]||0)+(subBonus[ab]||0)+(activeFlex2?(C.racialFlexChoices||[]).filter(x=>x===ab).length:0);
  const methods=['standard','pointbuy','manual'];
  const mBar=document.createElement('div'); mBar.style.cssText='display:flex;gap:8px;margin-bottom:18px;';
  for(const m of methods){
    const b=document.createElement('button');
    b.textContent=m==='standard'?'Standard Array':m==='pointbuy'?'Point Buy':'Manual Entry';
    if(C.method===m) b.className='btn-primary';
    b.addEventListener('click',()=>{
      C.method=m;
      if(m==='pointbuy'){ for(const ab of ABS){ if(C.scores[ab]<8) C.scores[ab]=10; } }
      render();
    });
    mBar.appendChild(b);
  }
  el.appendChild(mBar);

  if(C.method==='standard'){
    const card=document.createElement('div'); card.className='card'; card.style.marginBottom='14px';
    card.innerHTML=`<div class="label" style="margin-bottom:12px;">Assign [15, 14, 13, 12, 10, 8] to each ability</div>`;
    const g=document.createElement('div'); g.className='g3';
    const stdSels={};
    const updateStdOptions=()=>{
      const used=new Set(ABS.map(a=>C.scores[a]).filter(v=>STD.includes(v)));
      for(const a of ABS){
        const cur=C.scores[a];
        stdSels[a].innerHTML=`<option value="">—</option>`+STD.map(n=>{
          if(n!==cur && used.has(n)) return '';
          return `<option value="${n}"${cur===n?' selected':''}>${n}</option>`;
        }).join('');
      }
    };
    for(const ab of ABS){
      const d=document.createElement('div');
      d.innerHTML=`<div class="label">${ab}</div>`;
      const sel=document.createElement('select');
      stdSels[ab]=sel;
      const tb=totalBonus(ab);
      const note=document.createElement('div'); note.style.cssText='font-size:11px;color:var(--gold);margin-top:3px;';
      const updateNote=()=>{ note.textContent=(tb&&STD.includes(C.scores[ab]))?`+${tb} racial → ${C.scores[ab]+tb}`:''; };
      sel.addEventListener('change',e=>{
        const newVal=parseInt(e.target.value)||0;
        // bump any other ability that already holds this value
        if(STD.includes(newVal)){ for(const other of ABS){ if(other!==ab && C.scores[other]===newVal) C.scores[other]=0; } }
        C.scores[ab]=newVal;
        updateStdOptions();
        updateNote();
        renderFinalRow();
      });
      d.appendChild(sel);
      if(tb) d.appendChild(note);
      g.appendChild(d);
    }
    updateStdOptions();
    card.appendChild(g); el.appendChild(card);
  }

  if(C.method==='pointbuy'){
    const ptCost=s=>s<=13?s-8:(s-13)*2+5;
    const card=document.createElement('div'); card.className='card'; card.style.marginBottom='14px';
    const totalSpent=()=>ABS.reduce((a,ab)=>a+ptCost(C.scores[ab]),0);
    const hdr=document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;margin-bottom:14px;';
    const spent=document.createElement('span'); spent.id='pt-spent'; spent.style.fontSize='13px';
    const updateSpent=()=>{ const t=totalSpent(); spent.textContent=`${t}/27 spent`; spent.style.color=t>27?'var(--red)':'var(--green)'; };
    hdr.innerHTML='<div class="label" style="margin-bottom:0;">Point Buy — 27 Points</div>';
    hdr.appendChild(spent); card.appendChild(hdr);
    for(const ab of ABS){
      const row=document.createElement('div'); row.className='pb-row';
      const lbl=document.createElement('div'); lbl.style.cssText='width:40px;font-family:Cinzel,serif;font-size:11px;color:var(--gold);'; lbl.textContent=ab;
      const bminus=document.createElement('button'); bminus.className='btn-sm'; bminus.textContent='−';
      const scoreEl=document.createElement('div'); scoreEl.className='pb-score'; scoreEl.textContent=C.scores[ab];
      const bplus=document.createElement('button'); bplus.className='btn-sm'; bplus.textContent='+';
      const cost=document.createElement('span'); cost.style.cssText='font-size:11px;color:var(--parchment-dim);'; cost.textContent=`cost ${ptCost(C.scores[ab])}`;
      const tb=totalBonus(ab);
      const note=document.createElement('span'); note.style.cssText='font-size:11px;color:var(--gold);';
      const updatePbNote=()=>{ note.textContent=tb?`+${tb} racial → ${C.scores[ab]+tb}`:''; };
      updatePbNote();
      bminus.addEventListener('click',()=>{if(C.scores[ab]>8){C.scores[ab]--;scoreEl.textContent=C.scores[ab];cost.textContent=`cost ${ptCost(C.scores[ab])}`;updatePbNote();updateSpent();renderFinalRow();}});
      bplus.addEventListener('click',()=>{if(C.scores[ab]<15&&totalSpent()+ptCost(C.scores[ab]+1)-ptCost(C.scores[ab])<=27){C.scores[ab]++;scoreEl.textContent=C.scores[ab];cost.textContent=`cost ${ptCost(C.scores[ab])}`;updatePbNote();updateSpent();renderFinalRow();}});
      row.appendChild(lbl);row.appendChild(bminus);row.appendChild(scoreEl);row.appendChild(bplus);row.appendChild(cost);
      if(tb) row.appendChild(note);
      card.appendChild(row);
    }
    updateSpent(); el.appendChild(card);
  }

  if(C.method==='manual'){
    const card=document.createElement('div'); card.className='card'; card.style.marginBottom='14px';
    card.innerHTML=`<div class="label" style="margin-bottom:12px;">Enter scores manually (before racial bonuses)</div>`;
    const g=document.createElement('div'); g.className='g3';
    for(const ab of ABS){
      const d=document.createElement('div');
      d.innerHTML=`<div class="label">${ab}</div>`;
      const inp=document.createElement('input'); inp.type='number'; inp.min='1'; inp.max='30'; inp.value=C.scores[ab]; inp.style.textAlign='center';
      inp.addEventListener('input',e=>{C.scores[ab]=parseInt(e.target.value)||10;renderFinalRow();});
      d.appendChild(inp);
      const tb=totalBonus(ab);
      if(tb){const note=document.createElement('div');note.style.cssText='font-size:11px;color:var(--gold);margin-top:3px;';note.textContent=`+${tb} racial → ${(C.scores[ab]||0)+tb}`;d.appendChild(note);}
      g.appendChild(d);
    }
    card.appendChild(g); el.appendChild(card);
  }

  const finalCard=document.createElement('div'); finalCard.className='card'; finalCard.id='final-scores';
  renderFinalRow(finalCard); el.appendChild(finalCard);
}

function renderFinalRow(card) {
  const el = card || document.getElementById('final-scores');
  if(!el) return;
  const race=RACES[C.race]||{bonus:{}};
  const subObj=(race.sub||[]).find(s=>s.name===C.subrace);
  const subBonus=subObj?subObj.bonus:{};
  const activeFlex=race.flexBonus||(subObj&&subObj.flexBonus);
  const racialBonus=ab=>(race.bonus[ab]||0)+(subBonus[ab]||0)+(activeFlex?(C.racialFlexChoices||[]).filter(x=>x===ab).length:0);
  const hasAnyRacial=ABS.some(ab=>racialBonus(ab)>0);
  el.innerHTML=`<div class="label" style="margin-bottom:4px;">Final Scores</div>`
    +(hasAnyRacial?`<div style="font-size:11px;color:var(--parchment-dim);margin-bottom:10px;">Racial bonus applied — base shown in picker above</div>`:'<div style="margin-bottom:10px;"></div>');
  const g=document.createElement('div'); g.className='g6';
  for(const ab of ABS){
    const f=fs(ab);
    const rb=racialBonus(ab);
    const base=C.scores[ab]||0;
    const box=document.createElement('div'); box.className='stat-box';
    box.innerHTML=`<div class="stat-lbl">${ab}</div><div class="stat-num">${f}</div><div class="stat-mod">${mstr(f)}</div>`
      +(rb?`<div style="font-size:10px;color:var(--gold);margin-top:2px;">${base}+${rb}r</div>`:'');
    g.appendChild(box);
  }
  el.appendChild(g);
}

// Shared item purchase tracker — used by both Starting Gold and Hybrid modes
function buildItemTracker(el, getBudget, setBudget, budgetLabel, budgetPlaceholder) {
  if(!Array.isArray(C.purchasedItems)) C.purchasedItems=[];
  const allItemNames=Object.keys(ITEM_PRICES).sort();

  // Budget input row
  const budgetWrap=document.createElement('div'); budgetWrap.style.marginBottom='10px';
  const bLbl=document.createElement('div'); bLbl.className='label'; bLbl.style.marginBottom='4px'; bLbl.textContent=budgetLabel;
  const bInp=document.createElement('input'); bInp.type='text'; bInp.value=getBudget(); bInp.placeholder=budgetPlaceholder; bInp.style.cssText='width:100%;';
  bInp.addEventListener('input',e=>{setBudget(e.target.value);updateBal();});
  budgetWrap.appendChild(bLbl); budgetWrap.appendChild(bInp); el.appendChild(budgetWrap);

  // Balance display
  const balDiv=document.createElement('div'); balDiv.style.cssText='font-size:13px;font-family:Cinzel,serif;margin-bottom:10px;padding:8px 10px;background:rgba(201,168,76,0.06);border:1px solid var(--border);border-radius:6px;';
  const updateBal=()=>{
    const budget=parseFloat(getBudget())||0;
    const spent=C.purchasedItems.reduce((a,i)=>a+(parseFloat(i.cost)||0),0);
    const rem=+(budget-spent).toFixed(2);
    balDiv.innerHTML=`Budget: <span style="color:var(--gold);">${budget} gp</span> &nbsp;·&nbsp; Spent: <span style="color:${spent>budget?'var(--red)':'var(--parchment)'};">${spent.toFixed(2)} gp</span> &nbsp;·&nbsp; Remaining: <span style="color:${rem<0?'var(--red)':'var(--green);font-weight:600;'};">${rem} gp</span>`;
  };
  updateBal(); el.appendChild(balDiv);

  // Items list
  const listDiv=document.createElement('div'); listDiv.style.marginBottom='10px';
  const refreshList=()=>{
    listDiv.innerHTML='';
    if(!C.purchasedItems.length){ const e=document.createElement('div'); e.style.cssText='font-size:11px;color:var(--parchment-dim);padding:4px 0;'; e.textContent='No items added yet.'; listDiv.appendChild(e); return; }
    C.purchasedItems.forEach((item,idx)=>{
      const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;align-items:center;padding:3px 0;border-bottom:1px solid rgba(184,134,11,0.1);font-size:12px;';
      const nameEl=document.createElement('span'); nameEl.style.cssText='flex:1;'; nameEl.textContent=item.name;
      const costEl=document.createElement('span'); costEl.style.cssText='color:var(--gold);white-space:nowrap;'; costEl.textContent=item.cost+' gp';
      const rm=document.createElement('button'); rm.className='btn-sm'; rm.style.cssText='font-size:10px;padding:1px 5px;'; rm.textContent='✕';
      rm.addEventListener('click',()=>{C.purchasedItems.splice(idx,1);refreshList();updateBal();});
      row.appendChild(nameEl); row.appendChild(costEl); row.appendChild(rm); listDiv.appendChild(row);
    });
  };
  refreshList(); el.appendChild(listDiv);

  // Add-item form with typeahead
  const addLbl=document.createElement('div'); addLbl.className='label'; addLbl.style.marginBottom='6px'; addLbl.textContent='Add Item';
  el.appendChild(addLbl);
  const addWrap=document.createElement('div'); addWrap.style.cssText='display:flex;gap:6px;align-items:flex-start;position:relative;';
  const nameWrap=document.createElement('div'); nameWrap.style.cssText='flex:2;position:relative;';
  const nameInp=document.createElement('input'); nameInp.type='text'; nameInp.placeholder='Item name or search...'; nameInp.style.cssText='width:100%;padding:5px 8px;font-size:12px;';
  const sug=document.createElement('div'); sug.style.cssText='display:none;position:absolute;top:100%;left:0;right:0;z-index:200;background:#1a0c05;border:1px solid var(--border);border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;';
  const costInp=document.createElement('input'); costInp.type='number'; costInp.placeholder='gp'; costInp.min='0'; costInp.step='0.01'; costInp.style.cssText='flex:0 0 70px;padding:5px 8px;font-size:12px;width:70px;';
  const addBtn=document.createElement('button'); addBtn.className='btn-sm btn-primary'; addBtn.style.cssText='white-space:nowrap;padding:5px 12px;font-size:11px;'; addBtn.textContent='+ Add';

  const showSug=q=>{
    sug.innerHTML=''; sug.style.display='none';
    if(!q) return;
    const matches=allItemNames.filter(n=>n.toLowerCase().includes(q.toLowerCase())).slice(0,12);
    if(!matches.length) return;
    for(const n of matches){
      const opt=document.createElement('div'); opt.style.cssText='display:flex;justify-content:space-between;padding:5px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(184,134,11,0.1);';
      opt.innerHTML=`<span>${n}</span><span style="color:var(--gold);margin-left:8px;">${ITEM_PRICES[n]} gp</span>`;
      opt.addEventListener('mousedown',e=>{
        e.preventDefault();
        nameInp.value=n; costInp.value=ITEM_PRICES[n]; sug.style.display='none';
      });
      opt.addEventListener('mouseover',()=>opt.style.background='rgba(201,168,76,0.12)');
      opt.addEventListener('mouseout',()=>opt.style.background='');
      sug.appendChild(opt);
    }
    sug.style.display='block';
  };

  nameInp.addEventListener('input',()=>{
    const q=nameInp.value.trim();
    // Auto-fill cost if exact match
    const exact=allItemNames.find(n=>n.toLowerCase()===q.toLowerCase());
    if(exact) costInp.value=ITEM_PRICES[exact];
    showSug(q);
  });
  nameInp.addEventListener('blur',()=>setTimeout(()=>sug.style.display='none',150));
  nameInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addBtn.click();}});

  const doAdd=()=>{
    const n=nameInp.value.trim(); if(!n) return;
    const c=parseFloat(costInp.value)||0;
    C.purchasedItems.push({name:n,cost:c});
    nameInp.value=''; costInp.value=''; sug.style.display='none';
    refreshList(); updateBal();
  };
  addBtn.addEventListener('click',doAdd);
  nameWrap.appendChild(nameInp); nameWrap.appendChild(sug);
  addWrap.appendChild(nameWrap); addWrap.appendChild(costInp); addWrap.appendChild(addBtn);
  el.appendChild(addWrap);
  const hint=document.createElement('div'); hint.style.cssText='font-size:10px;color:var(--parchment-dim);margin-top:4px;';
  hint.textContent='PHB prices auto-fill as you type. Cost column is editable before adding.';
  el.appendChild(hint);
}

function makeCollapsibleTable(btnLabel, headers, rows, cellStyle) {
  const wrap=document.createElement('div'); wrap.style.marginBottom='14px';
  const btn=document.createElement('button'); btn.className='btn-sm';
  btn.style.cssText='margin-bottom:8px;font-size:11px;'; btn.textContent=`▶ ${btnLabel}`;
  const tbl=document.createElement('div'); tbl.style.display='none';
  const table=document.createElement('table');
  table.style.cssText='width:100%;border-collapse:collapse;font-size:11px;';
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  for(const h of headers){const th=document.createElement('th');th.style.cssText='text-align:left;padding:4px 6px;font-family:Cinzel,serif;font-size:9px;color:var(--gold);border-bottom:1px solid var(--border);';th.textContent=h;hr.appendChild(th);}
  thead.appendChild(hr); table.appendChild(thead);
  const tbody=document.createElement('tbody');
  for(const row of rows){
    const tr=document.createElement('tr'); tr.style.borderBottom='1px solid rgba(184,134,11,0.1)';
    for(let i=0;i<row.length;i++){const td=document.createElement('td');td.style.cssText='padding:4px 6px;color:var(--parchment-dim);'+(cellStyle?.[i]||'');td.textContent=row[i];tr.appendChild(td);}
    tbody.appendChild(tr);
  }
  table.appendChild(tbody); tbl.appendChild(table);
  let open=false;
  btn.addEventListener('click',()=>{open=!open;tbl.style.display=open?'block':'none';btn.textContent=(open?'▼ ':'▶ ')+btnLabel;});
  wrap.appendChild(btn); wrap.appendChild(tbl);
  return wrap;
}

        // Render fixed text with inline dropdowns for any "any X" placeholders

      opt.addEventListener('mousedown',e=>{
        e.preventDefault();
        C.extraEquip=(C.extraEquip?C.extraEquip+', ':'')+item;
        ta.value=C.extraEquip;
        searchInp.value=''; sugBox.innerHTML=''; sugBox.style.display='none';
      });
      sugBox.appendChild(opt);
    }
    sugBox.style.display='block';
  });
  searchInp.addEventListener('blur',()=>setTimeout(()=>{sugBox.style.display='none';},150));
  searchWrap.appendChild(searchInp); searchWrap.appendChild(sugBox);
  extraDiv.appendChild(searchWrap);
  const ta=document.createElement('textarea'); ta.rows=3; ta.value=C.extraEquip; ta.placeholder='Magic items, extra gear, notes...';
  ta.addEventListener('input',e=>C.extraEquip=e.target.value);
  extraDiv.appendChild(ta); el.appendChild(extraDiv);
}

function renderSpells(el) {
  const title=document.createElement('div'); title.className='step-title'; title.textContent='Choose Spells';
  el.appendChild(title);
  const cls=CLASSES[C.cls];
  // Determine effective spell source (subclass caster uses a different class's list)
  const subCasterInfo = SUBCLASS_CASTER_INFO[C.subclass]; // e.g. EK / AT
  const isSubclassCaster=!!(subCasterInfo && !cls?.caster);
  if(!cls||((!cls.caster)&&!isSubclassCaster)){
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="muted">${C.cls?C.cls+'s do not cast spells.':'Select a class on the previous step first.'}</div>`;
    el.appendChild(card); return;
  }
  const spellCls=isSubclassCaster?subCasterInfo.cls:C.cls;
  const castAbil=isSubclassCaster?subCasterInfo.castAbil:(cls.castAbil);
  // For EK/AT: use their own cantrip+spells-known tables; ignore CANTRIP_COUNT/SPELLS_KNOWN
  const cantripMax=isSubclassCaster
    ? (subCasterInfo.cantripCount[C.level-1]||0)||undefined
    : (CANTRIP_COUNT[spellCls]||[])[C.level-1];
  const spellType=isSubclassCaster?'known':(SPELL_TYPE[spellCls]||'known');
  const _rawKnown=isSubclassCaster
    ? (subCasterInfo.spellsKnown[C.level-1]||0)
    : (SPELLS_KNOWN[spellCls]||[])[C.level-1];
  const _prepHalf = spellCls === 'Paladin' || spellCls === 'Artificer';
  const spellsKnownTotal = spellType==='prepared'
    ? getPreparedCount(spellCls, C.level)
    : (_rawKnown != null ? _rawKnown : null);
  const preparedNote = spellType==='prepared'
    ? ` (${castAbil} mod ${mmod(fs(castAbil))>=0?'+':''}${mmod(fs(castAbil))} + ${_prepHalf?'½ ':''}level ${_prepHalf?Math.floor(C.level/2):C.level} = ${spellsKnownTotal})`
    : spellType==='spellbook'
    ? ` (spellbook: 6 + 2/level = ${spellsKnownTotal} total spell slots)`
    : '';
  // Spell system description
  const systemNote = isSubclassCaster
    ? `${C.subclass}: You know ${spellsKnownTotal||0} Wizard spells (${subCasterInfo.schoolNote}). Spell slots follow the 1/3-caster progression.`
    : {
        known:`Spells known: you permanently learn a fixed number of spells, choosing new ones as you level up.`,
        prepared:`Prepared spells: after each long rest you choose which spells to prepare from your full class list. Prepared count = ${castAbil} modifier + ${_prepHalf?'½ ':''}level (min 1)${preparedNote}.`,
        spellbook:`Spellbook: starts with 6 spells, +2 per level${preparedNote}. You prepare ${castAbil} modifier + level spells each day from your book.`,
      }[spellType];
  if(isSubclassCaster){
    const nb=document.createElement('div'); nb.style.cssText='font-size:12px;color:var(--gold);margin-bottom:12px;padding:8px 12px;background:rgba(201,168,76,0.08);border:1px solid var(--gold-dim);border-radius:6px;';
    nb.textContent=`${C.subclass}: You gain limited Wizard spellcasting. Spell slots: ${(THIRD_SLOTS[C.level-1]||[]).map((n,i)=>`${n}×${i+1}`).join(', ')||'none yet (unlocks at level 3)'}.`;
    el.appendChild(nb);
  }
  const info=document.createElement('div'); info.style.cssText='font-size:13px;color:var(--parchment-dim);margin-bottom:12px;';
  info.innerHTML=`Spellcasting ability: <strong style="color:var(--gold)">${castAbil}</strong> &nbsp;·&nbsp; Spell Save DC: <strong style="color:var(--gold)">${8+pb(totalCharLevel())+mmod(fs(castAbil))}</strong> &nbsp;·&nbsp; Spell Attack: <strong style="color:var(--gold)">+${pb(totalCharLevel())+mmod(fs(castAbil))}</strong>`;
  el.appendChild(info);
  // Combined multiclass spell slots
  const mcSlots=getMulticlassSlots();
  if(mcSlots){
    const mcNote=document.createElement('div'); mcNote.style.cssText='font-size:11px;color:var(--gold);margin-bottom:12px;padding:8px 12px;background:rgba(201,168,76,0.08);border:1px solid var(--gold-dim);border-radius:6px;';
    const lvlOrd2=lv=>lv===1?'1st':lv===2?'2nd':lv===3?'3rd':lv+'th';
    const slotStr=mcSlots.map((n,i)=>`${n}×${lvlOrd2(i+1)}`).filter((_,i)=>mcSlots[i]>0).join(', ');
    mcNote.innerHTML=`<strong>Multiclass Spell Slots</strong> (PHB p.165): ${slotStr}. Warlock pact slots are tracked separately.`;
    el.appendChild(mcNote);
  }
  const sysDiv=document.createElement('div'); sysDiv.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:16px;font-style:italic;';
  sysDiv.textContent=systemNote; el.appendChild(sysDiv);

  // Helper: make a spell tag with ⓘ popup icon
  const mkSpellTag=(s,selClass,onClick)=>{
    const src=SPELL_SRC[s]||'PHB';
    const wrap=document.createElement('span'); wrap.style.cssText='display:inline-flex;align-items:center;gap:2px;';
    const sp=document.createElement('span'); sp.className='tag'+(selClass?' '+selClass:'');
    sp.style.cssText='cursor:pointer;';
    sp.innerHTML=`${s}${src!=='PHB'?`<span style="font-size:9px;opacity:0.65;margin-left:4px;">[${src}]</span>`:''}`;
    sp.addEventListener('click',onClick);
    wrap.appendChild(sp);
    const ref=SPELL_REF[s];
    if(ref){
      const info=document.createElement('span');
      info.style.cssText='font-size:10px;color:var(--gold);cursor:pointer;opacity:0.8;margin-left:1px;';
      info.textContent='ⓘ';
      info.title='Spell details';
      info.addEventListener('click',e=>{
        e.stopPropagation();
        const lvlStr=ref.lv===0?'Cantrip':`Level ${ref.lv}`;
        const metaLine=[lvlStr,ref.sch,ref.cast,ref.rng,ref.conc?'Concentration':'',ref.rit?'Ritual':''].filter(Boolean).join(' · ');
        const clsLine=ref.cls?`<div style="font-size:11px;color:var(--parchment-dim);margin-top:4px;">Classes: ${ref.cls}</div>`:'';
        showPopup(s,`<div style="font-size:11px;color:var(--gold);margin-bottom:8px;">${metaLine}</div>${clsLine}<div style="margin-top:8px;font-size:12px;line-height:1.6;">${ref.d||'No description available.'}</div>`,ref.src||src);
      });
      wrap.appendChild(info);
    }
    return {wrap,sp};
  };

  const cants=CANTRIPS[spellCls]||[];
  if(cants.length){
    // Remove over-limit cantrips if cantrip max decreased
    if(cantripMax!=null && C.cantrips.length>cantripMax) C.cantrips=C.cantrips.slice(0,cantripMax);
    const atMax=cantripMax!=null && C.cantrips.length>=cantripMax;
    const card=document.createElement('div'); card.className='card'; card.style.marginBottom='14px';
    const cantLabel=document.createElement('div'); cantLabel.className='label'; cantLabel.style.marginBottom='8px';
    cantLabel.textContent=cantripMax!=null?`Cantrips — ${C.cantrips.length} / ${cantripMax} known`:`Cantrips (${C.cantrips.length} selected)`;
    card.appendChild(cantLabel);
    for(const s of cants){
      const sel=C.cantrips.includes(s);
      const inExtra=(C.extraSpells||[]).includes(s);
      const {wrap,sp}=mkSpellTag(s,(sel||inExtra)?'sel-cantrip':'',()=>{
        if(inExtra) return;
        if(C.cantrips.includes(s)) C.cantrips=C.cantrips.filter(x=>x!==s);
        else if(cantripMax==null || C.cantrips.length<cantripMax) C.cantrips=[...C.cantrips,s];
        else return;
        render();
      });
      if(inExtra){ sp.style.opacity='0.5'; sp.style.cursor='not-allowed'; sp.title='Added via "Add Any Spell"'; }
      else if(!sel && atMax) sp.style.opacity='0.4';
      card.appendChild(wrap);
    }
    el.appendChild(card);
  }
  // For EK/AT: generate 1st-level spell list from SPELL_REF filtered by school
  const schoolFilter = isSubclassCaster ? (subCasterInfo.schools||[]) : null;
  const sp1Base = isSubclassCaster
    ? Object.keys(SPELL_REF).filter(n=>{
        const ref=SPELL_REF[n]; if(ref.lv!==1) return false;
        const ca=Array.isArray(ref.cls)?ref.cls:(ref.cls||'').split(',').map(s=>s.trim());
        if(!ca.includes(spellCls)) return false;
        if(schoolFilter&&schoolFilter.length) return schoolFilter.includes(ref.sch);
        return true;
      }).sort()
    : (SPELLS1[spellCls]||[]);
  // Shared limit across all leveled spells (known casters)
  const totalLeveledSelected = () => (C.spells1||[]).length + (C.otherSpells||[]).filter(n=>(SPELL_REF[n]||{}).lv>0).length;

  const sp1=sp1Base;
  const spellWordLabel = spellType==='spellbook' ? 'in book' : 'known';
  if (spellType === 'prepared') {
    // Option B: prepared casters don't pre-select leveled spells — they choose from the full list each long rest
    const prepCount = getPreparedCount(spellCls, C.level);
    const prepNoteCard = document.createElement('div'); prepNoteCard.className='card'; prepNoteCard.style.cssText='margin-bottom:14px;border-color:var(--gold-dim);background:rgba(201,168,76,0.05);';
    prepNoteCard.innerHTML = `<div class="label" style="margin-bottom:6px;">Leveled Spells — Prepared Daily</div>` +
      `<div style="font-size:13px;color:var(--parchment-dim);line-height:1.6;">` +
      `As a <strong style="color:var(--gold)">${C.cls}</strong>, you do not choose a fixed spell list. After each long rest, you may prepare any ` +
      `<strong style="color:var(--gold)">${prepCount}</strong> spells from the full ${spellCls} spell list. ` +
      `Use the <em>Full Class Spell Reference</em> above to browse all available spells.</div>`;
    el.appendChild(prepNoteCard);
  } else if(sp1.length){
    const spellNote=spellsKnownTotal!=null?`— ${totalLeveledSelected()} / ${spellsKnownTotal} ${spellWordLabel}`:spellType==='spellbook'?'— select spellbook contents':'';
    const card=document.createElement('div'); card.className='card'; card.style.marginBottom='14px';
    const sp1Label=document.createElement('div'); sp1Label.className='label'; sp1Label.style.marginBottom='8px';
    sp1Label.textContent=`1st-Level Spells ${spellNote}`;
    card.appendChild(sp1Label);
    for(const s of sp1){
      const sel=C.spells1.includes(s);
      const inExtra=(C.extraSpells||[]).includes(s);
      const atSpMax=spellsKnownTotal!=null && totalLeveledSelected()>=spellsKnownTotal;
      const {wrap,sp}=mkSpellTag(s,(sel||inExtra)?'sel-spell':'',()=>{
        if(inExtra) return;
        if(C.spells1.includes(s)) C.spells1=C.spells1.filter(x=>x!==s);
        else if(spellsKnownTotal==null || totalLeveledSelected()<spellsKnownTotal) C.spells1=[...C.spells1,s];
        else return;
        render();
      });
      if(inExtra){ sp.style.opacity='0.5'; sp.style.cursor='not-allowed'; sp.title='Added via "Add Any Spell"'; }
      else if(!sel && atSpMax) sp.style.opacity='0.4';
      card.appendChild(wrap);
    }
    el.appendChild(card);
  }

  // ── Higher-level spell sections (levels 2+) ────────────────────────────────
  // Compute max available spell level from slot tables
  let maxSpellLevel = 0;
  if (spellCls === 'Warlock' && !isSubclassCaster) {
    maxSpellLevel = (WARLOCK_SLOTS[C.level-1]||[])[1] || 0;
  } else {
    let slots;
    if (isSubclassCaster) slots = THIRD_SLOTS[C.level-1]||[];
    else if (['Wizard','Cleric','Druid','Bard','Sorcerer'].includes(spellCls)) slots = FULL_SLOTS[C.level-1]||[];
    else if (spellCls === 'Paladin' || spellCls === 'Ranger') slots = HALF_SLOTS[C.level-1]||[];
    else if (spellCls === 'Artificer') slots = ART_SLOTS[C.level-1]||[];
    else slots = [];
    maxSpellLevel = slots.length;
    while (maxSpellLevel > 0 && !slots[maxSpellLevel-1]) maxSpellLevel--;
  }

  // For known casters: total non-cantrip limit is shared across all levels
  const totalLeveledLimit = spellsKnownTotal;

  const lvlOrd = lv => lv===1?'1st':lv===2?'2nd':lv===3?'3rd':lv+'th';

  if (spellType !== 'prepared')
  for (let lv = 2; lv <= maxSpellLevel; lv++) {
    const lvSpells = Object.keys(SPELL_REF).filter(n => {
      const ref = SPELL_REF[n]; if (ref.lv !== lv) return false;
      const clsArr = Array.isArray(ref.cls) ? ref.cls : (ref.cls||'').split(',').map(s=>s.trim());
      if (!clsArr.includes(spellCls)) return false;
      if (schoolFilter && schoolFilter.length) return schoolFilter.includes(ref.sch);
      return true;
    }).sort();
    if (!lvSpells.length) continue;

    const selectedAtLv = () => (C.otherSpells||[]).filter(n => (SPELL_REF[n]||{}).lv === lv);
    const lvCard = document.createElement('div'); lvCard.className='card'; lvCard.style.marginBottom='14px';
    const lvLabel = document.createElement('div'); lvLabel.className='label'; lvLabel.style.marginBottom='8px';
    const updateLvLabel = () => {
      const selCount = selectedAtLv().length;
      const remaining = totalLeveledLimit != null ? totalLeveledLimit - totalLeveledSelected() : null;
      lvLabel.textContent = `${lvlOrd(lv)}-Level Spells — ${selCount} ${spellWordLabel}` +
        (remaining != null ? ` (${remaining >= 0 ? remaining : 0} of ${totalLeveledLimit} ${spellWordLabel})` : '');
    };
    updateLvLabel();
    lvCard.appendChild(lvLabel);

    for (const s of lvSpells) {
      const isSel = () => (C.otherSpells||[]).includes(s);
      const inExtra = (C.extraSpells||[]).includes(s);
      const {wrap, sp} = mkSpellTag(s, (isSel()||inExtra) ? 'sel-spell' : '', () => {
        if (inExtra) return;
        if ((C.otherSpells||[]).includes(s)) {
          C.otherSpells = C.otherSpells.filter(x => x !== s);
        } else {
          const rem = totalLeveledLimit != null ? totalLeveledLimit - totalLeveledSelected() : 1;
          if (rem <= 0) return;
          C.otherSpells = [...(C.otherSpells||[]), s];
        }
        render();
      });
      if (inExtra) { sp.style.opacity='0.5'; sp.style.cursor='not-allowed'; sp.title='Added via "Add Any Spell"'; }
      else if (!isSel() && totalLeveledLimit != null && totalLeveledSelected() >= totalLeveledLimit) sp.style.opacity = '0.4';
      lvCard.appendChild(wrap);
    }
    el.appendChild(lvCard);
  }

  // ── Multiclass caster spell sections ─────────────────────────────────────
  const mcSpellCasters = (C.multiclasses||[]).filter(mc => mc.cls && (CLASSES[mc.cls]?.caster || SUBCLASS_CASTER_INFO[mc.subclass]));
  for (const mc of mcSpellCasters) {
    const mcClsObj2 = CLASSES[mc.cls] || {};
    const mcSubCI = SUBCLASS_CASTER_INFO[mc.subclass];
    const mcIsSC = !!(mcSubCI && !mcClsObj2.caster);
    const mcSpellCls2 = mcIsSC ? mcSubCI.cls : mc.cls;
    const mcCastAbil2 = mcIsSC ? mcSubCI.castAbil : (mcClsObj2.castAbil || 'INT');
    const mcLv2 = mc.level || 1;

    const mcCantripMax2 = mcIsSC
      ? ((mcSubCI.cantripCount[mcLv2-1]||0) || undefined)
      : (CANTRIP_COUNT[mcSpellCls2]||[])[mcLv2-1];
    const mcSpellType2 = mcIsSC ? 'known' : (SPELL_TYPE[mcSpellCls2]||'known');
    const mcRawKnown2 = mcIsSC ? (mcSubCI.spellsKnown[mcLv2-1]||0) : (SPELLS_KNOWN[mcSpellCls2]||[])[mcLv2-1];
    const mcSpellsTotal2 = mcSpellType2 === 'prepared'
      ? getPreparedCount(mcSpellCls2, mcLv2)
      : (mcRawKnown2 != null ? mcRawKnown2 : null);

    let mcMaxLv2 = 0;
    if (mcSpellCls2 === 'Warlock' && !mcIsSC) {
      mcMaxLv2 = (WARLOCK_SLOTS[mcLv2-1]||[])[1] || 0;
    } else {
      let mcSlots2;
      if (mcIsSC) mcSlots2 = THIRD_SLOTS[mcLv2-1]||[];
      else if (['Wizard','Cleric','Druid','Bard','Sorcerer'].includes(mcSpellCls2)) mcSlots2 = FULL_SLOTS[mcLv2-1]||[];
      else if (mcSpellCls2 === 'Paladin' || mcSpellCls2 === 'Ranger') mcSlots2 = HALF_SLOTS[mcLv2-1]||[];
      else if (mcSpellCls2 === 'Artificer') mcSlots2 = ART_SLOTS[mcLv2-1]||[];
      else mcSlots2 = [];
      mcMaxLv2 = mcSlots2.length;
      while (mcMaxLv2 > 0 && !mcSlots2[mcMaxLv2-1]) mcMaxLv2--;
    }
    if (mcMaxLv2 === 0 && !mcCantripMax2) continue;

    if (!C.mcSpells) C.mcSpells = {};
    if (!C.mcSpells[mc.cls]) C.mcSpells[mc.cls] = {cantrips:[], spells1:[], otherSpells:[]};
    const mcSt2 = C.mcSpells[mc.cls];
    const mcTotalLvSel2 = () => (mcSt2.spells1||[]).length + (mcSt2.otherSpells||[]).length;
    const mcSpellWordLabel2 = mcSpellType2==='prepared' ? 'prepared' : mcSpellType2==='spellbook' ? 'in book' : 'known';

    // Section header
    const mcHdr2 = document.createElement('div'); mcHdr2.className='card';
    mcHdr2.style.cssText='margin-bottom:14px;border-color:var(--gold-dim);';
    mcHdr2.innerHTML = `<div class="label" style="margin-bottom:4px;">${mc.cls} Spells (Multiclass — Level ${mcLv2})</div>` +
      `<div style="font-size:13px;color:var(--parchment-dim);">Spellcasting ability: <strong style="color:var(--gold)">${mcCastAbil2}</strong> &nbsp;·&nbsp; ` +
      `Spell Save DC: <strong style="color:var(--gold)">${8+pb(totalCharLevel())+mmod(fs(mcCastAbil2))}</strong> &nbsp;·&nbsp; ` +
      `Spell Attack: <strong style="color:var(--gold)">+${pb(totalCharLevel())+mmod(fs(mcCastAbil2))}</strong>` +
      (mcSpellsTotal2 != null ? ` &nbsp;·&nbsp; ${mcSpellWordLabel2==='prepared'?'Prepared':'Spells'}: <strong style="color:var(--gold)">${mcTotalLvSel2()} / ${mcSpellsTotal2}</strong>` : '') + `</div>`;
    el.appendChild(mcHdr2);

    // Cantrips
    const mcCants2 = CANTRIPS[mcSpellCls2]||[];
    if (mcCants2.length && mcCantripMax2) {
      if (mcSt2.cantrips.length > mcCantripMax2) mcSt2.cantrips = mcSt2.cantrips.slice(0, mcCantripMax2);
      const mcCantCard2 = document.createElement('div'); mcCantCard2.className='card'; mcCantCard2.style.marginBottom='14px';
      const mcCantLabel2 = document.createElement('div'); mcCantLabel2.className='label'; mcCantLabel2.style.marginBottom='8px';
      mcCantLabel2.textContent = `${mc.cls} Cantrips — ${mcSt2.cantrips.length} / ${mcCantripMax2} known`;
      mcCantCard2.appendChild(mcCantLabel2);
      for (const s of mcCants2) {
        const sel = mcSt2.cantrips.includes(s);
        const {wrap, sp} = mkSpellTag(s, sel ? 'sel-cantrip' : '', () => {
          if (mcSt2.cantrips.includes(s)) mcSt2.cantrips = mcSt2.cantrips.filter(x=>x!==s);
          else if (mcSt2.cantrips.length < mcCantripMax2) mcSt2.cantrips = [...mcSt2.cantrips, s];
          render();
        });
        if (!sel && mcSt2.cantrips.length >= mcCantripMax2) sp.style.opacity = '0.4';
        mcCantCard2.appendChild(wrap);
      }
      el.appendChild(mcCantCard2);
    }

    // 1st-level and higher-level spells
    const mcSchFilter2 = mcIsSC ? (mcSubCI.schools||[]) : null;

    if (mcSpellType2 === 'prepared') {
      // Option B: MC prepared casters don't pre-select leveled spells
      const mcPrepCount2 = getPreparedCount(mcSpellCls2, mcLv2);
      const mcPrepNoteCard2 = document.createElement('div'); mcPrepNoteCard2.className='card'; mcPrepNoteCard2.style.cssText='margin-bottom:14px;border-color:var(--gold-dim);background:rgba(201,168,76,0.05);';
      mcPrepNoteCard2.innerHTML = `<div class="label" style="margin-bottom:6px;">${mc.cls} Leveled Spells — Prepared Daily</div>` +
        `<div style="font-size:13px;color:var(--parchment-dim);line-height:1.6;">` +
        `As a multiclass <strong style="color:var(--gold)">${mc.cls}</strong>, after each long rest you may prepare any ` +
        `<strong style="color:var(--gold)">${mcPrepCount2}</strong> spells from the full ${mcSpellCls2} spell list.</div>`;
      el.appendChild(mcPrepNoteCard2);
    } else {
      const mcSp12 = Object.keys(SPELL_REF).filter(n => {
        const ref = SPELL_REF[n]; if (ref.lv !== 1) return false;
        const clsArr = Array.isArray(ref.cls) ? ref.cls : (ref.cls||'').split(',').map(x=>x.trim());
        if (!clsArr.includes(mcSpellCls2)) return false;
        if (mcSchFilter2 && mcSchFilter2.length) return mcSchFilter2.includes(ref.sch);
        return true;
      }).sort();

      if (mcSp12.length && mcMaxLv2 >= 1) {
        const mcSpNote2 = mcSpellsTotal2 != null ? `— ${mcTotalLvSel2()} / ${mcSpellsTotal2} ${mcSpellWordLabel2}` : '';
        const mcSp1Card2 = document.createElement('div'); mcSp1Card2.className='card'; mcSp1Card2.style.marginBottom='14px';
        const mcSp1Label2 = document.createElement('div'); mcSp1Label2.className='label'; mcSp1Label2.style.marginBottom='8px';
        mcSp1Label2.textContent = `${mc.cls} 1st-Level Spells ${mcSpNote2}`;
        mcSp1Card2.appendChild(mcSp1Label2);
        for (const s of mcSp12) {
          const isSel2 = () => (mcSt2.spells1||[]).includes(s);
          const {wrap, sp} = mkSpellTag(s, isSel2() ? 'sel-spell' : '', () => {
            if ((mcSt2.spells1||[]).includes(s)) mcSt2.spells1 = mcSt2.spells1.filter(x=>x!==s);
            else if (mcSpellsTotal2 == null || mcTotalLvSel2() < mcSpellsTotal2) mcSt2.spells1 = [...(mcSt2.spells1||[]), s];
            render();
          });
          if (!isSel2() && mcSpellsTotal2 != null && mcTotalLvSel2() >= mcSpellsTotal2) sp.style.opacity = '0.4';
          mcSp1Card2.appendChild(wrap);
        }
        el.appendChild(mcSp1Card2);
      }

      // Higher-level spells
      for (let lv = 2; lv <= mcMaxLv2; lv++) {
        const mcLvSpells2 = Object.keys(SPELL_REF).filter(n => {
          const ref = SPELL_REF[n]; if (ref.lv !== lv) return false;
          const clsArr = Array.isArray(ref.cls) ? ref.cls : (ref.cls||'').split(',').map(x=>x.trim());
          if (!clsArr.includes(mcSpellCls2)) return false;

}

// Renders a single choice control (select dropdown) for a feat choice definition.
function renderFeatChoiceUI(idx, imp, def) {
  const choices = imp.choices || {};
  const mkChoiceSel = (opts, key, label) => {
    const w = document.createElement('div');
    const lbl = document.createElement('div'); lbl.className='label'; lbl.style.marginBottom='4px'; lbl.textContent=label;
    w.appendChild(lbl);
    const sel = document.createElement('select'); sel.style.cssText='width:100%;';
    sel.innerHTML = `<option value="">— Choose —</option>` + opts.map(o => {
      const v = typeof o==='string' ? o : (o.v||o.name||o);
      const l = typeof o==='string' ? o : (o.l||o.name||o.v||o);
      return `<option value="${v}"${choices[key]===v?' selected':''}>${l}</option>`;
    }).join('');
    sel.addEventListener('change', e => { if(idx==='racial'){C.racialFeatChoices[key]=e.target.value;}else{C.improvements[idx].choices[key]=e.target.value;} render(); });
    w.appendChild(sel); return w;
  };
  const waitMsg = (label, waitFor) => {
    const w=document.createElement('div'); w.style.cssText='font-size:11px;color:var(--parchment-dim);';
    w.textContent=`${label}: choose ${waitFor} first.`; return w;
  };
  const resolveList = () => def.list || (def.listKey ? (choices[def.listKey]||'') : '');

  switch(def.type) {
    case 'list':
      return mkChoiceSel(def.opts, def.key, def.label);

    case 'cantrip': {
      const cls = resolveList();
      if (def.listKey && !cls) return waitMsg(def.label, 'a spell list');
      const opts = Object.entries(SPELL_REF)
        .filter(([,s]) => s.lv===0 && (!cls || s.cls.includes(cls)))
        .map(([n]) => n).filter(n => n !== (def.notKey ? choices[def.notKey]||'' : '')).sort();
      return mkChoiceSel(opts, def.key, def.label);
    }

    case 'cantrip_attack': {
      const cls = resolveList();
      if (def.listKey && !cls) return waitMsg(def.label, 'a spell list');
      const opts = Object.entries(SPELL_REF)
        .filter(([,s]) => s.lv===0 && (!cls || s.cls.includes(cls)) && /spell attack/i.test(s.d))
        .map(([n]) => n).sort();
      return mkChoiceSel(opts, def.key, def.label);
    }

    case 'spell1': {
      const cls = resolveList();
      if (def.listKey && !cls) return waitMsg(def.label, 'a spell list');
      const opts = Object.entries(SPELL_REF)
        .filter(([,s]) => s.lv===1 && (!cls || s.cls.includes(cls)) && (!def.schools || def.schools.includes(s.sch)))
        .map(([n,s]) => ({v:n, l:`${n} (${s.sch})`}))
        .sort((a,b) => a.v.localeCompare(b.v));
      return mkChoiceSel(opts, def.key, def.label);
    }

    case 'skill':
      return mkChoiceSel(ALL_SKILLS, def.key, def.label);

    case 'skill_expert': {
      const profSkills = getAllSkillProfs();
      return mkChoiceSel(profSkills.length ? profSkills : ALL_SKILLS, def.key, def.label);
    }

    case 'skill_or_tool': {
      const tools = [...ARTISAN_TOOLS_LIST,'Thieves\' tools','Herbalism kit','Navigator\'s tools','Poisoner\'s kit',...MUSICAL_INSTRUMENTS,...GAMING_SETS];
      return mkChoiceSel([...ALL_SKILLS,...tools].sort(), def.key, def.label);
    }

    case 'language':
      return mkChoiceSel(LANGUAGES, def.key, def.label);

    case 'weapon':
      return mkChoiceSel([...WEAPONS.simple,...WEAPONS.martial].sort(), def.key, def.label);

    case 'maneuver': {
      const opts = (SUBCLASS_CHOICES.Fighter?.['Battle Master']?.[0]?.options||[]).map(o=>o.name);
      return mkChoiceSel(opts, def.key, def.label);
    }

    case 'metamagic': {
      const opts = (CLASS_CHOICES.Sorcerer?.[0]?.options||[]).map(o=>o.name);
      return mkChoiceSel(opts, def.key, def.label);
    }

    default: return null;
  }
}

function renderFeats(el) {
  const title=document.createElement('div'); title.className='step-title'; title.textContent='Ability Score Improvements & Feats';
  el.appendChild(title);
  const asiOpps=getAllASIOpportunities();

  while(C.improvements.length < asiOpps.length) C.improvements.push({type:'none'});

  asiOpps.forEach((opp, idx) => {
    const imp = C.improvements[idx]||{type:'none'};

      card.appendChild(mkSelect('Choose Ability',ABS.map(ab=>({v:ab,l:`${ab} (${fs(ab)} → ${fs(ab)+(imp.ab1===ab?0:2)})`})),imp.ab1,v=>{C.improvements[idx].ab1=v;renderFinalRow();},'Select ability...'));

      card.appendChild(g);

        const changeBtn=document.createElement('button'); changeBtn.className='btn-sm'; changeBtn.textContent='✕ Change';
        changeBtn.addEventListener('click',()=>{ C.improvements[idx]={type:'feat',feat:'',choices:{}}; render(); });

        ctrlRow.appendChild(searchInp); ctrlRow.appendChild(toggleBtn);

        const fg=document.createElement('div'); fg.className='g2'; fg.style.marginTop='4px';
        const renderFeatList=()=>{
          fg.innerHTML='';
          const q=searchInp.value.toLowerCase();

            fc.innerHTML=`<div style="font-size:12px;font-weight:600;margin-bottom:3px;">${f.name}${f.src!=='PHB'?`<span class="badge badge-gold" style="margin-left:6px;font-size:9px;">${f.src}</span>`:''}${preNote}</div><div class="muted" style="font-size:11px;">${f.desc}</div>`;
            if(eligible) fc.addEventListener('click',()=>{
              const autoAsi=(f.asiChoice&&f.asiChoice.length===1)?f.asiChoice[0]:'';
              C.improvements[idx]={type:'feat',feat:f.name,featAsiChoice:autoAsi,choices:{}};
              render();
            });
            fg.appendChild(fc);
          }
          if(!fg.children.length) fg.innerHTML='<div class="muted" style="font-size:12px;grid-column:1/-1;">No feats match.</div>';
        };
        searchInp.addEventListener('input', renderFeatList);
        toggleBtn.addEventListener('click',()=>{showIneligible=!showIneligible;toggleBtn.textContent=showIneligible?'Hide Ineligible':'Show All';renderFeatList();});
        renderFeatList();
        card.appendChild(fg);
      }
    }
    el.appendChild(card);
  });
}
