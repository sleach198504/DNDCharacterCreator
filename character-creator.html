      {lvl:14,name:'Walker in Dreams',desc:'At end of a long rest, cast dream, scrying, or teleportation circle (no slot, no material cost). The target is always a place you\'ve visited. Once per long rest.'},
    ]},
    'Circle of the Shepherd':{src:'XGtE',desc:'Shepherd druids summon and strengthen the spirits of beasts and fey to protect their allies.',feats:[
      {lvl:2,name:'Speech of the Woods',desc:'Learn Sylvan. Beasts can understand your speech, and you have advantage on Charisma checks toward them.'},
      {lvl:2,name:'Spirit Totem',desc:'Bonus action: summon a spectral totem spirit in a 30-ft sphere for 1 minute. Bear: each creature (including you) gains temp HP = 5+druid level when summoned, and you all have advantage on STR checks/saves. Hawk: bonus action to grant advantage on one attack vs. a creature in the aura. Unicorn: track creatures in the aura; healing spells in the aura restore a bonus 1d8 HP. Once per short or long rest.'},
      {lvl:6,name:'Mighty Summoner',desc:'Beasts and fey you conjure gain +2 HP per HD and their attacks count as magical.'},
      {lvl:10,name:'Guardian Spirit',desc:'Your Spirit Totem protects conjured beasts and fey: they gain 10 HP at the start of each of their turns if they have less than half their maximum.'},
      {lvl:14,name:'Faithful Summons',desc:'When you are reduced to 0 HP or incapacitated against your will, 4 beasts of CR 2 or lower appear within 20 ft and act on your behalf for 1 hour. Once per long rest.'},
    ]},
    'Circle of Spores':{src:'TCoE',desc:'Spore druids see death and decay as part of the cycle, using fungal magic to animate the dead and infect foes.',feats:[
      {lvl:2,name:'Halo of Spores',desc:'Reaction when a creature within 10 ft moves: deal 1d4 necrotic damage (CON save negates; scales to 3d4 at level 14).'},
      {lvl:2,name:'Symbiotic Entity',desc:'Expend a Wild Shape use to activate for 10 minutes instead of transforming: gain temp HP = 4× druid level, halo of spores damage doubles, and melee weapon attacks deal +1d6 necrotic.'},
      {lvl:6,name:'Fungal Infestation',desc:'Reaction when a Small or Medium beast or humanoid dies within 10 ft: raise it as a zombie (bonus action command; lasts 1 hour). Uses = WIS modifier per long rest.'},
      {lvl:10,name:'Spreading Spores',desc:'While Symbiotic Entity is active, use bonus action to move Halo of Spores to a 10-ft cube within 30 ft. Creatures entering or starting there make the CON save.'},
      {lvl:14,name:'Fungal Body',desc:'Spores fill your body. You\'re immune to blinded, deafened, frightened, and poisoned conditions. Critical hits against you become normal hits.'},
    ]},
    'Circle of Stars':{src:'TCoE',desc:'Stars druids observe the night sky and draw the power of constellations into themselves.',feats:[
      {lvl:2,name:'Star Map',desc:'Create a star map during a long rest. While holding it, you always have guiding bolt prepared (cast it 2× per long rest without a slot) and can cast guidance as a cantrip.'},
      {lvl:2,name:'Starry Form',desc:'Expend a Wild Shape use to take on a luminous form for 10 minutes. Choose Archer (bonus action deals 1d8+WIS radiant when you cast a spell), Chalice (heal a creature within 30 ft for 1d8+WIS when you cast a healing spell), or Dragon (minimum of 10 on INT checks; see through magical darkness).'},
      {lvl:6,name:'Cosmic Omen',desc:'Roll a d20 after each long rest. Odd = Woe, even = Weal. Reaction: add or subtract 1d6 from an attack, check, or save of a creature within 30 ft (based on Woe/Weal). Uses = prof bonus per long rest.'},
      {lvl:10,name:'Twinkling Constellations',desc:'Your Starry Form improves: Dragon form grants a fly speed of 20 ft. Archer and Chalice each also grant the Dragon form\'s bonus. At start of each turn, choose which constellation to embody.'},
      {lvl:14,name:'Full of Stars',desc:'While in Starry Form, you become partially incorporeal — resistance to bludgeoning, piercing, and slashing damage.'},
    ]},
    'Circle of Wildfire':{src:'TCoE',desc:'Wildfire druids bond with a fire spirit, knowing that destruction makes way for new growth.',feats:[
      {lvl:2,name:'Summon Wildfire Spirit',desc:'Expend a Wild Shape use to summon a Wildfire Spirit (CR = your druid level / 3) in a 10-ft sphere of flame. It acts on your initiative, can teleport allies within 5 ft up to 15 ft, and explodes when reduced to 0 HP (2d6 fire, DEX save for half).'},
      {lvl:2,name:'Enhanced Bond',desc:'While your Wildfire Spirit is active, you can roll a d8 and add it to any healing spell or fire damage spell you cast.'},
      {lvl:6,name:'Cauterizing Flames',desc:'When a creature dies within 60 ft, a spectral flame appears. You or another creature within 60 ft can use a reaction to touch the flame and regain 2d10+WIS HP. Uses = WIS modifier per long rest.'},
      {lvl:10,name:'Blazing Revival',desc:'If your Wildfire Spirit is within 120 ft when you drop to 0 HP and aren\'t killed, the spirit can move to you and you regain half your max HP. The spirit then disappears. Once per long rest.'},
      {lvl:14,name:'Firestorm',desc:'When you expend a Wild Shape to summon your Wildfire Spirit, all creatures within 10 ft of where it appears take 2d6 fire damage (DEX save for half).'},
    ]},
  },
  Fighter:{
    'Champion':{src:'PHB',desc:'Champions focus on the development of raw physical power. They push their bodies to superhuman limits with brutal critical hits and unwavering endurance.',feats:[
      {lvl:3,name:'Improved Critical',desc:'Your weapon attacks score a critical hit on a roll of 19 or 20.'},
      {lvl:7,name:'Remarkable Athlete',desc:'Add half your proficiency bonus (rounded up) to any STR, DEX, or CON check that doesn\'t use your proficiency bonus. Running long jump distance increases by your STR modifier.'},
      {lvl:10,name:'Additional Fighting Style',desc:'Choose a second option from the Fighting Style class feature.'},
      {lvl:15,name:'Superior Critical',desc:'Your weapon attacks score a critical hit on a roll of 18, 19, or 20.'},
      {lvl:18,name:'Survivor',desc:'At the start of each of your turns, if you have fewer than half your HP maximum remaining, you regain HP equal to 5 + your CON modifier (as long as you have at least 1 HP).'},
    ]},
    'Battle Master':{src:'PHB',desc:'Battle Masters employ special combat maneuvers fueled by superiority dice, making them the most tactically versatile fighter archetype.',feats:[
      {lvl:3,name:'Combat Superiority',desc:'You learn 3 maneuvers (gain more at levels 7, 10, 15). You have 4 superiority dice (d8; scales to d12 at level 18). Spend dice to fuel maneuvers — examples: Commander\'s Strike, Disarming Attack, Feinting Attack, Goading Attack, Lunging Attack, Maneuvering Attack, Menacing Attack, Parry, Precision Attack, Pushing Attack, Rally, Riposte, Sweeping Attack, Trip Attack.'},
      {lvl:3,name:'Student of War',desc:'Proficiency with one type of artisan\'s tools of your choice.'},
      {lvl:7,name:'Know Your Enemy',desc:'Spend 1 minute studying a creature to learn how it compares to you in STR, DEX, CON, AC, current HP, total class levels, and fighter levels.'},
      {lvl:10,name:'Improved Combat Superiority',desc:'Your superiority dice become d10s.'},
      {lvl:15,name:'Relentless',desc:'When you roll initiative and have no superiority dice remaining, regain 1 superiority die.'},
      {lvl:18,name:'Improved Combat Superiority (d12)',desc:'Your superiority dice become d12s.'},
    ]},
    'Eldritch Knight':{src:'PHB',desc:'Eldritch Knights combine the discipline of a fighter with arcane magic, specializing in abjuration and evocation spells.',feats:[
      {lvl:3,name:'Spellcasting',desc:'You learn spells from the wizard spell list (primarily abjuration and evocation). INT is your spellcasting ability. You have spell slots like a one-third caster.'},
      {lvl:3,name:'Weapon Bond',desc:'Ritual bond a weapon over 1 hour. You can\'t be disarmed of bonded weapons, and can summon them to your hand as a bonus action. Bond up to two weapons.'},
      {lvl:7,name:'War Magic',desc:'When you use your action to cast a cantrip, you can make one weapon attack as a bonus action.'},
      {lvl:10,name:'Eldritch Strike',desc:'When you hit a creature with a weapon attack, it has disadvantage on the next saving throw it makes against a spell you cast before the end of your next turn.'},
      {lvl:15,name:'Arcane Charge',desc:'When you use Action Surge, you can also teleport up to 30 ft to an unoccupied space you can see, before or after the extra action.'},
      {lvl:18,name:'Improved War Magic',desc:'When you use your action to cast any spell (not just cantrips), you can make one weapon attack as a bonus action.'},
    ]},
    'Arcane Archer':{src:'XGtE',desc:'Arcane Archers study a unique elven method of infusing arrows with magic, creating arcane shots with surprising effects.',feats:[
      {lvl:3,name:'Arcane Archer Lore',desc:'Proficiency in Arcana or Nature, and learn either the prestidigitation or druidcraft cantrip.'},
      {lvl:3,name:'Arcane Shot',desc:'Learn 2 Arcane Shot options (gain more at levels 7, 10, 15, 18). Twice per short or long rest, when you hit with a ranged weapon, apply an option — Banishing Arrow, Beguiling Arrow, Bursting Arrow, Enfeebling Arrow, Grasping Arrow, Piercing Arrow, Seeking Arrow, Shadow Arrow. INT or WIS is your spellcasting modifier.'},
      {lvl:7,name:'Magic Arrow',desc:'When you fire a nonmagical arrow, you can make it count as magical for overcoming resistance.'},
      {lvl:7,name:'Curving Shot',desc:'When you miss with an arrow, use a bonus action to reroll the attack against a different target within 60 ft of the original.'},
      {lvl:15,name:'Ever-Ready Shot',desc:'When you roll initiative with no Arcane Shots remaining, regain 1 Arcane Shot use.'},
    ]},
    'Cavalier':{src:'XGtE',desc:'Cavaliers are defenders on horseback, skilled at protecting their mount and allies and preventing enemies from fleeing.',feats:[
      {lvl:3,name:'Bonus Proficiency',desc:'Proficiency in Animal Handling, History, Insight, Performance, or Persuasion (one of your choice), or one language.'},
      {lvl:3,name:'Born to the Saddle',desc:'Advantage on saves to avoid falling off a mount. Mounting or dismounting costs only 5 ft of movement. Can force a melee attack targeting your mount to target you instead.'},
      {lvl:3,name:'Unwavering Mark',desc:'When you hit a creature with a melee attack, mark it until end of your next turn. While marked: disadvantage on attacks against targets other than you; once per turn as a bonus action (if the creature deals damage to someone other than you), you can make a melee attack against it (at advantage).'},
      {lvl:7,name:'Warding Maneuver',desc:'Reaction when you or a creature within 5 ft is hit: add 1d8 to AC for that attack; if the attack still hits, the target has resistance to that attack\'s damage. Uses = CON modifier per long rest.'},
      {lvl:10,name:'Hold the Line',desc:'Creatures provoke opportunity attacks when they move within 5 ft of you (not just away from you). On a hit with that opportunity attack, the creature\'s speed drops to 0 for the rest of the turn.'},
      {lvl:15,name:'Ferocious Charger',desc:'When you move 10+ ft in a straight line before hitting with a melee attack, force a STR save or knock the target prone. Once per turn.'},
      {lvl:18,name:'Vigilant Defender',desc:'You can make opportunity attacks without using your reaction — you can make one per creature per turn. You still can only take one reaction per turn.'},
    ]},
    'Samurai':{src:'XGtE',desc:'Samurai combine rigorous training with an indomitable will, fighting with grace through a resolve that transcends exhaustion or fear.',feats:[
      {lvl:3,name:'Bonus Proficiency',desc:'Proficiency in History, Insight, Performance, or Persuasion (or one language).'},
      {lvl:3,name:'Fighting Spirit',desc:'Bonus action: until end of your turn, you have advantage on weapon attack rolls and gain 5 temp HP (scales to 15 at level 15). Uses = 3 per long rest.'},
      {lvl:7,name:'Elegant Courtier',desc:'Add WIS modifier to CHA (Persuasion) checks. Gain proficiency in WIS saves, or if already proficient, one other save.'},
      {lvl:10,name:'Tireless Spirit',desc:'When you roll initiative with no Fighting Spirit uses left, regain 1 use.'},
      {lvl:15,name:'Rapid Strike',desc:'Once per turn, when you have advantage on an attack roll, you can forgo the advantage to make one additional attack as part of the Attack action.'},
      {lvl:18,name:'Strength Before Death',desc:'When you take damage that reduces you to 0 HP, delay it and take a bonus turn immediately (interrupting the current turn order). On your turn you can\'t gain HP. The deferred damage is applied after your turn. Once per long rest.'},
    ]},
    'Echo Knight':{src:'EGtW',desc:'Echo Knights have mastered dunamancy magic, creating shimmering echoes of themselves to extend their reach in combat.',feats:[
      {lvl:3,name:'Manifest Echo',desc:'Bonus action: summon an echo (AC 14+prof, 1 HP, immune to conditions, uses your stats for saves). Your echo can be up to 30 ft from you. When you attack, you can have the attack originate from your echo. Once per turn, you can teleport to your echo\'s space. Echo disappears if it takes damage, you dismiss it, or you summon another.'},
      {lvl:3,name:'Unleash Incarnation',desc:'When you take the Attack action, your echo can make one melee attack in its space as an additional attack. Uses = CON modifier per long rest.'},
      {lvl:7,name:'Echo Avatar',desc:'As an action, see and hear through your echo for up to 10 minutes (concentration). You become blinded/deafened to your own senses.'},
      {lvl:10,name:'Shadow Martyr',desc:'Reaction when an ally is attacked: move your echo to an unoccupied space within 5 ft of the targeted ally. That attack targets your echo instead. Once per short or long rest.'},
      {lvl:15,name:'Reclaim Potential',desc:'When your echo is destroyed by taking damage, gain 2d6 + CON modifier temp HP. Uses = CON modifier per long rest.'},
      {lvl:18,name:'Legion of One',desc:'When you roll initiative, summon two echoes (instead of one). Each can make Unleash Incarnation attacks. Regain all Unleash Incarnation uses when one echo is destroyed.'},
    ]},
    'Psi Warrior':{src:'TCoE',desc:'Psi Warriors awaken the psionic power within, using telekinetic force to augment their attacks and protect their allies.',feats:[
      {lvl:3,name:'Psionic Power',desc:'Psionic Energy dice (d6; two per short or long rest free; scales to d10 at level 11, d12 at level 17): Protective Field (reaction: reduce damage to a creature within 30 ft by the die roll + INT), Psionic Strike (after hitting with a weapon, expend a die for +1d6+INT force damage), Telekinetic Movement (move one Large or smaller creature/object within 30 ft up to 30 ft).'},
      {lvl:7,name:'Telekinetic Adept',desc:'Psi-Powered Leap: bonus action to gain fly speed = twice walk speed until end of turn. Telekinetic Thrust: when you deal Psionic Strike damage, target makes STR save vs. DC 8+prof+INT or is knocked prone or moved up to 10 ft.'},
      {lvl:10,name:'Guarded Mind',desc:'Resistance to psychic damage. If you begin your turn charmed or frightened, spend a Psionic Energy die to end all such conditions.'},
      {lvl:15,name:'Bulwark of Force',desc:'Bonus action: choose up to INT-modifier creatures within 30 ft. Each gains half cover until start of your next turn. Uses = prof bonus per long rest.'},
      {lvl:18,name:'Telekinetic Master',desc:'Cast telekinesis without a spell slot (concentration, INT spellcasting modifier). While concentrating, make one weapon attack as a bonus action. Once per long rest.'},
    ]},
    'Rune Knight':{src:'TCoE',desc:'Rune Knights study the magic of giants and inscribe runes onto their gear, growing to enormous size in combat.',feats:[
      {lvl:3,name:'Bonus Proficiency',desc:'Smith\'s tools. If you already have them, gain a different artisan\'s tool proficiency.'},
      {lvl:3,name:'Rune Carver',desc:'Learn 2 runes (gain more at levels 7, 10, 15). Inscribe each on one object. Invoke a rune\'s magic once per short or long rest. Examples: Cloud Rune (reaction: redirect an attack to another target), Fire Rune (on hit: deal extra 2d6 fire and restrain), Frost Rune (+2 Animal Handling and Intimidation), Hill Rune (resistance to bludgeoning/piercing/slashing), Stone Rune (reaction: WIS save or target is charmed, incapacitated, can\'t move), Storm Rune (bonus action: enter prophetic state — can\'t be surprised, add 1d6 to attack/check/save within the aura).'},
      {lvl:3,name:'Giant\'s Might',desc:'Bonus action: grow to Large size for 1 minute, gaining advantage on STR checks and saves, and dealing +1d6 on weapon attacks. Uses = prof bonus per long rest.'},
      {lvl:7,name:'Runic Shield',desc:'Reaction when a creature within 60 ft is hit by an attack roll: force the attacker to reroll and use the new result. Uses = prof bonus per long rest.'},
      {lvl:10,name:'Great Stature',desc:'Your runes permanently increase your height by 3d4 inches. Giant\'s Might now deals +1d8 instead of +1d6.'},
      {lvl:15,name:'Master of Runes',desc:'Invoke each rune twice per short or long rest (instead of once).'},
      {lvl:18,name:'Runic Juggernaut',desc:'Giant\'s Might now lets you grow to Huge size (5 ft reach increase, damage becomes +1d10). While in this form, your speed increases by 15 ft.'},
    ]},
  },
  Monk:{
    'Way of the Open Hand':{src:'PHB',desc:'Monks of the Way of the Open Hand are masters of the unarmed combat tradition, using ki to manipulate enemies\' bodies and energy.',feats:[
      {lvl:3,name:'Open Hand Technique',desc:'When you use Flurry of Blows, choose one effect for each hit: force a DEX save or be knocked prone, force a STR save or be pushed up to 15 ft away, or prevent the creature from taking reactions until end of your next turn.'},
      {lvl:6,name:'Wholeness of Body',desc:'As an action, regain HP equal to three times your monk level. Once per long rest.'},
      {lvl:11,name:'Tranquility',desc:'At the end of a long rest, gain the effect of a sanctuary spell until you start your next long rest (spell save DC = 8+prof+WIS).'},
      {lvl:17,name:'Quivering Palm',desc:'Spend 3 ki when you hit with an unarmed strike to set up imperceptible vibrations inside the target. As an action within monk level days, cause the target to drop to 0 HP (CON save for 10d10 necrotic instead).'},
    ]},
    'Way of Shadow':{src:'PHB',desc:'Shadow monks follow a tradition that values stealth and subterfuge. They may serve criminal enterprises or act as spies or assassins.',feats:[
      {lvl:3,name:'Shadow Arts',desc:'Spend 2 ki to cast darkness, darkvision, pass without trace, or silence (no spell slot, no concentration for pass without trace/silence). Also learn the minor illusion cantrip.'},
      {lvl:6,name:'Shadow Step',desc:'When you are in dim light or darkness, bonus action to teleport up to 60 ft to a dim-light-or-dark space. You have advantage on your first melee attack this turn.'},
      {lvl:11,name:'Cloak of Shadows',desc:'When you are in dim light or darkness, use your action to become invisible until you attack or cast a spell.'},
      {lvl:17,name:'Opportunist',desc:'Reaction when a creature within 5 ft is damaged by another creature: make an unarmed attack against that creature.'},
    ]},
    'Way of the Four Elements':{src:'PHB',desc:'Monks of this tradition channel the four elements into their ki, bending fire, water, earth, and air to their will.',feats:[
      {lvl:3,name:'Disciple of the Elements',desc:'Learn 2 elemental disciplines (more at level 6, 11, 17). Each discipline costs ki. Examples: Elemental Attunement (no cost, minor environmental manipulation), Fangs of the Fire Snake (1 ki: flame whip attack), Fist of Unbroken Air (2 ki: push/damage blast), Rush of the Gale Spirits (2 ki: gust of wind), Shaping the Flowing River (1 ki: manipulate water), Sweeping Cinder Strike (2 ki: burning hands), Water Whip (2 ki: lash + push/pull and knock prone). Higher disciplines available at level 11+.'},
      {lvl:6,name:'Additional Disciplines',desc:'Learn two more elemental disciplines.'},
      {lvl:11,name:'Additional Disciplines',desc:'Learn two more elemental disciplines; now eligible for Breath of Winter, Clench of the North Wind, Eternal Mountain Defense, Flames of the Phoenix, Gong of the Summit, Mist Stance, Ride the Wind, River of Hungry Flame, Rush of the Gale Spirits, Stones Endurance.'},
      {lvl:17,name:'Additional Disciplines',desc:'Learn two more elemental disciplines; now eligible for Avatar of the Elements and Wave of Rolling Earth.'},
    ]},
    'Way of the Drunken Master':{src:'XGtE',desc:'Drunken Masters move with unpredictable, staggering grace — appearing foolish while landing devastating strikes.',feats:[
      {lvl:3,name:'Bonus Proficiency',desc:'Proficiency in Performance and with brewer\'s supplies.'},
      {lvl:3,name:'Drunken Technique',desc:'When you use Flurry of Blows, you also benefit from Disengage and your walking speed increases by 10 ft until end of turn.'},
      {lvl:6,name:'Tipsy Sway',desc:'Leap to Your Feet: when prone, standing costs only 5 ft of movement instead of half. Redirect Attack: when a creature misses you with a melee attack, spend 1 ki as a reaction to redirect that attack to another creature within 5 ft.'},
      {lvl:11,name:'Drunkard\'s Luck',desc:'You have advantage on saving throws against being blinded, charmed, deafened, frightened, stunned, or paralyzed. When you use this, you must spend 2 ki.'},
      {lvl:17,name:'Intoxicated Frenzy',desc:'When you use Flurry of Blows, you can make up to three additional unarmed strikes (for a total of five), provided each strikes a different creature.'},
    ]},
    'Way of the Kensei':{src:'XGtE',desc:'Kensei monks treat their chosen weapons as extensions of their body, blending their martial art with swordsmanship into a single seamless whole.',feats:[
      {lvl:3,name:'Path of the Kensei',desc:'Choose 2 kensei weapons (one melee, one ranged) that become monk weapons. They must not have the heavy or special property. You gain +2 AC when you make an unarmed strike as a bonus action on your turn (until start of next turn). Also learn calligrapher\'s supplies proficiency.'},
      {lvl:3,name:'Agile Parry',desc:'If you make a melee attack with your kensei weapon as part of the Attack action, you can use a bonus action to make an unarmed strike and gain +2 AC until the start of your next turn.'},
      {lvl:3,name:'Kensei\'s Shot',desc:'When you attack with a kensei ranged weapon, use a bonus action to make the attack deal +1d4 damage on hit.'},
      {lvl:3,name:'Way of the Brush',desc:'Gain proficiency with calligrapher\'s supplies.'},
      {lvl:6,name:'One with the Blade',desc:'Your kensei weapons count as magical. Magic Kensei Weapons: spend 1 ki when you attack with a kensei weapon — for 1 minute, attacks with it count as magical and deal +1d6 damage.'},
      {lvl:11,name:'Sharpen the Blade',desc:'Bonus action: spend 1-3 ki to grant a kensei weapon a bonus to attack and damage rolls equal to ki spent (max +3) for 1 minute.'},
      {lvl:17,name:'Unerring Accuracy',desc:'Once per turn, if you miss with a monk weapon attack, you can reroll the attack roll.'},
    ]},
    'Way of the Sun Soul':{src:'XGtE',desc:'Sun Soul monks learn to channel their life energy into bolts of fire, creating blasts of radiant power to strike at a distance.',feats:[
      {lvl:3,name:'Radiant Sun Bolt',desc:'Ranged spell attack (range 30 ft): 1d4+DEX radiant damage. As a bonus action (1 ki), make two Radiant Sun Bolt attacks.'},
      {lvl:6,name:'Searing Arc Strike',desc:'After taking the Attack action, spend 2+ ki to cast burning hands as a bonus action (higher slots cost 1 additional ki per level above 1st).'},
      {lvl:11,name:'Searing Sunburst',desc:'Action: launch a ball of light at a point within 150 ft that explodes in a 20-ft radius (CON save, DC = 8+prof+WIS): 2d6 radiant damage, +2d6 per ki spent (up to 3 ki).'},
      {lvl:17,name:'Sun Shield',desc:'You emit bright light (30 ft) and dim light (30 ft beyond), and can toggle it on/off as a bonus action. When a creature hits you with a melee attack: reaction to deal 5+WIS radiant damage to it.'},
    ]},
    'Way of Mercy':{src:'TCoE',desc:'Mercy monks follow a healing and deadly tradition, wearing masks and practicing both the art of healing and the swift mercy of death.',feats:[
      {lvl:3,name:'Implements of Mercy',desc:'Proficiency in Insight and Medicine, and with herbalism kit. You wear a mask as part of this tradition.'},
      {lvl:3,name:'Hand of Healing',desc:'Spend 1 ki as an action (or as part of Flurry of Blows): touch a creature to restore 1d6+WIS HP, and optionally end one disease or condition.'},
      {lvl:3,name:'Hand of Harm',desc:'Once per turn when you hit with an unarmed strike, spend 1 ki to deal +1d6+WIS necrotic damage and impose the poisoned condition until end of your next turn.'},
      {lvl:6,name:'Physician\'s Touch',desc:'Hand of Healing can now also end one curse, disease, poison, blinded, or deafened condition. Hand of Harm can also impose the poisoned condition.'},
      {lvl:11,name:'Flurry of Healing and Harm',desc:'When you use Flurry of Blows, you can replace each unarmed strike with a Hand of Healing, with no ki cost.'},
      {lvl:17,name:'Hand of Ultimate Mercy',desc:'Spend 5 ki to touch a creature dead for up to 24 hours and cast raise dead on it without components. Once per long rest.'},
    ]},
    'Way of the Astral Self':{src:'TCoE',desc:'Astral Self monks learn to manifest their astral form, projecting spectral visages and arms that extend their reach and abilities.',feats:[
      {lvl:3,name:'Arms of the Astral Self',desc:'Spend 1 ki (bonus action) to summon spectral arms for 10 minutes. While active: use WIS for unarmed attacks/damage (replacing STR/DEX), unarmed strike range becomes 10 ft, deal 1d6 force damage on unarmed strikes (1d8 at level 11), and deflect missiles in the arms\' reach.'},
      {lvl:6,name:'Visage of the Astral Self',desc:'Spend 1 ki (bonus action) to summon a spectral visage for 10 minutes. You gain: darkvision 120 ft, advantage on WIS (Insight) and CHA (Intimidation), and can speak all languages.'},
      {lvl:11,name:'Body of the Astral Self',desc:'When you have both Arms and Visage active, you gain: reaction to add 1d6+WIS to your AC when hit, and +2d6 force damage when you Flurry of Blows.'},
      {lvl:17,name:'Awakened Astral Self',desc:'Spend 5 ki to unlock your full astral form for 10 minutes: additional +2 AC, astral arms deal +2d6 force, and you can fly at your walk speed.'},
    ]},
    'Way of the Ascendant Dragon':{src:'FToD',desc:'Ascendant Dragon monks learn to harness draconic power, channeling the energy of dragonkind through their ki.',feats:[
      {lvl:3,name:'Draconic Disciple',desc:'Learn Draconic language. Unarmed strikes deal your choice of acid, cold, fire, lightning, or poison damage. Speak a bonus action "dragon roar" (WIS save, DC 8+prof+WIS): targets within 30 ft are frightened until end of your next turn.'},
      {lvl:3,name:'Breath of the Dragon',desc:'Spend 1 ki to exhale a cone or line of elemental breath: 2d10 damage of your chosen type (DEX save for half). Scales to 3d10 at level 11, 4d10 at level 17.'},
      {lvl:6,name:'Wings Unfurled',desc:'When you use Step of the Wind, you can sprout spectral wings and gain fly speed = walk speed until end of turn.'},
      {lvl:11,name:'Aspect of the Wyrm',desc:'Spend 1 ki (bonus action) for 1 minute: emanate draconic power. Choose fear (creatures that start their turn within 30 ft must WIS save or be frightened) or damage reduction (you and allies within 30 ft have resistance to your chosen damage type).'},
      {lvl:17,name:'Ascendant Aspect',desc:'Blindsight 10 ft. When you use Breath of the Dragon, choose up to two creatures for it to not affect. When a creature fails the Aspect of the Wyrm save, deal 3d10 damage of your chosen type.'},
    ]},
  },
  Paladin:{
    'Oath of Devotion':{src:'PHB',desc:'The Oath of Devotion binds a paladin to the loftiest ideals of justice, virtue, and order. These knights are the archetypal knights in shining armor.',feats:[
      {lvl:3,name:'Channel Divinity: Sacred Weapon',desc:'Bonus action: for 1 minute, add CHA modifier to attack rolls with a weapon. The weapon emits bright light (20 ft) and dim light (20 ft). Counts as magical. Dismissible as a bonus action.'},
      {lvl:3,name:'Channel Divinity: Turn the Unholy',desc:'Present your holy symbol and speak a prayer. Fiends and undead within 30 ft that can hear you must succeed on a WIS save or be turned for 1 minute.'},
      {lvl:7,name:'Aura of Devotion',desc:'You and friendly creatures within 10 ft can\'t be charmed while you are conscious. At level 18 the aura extends to 30 ft.'},
      {lvl:15,name:'Purity of Spirit',desc:'You are always under the effects of a protection from evil and good spell.'},
      {lvl:20,name:'Holy Nimbus',desc:'As an action, an aura of sunlight (30 ft bright, 30 ft dim) lasts 1 minute. Enemies starting their turn in it take 10 radiant damage. You also have advantage on saves against spells cast by fiends and undead. Once per long rest.'},
    ]},
    'Oath of the Ancients':{src:'PHB',desc:'Paladins of the Ancients side with the light and living things, their power drawn from the natural world.',feats:[
      {lvl:3,name:'Channel Divinity: Nature\'s Wrath',desc:'Action: restrain a creature within 10 ft in spectral vines (STR or DEX save to escape at end of each turn).'},
      {lvl:3,name:'Channel Divinity: Turn the Faithless',desc:'Fey and fiends in range make WIS saves or are turned 1 minute; if they have nowhere to run, they\'re frightened.'},
      {lvl:7,name:'Aura of Warding',desc:'You and friendlies within 10 ft (30 ft at level 18) have resistance to damage from spells.'},
      {lvl:15,name:'Undying Sentinel',desc:'When you are reduced to 0 HP and not killed outright, drop to 1 HP instead. Once per long rest. You also don\'t suffer the negative effects of old age.'},
      {lvl:20,name:'Elder Champion',desc:'Assume the form of an ancient nature spirit for 1 minute. You regenerate 10 HP at the start of each turn. Cast each domain spell once without a slot. Enemies within 10 ft have disadvantage on saves against your paladin spells. Once per long rest.'},
    ]},
    'Oath of Vengeance':{src:'PHB',desc:'The Oath of Vengeance is a solemn commitment to punish those who have committed a grievous sin. These paladins are relentless hunters of evildoers.',feats:[
      {lvl:3,name:'Channel Divinity: Abjure Enemy',desc:'Action: choose a creature within 60 ft (WIS save). On failure: the creature is frightened and its speed is 0 for 1 minute. Fiends and undead have disadvantage on the save.'},
      {lvl:3,name:'Channel Divinity: Vow of Enmity',desc:'Bonus action: gain advantage on attack rolls against one creature you can see within 10 ft for 1 minute.'},
      {lvl:7,name:'Relentless Avenger',desc:'When you hit with an opportunity attack, you can move up to half your speed immediately after (doesn\'t provoke opportunity attacks).'},
      {lvl:15,name:'Soul of Vengeance',desc:'When a creature under your Vow of Enmity makes an attack, you can use your reaction to make a melee weapon attack against it if it\'s within range.'},
      {lvl:20,name:'Avenging Angel',desc:'Assume the form of an angelic avenger for 1 minute: wings (60 ft fly speed), and an aura of menace (30 ft). Enemies within the aura must succeed on a WIS save or be frightened and have disadvantage on attacks against you for 1 minute. Once per long rest.'},
    ]},
    'Oathbreaker':{src:'DMG',desc:'An Oathbreaker is a paladin who has broken their sacred oaths and embraced dark powers. Available with DM permission.',feats:[
      {lvl:3,name:'Channel Divinity: Control Undead',desc:'Action: target one undead within 30 ft. It must make a WIS save or be charmed by you for 24 hours or until it takes damage.'},
      {lvl:3,name:'Channel Divinity: Dreadful Aspect',desc:'Action: channel shadowy energy within 30 ft. Each enemy must succeed on a WIS save or be frightened of you for 1 minute.'},
      {lvl:7,name:'Aura of Hate',desc:'You and all fiends and undead within 10 ft (30 ft at level 18) add your CHA modifier to melee weapon damage rolls.'},
      {lvl:15,name:'Supernatural Resistance',desc:'Resistance to bludgeoning, piercing, and slashing from nonmagical weapons.'},
      {lvl:20,name:'Dread Lord',desc:'Become an avatar of destruction for 1 minute: 30-ft aura of gloom (dim light), frightened enemies have disadvantage on saves, melee attacks deal +3d10 psychic, once per turn force a frightened target within 30 ft to make a WIS save or drop to 0 HP. Once per long rest.'},
    ]},
    'Oath of Conquest':{src:'XGtE',desc:'Conquest paladins crush their enemies and demand surrender. They prefer fear and intimidation over fellowship.',feats:[
      {lvl:3,name:'Channel Divinity: Conquering Presence',desc:'Action: force creatures within 30 ft to make WIS saves or be frightened for 1 minute (repeat save at end of each turn).'},
      {lvl:3,name:'Channel Divinity: Guided Strike',desc:'When you make an attack roll, add +10 to the roll (similar to War Cleric).'},
      {lvl:7,name:'Aura of Conquest',desc:'Frightened creatures that start their turn within 10 ft (30 ft at level 18) have their speed reduced to 0 and take psychic damage = half your paladin level.'},
      {lvl:15,name:'Scornful Rebuke',desc:'Whenever a creature hits you with an attack while you\'re conscious, it takes psychic damage equal to your CHA modifier.'},
      {lvl:20,name:'Invincible Conqueror',desc:'Assume a form of invincibility for 1 minute: resistance to all damage, extra attack, critical hit on 19–20. Once per long rest.'},
    ]},
    'Oath of Redemption':{src:'XGtE',desc:'Redemption paladins seek to bring out the best in others, and prefer to avoid combat if possible — but they are formidable protectors.',feats:[
      {lvl:3,name:'Channel Divinity: Emissary of Peace',desc:'Bonus action: for 10 minutes, add +5 to Persuasion checks.'},
      {lvl:3,name:'Channel Divinity: Rebuke the Violent',desc:'Reaction when a creature within 30 ft deals damage to another creature: the attacker takes the same damage as radiant (WIS save for half).'},
      {lvl:7,name:'Aura of the Guardian',desc:'Reaction when a creature within 10 ft (30 ft at level 18) takes damage: you take that damage instead (not reduced, and it can\'t be redirected to you again).'},
      {lvl:15,name:'Protective Spirit',desc:'At the end of each of your turns when you have fewer than half your HP, regain HP = 1d6 + half your paladin level (if you\'re not incapacitated).'},
      {lvl:20,name:'Emissary of Redemption',desc:'You gain resistance to all damage dealt by other creatures (not objects). When a creature damages you, it takes radiant damage equal to half what it dealt. If you attack a creature or cast a harmful spell, this feature deactivates for 24 hours.'},
    ]},
    'Oath of Glory':{src:'TCoE',desc:'Glory paladins inspire greatness in others, bolstering allies and leading by example through legendary deeds.',feats:[
      {lvl:3,name:'Channel Divinity: Peerless Athlete',desc:'Bonus action: for 10 minutes, advantage on Athletics and Acrobatics checks; carry/push/drag capacity doubles; jump distance doubles.'},
      {lvl:3,name:'Channel Divinity: Inspiring Smite',desc:'Immediately after a Divine Smite, distribute temp HP equal to 2d8 + paladin level among creatures within 30 ft (including yourself).'},
      {lvl:7,name:'Aura of Alacrity',desc:'Your walking speed increases by 10 ft. Friendly creatures within 5 ft (10 ft at level 18) that start combat adjacent to you gain +10 ft speed on their first turn of combat.'},
      {lvl:15,name:'Glorious Defense',desc:'Reaction when you or a creature within 10 ft is hit: add CHA modifier to the target\'s AC for that hit. If the attack misses, you can make one weapon attack against the attacker. Uses = CHA modifier per long rest.'},
      {lvl:20,name:'Living Legend',desc:'For 1 minute: CHA bonus to attack rolls, once per turn on a failed save reroll it (must use new result), bonus action to cast mass cure wounds. Once per long rest.'},
    ]},
    'Oath of the Watchers':{src:'TCoE',desc:'Watchers guard against otherworldly threats from aberrations, celestials, elementals, fey, and fiends that seek to corrupt the mortal world.',feats:[
      {lvl:3,name:'Channel Divinity: Watcher\'s Will',desc:'Action: choose INT-modifier-number of creatures within 30 ft. For 1 minute, they have advantage on INT, WIS, and CHA saves.'},
      {lvl:3,name:'Channel Divinity: Abjure the Extraplanar',desc:'Action: creatures of type aberration, celestial, elemental, fey, or fiend within 30 ft must make WIS saves or be turned for 1 minute.'},
      {lvl:7,name:'Aura of the Sentinel',desc:'You and friendly creatures within 10 ft (30 ft at level 18) add proficiency bonus to initiative rolls.'},
      {lvl:15,name:'Vigilant Rebuke',desc:'Reaction when you or a creature you can see succeeds on an INT, WIS, or CHA save: deal 2d8 + CHA force damage to the creature that forced the save.'},
      {lvl:20,name:'Mortal Bulwark',desc:'For 1 minute: truesight 120 ft, advantage on attacks against aberrations/celestials/elementals/fey/fiends, on hit force a CHA save or the creature is banished (no concentration, ends at the end of your next turn). Once per long rest.'},
    ]},
  },
  Ranger:{
    'Hunter':{src:'PHB',desc:'Hunter rangers focus on mastering skills that are useful against a horde of threats. They learn to fight against many types of enemies.',feats:[
      {lvl:3,name:'Hunter\'s Prey',desc:'Choose one: Colossus Slayer (once per turn, +1d8 damage against a creature below max HP), Giant Killer (reaction attack against Large+ creatures that miss you), Horde Breaker (once per turn, attack another creature within 5 ft of original target with same weapon).'},
      {lvl:7,name:'Defensive Tactics',desc:'Choose one: Escape the Horde (opportunity attacks against you have disadvantage), Multiattack Defense (+4 AC against other attacks from a creature that just hit you), Steel Will (advantage on saves against being frightened).'},
      {lvl:11,name:'Multiattack',desc:'Choose one: Volley (action: shoot a ranged attack against all creatures within 10 ft of a point within normal range), Whirlwind Attack (action: make a melee attack against all creatures within 5 ft).'},
      {lvl:15,name:'Superior Hunter\'s Defense',desc:'Choose one: Evasion (DEX save for half → no damage on success), Stand Against the Tide (reaction when a creature misses you: force it to reroll at a target of your choice), Uncanny Dodge (reaction: halve one attack\'s damage).'},
    ]},
    'Beast Master':{src:'PHB',desc:'Beast Master rangers forge a deep bond with an animal companion and fight alongside it as equals.',feats:[
      {lvl:3,name:'Ranger\'s Companion',desc:'Choose a beast of CR 1/4 or lower. It obeys your commands and uses your proficiency bonus. It takes its turn on your initiative. If it dies, you can bond with a new one after 8 hours of training.'},
      {lvl:7,name:'Exceptional Training',desc:'On your turn (bonus action), you can command your companion to Dash, Disengage, Dodge, or Help even if it has already taken its turn. Your companion\'s attacks count as magical.'},
      {lvl:11,name:'Bestial Fury',desc:'Your beast companion can make two attacks instead of one when you command it to attack.'},
      {lvl:15,name:'Share Spells',desc:'When you cast a spell targeting yourself, you can also affect your beast companion if it is within 30 ft.'},
    ]},
    'Gloom Stalker':{src:'XGtE',desc:'Gloom Stalkers lurk in the darkest places and strike before their enemies know what hit them. They are a terror in the dark.',feats:[
      {lvl:3,name:'Dread Ambusher',desc:'Add WIS modifier to initiative rolls. On the first turn of combat, your walking speed increases by 10 ft, and if you take the Attack action, make one additional attack (1d8 extra damage on hit).'},
      {lvl:3,name:'Umbral Sight',desc:'Gain darkvision 60 ft (stack with existing darkvision). While in darkness, you are invisible to creatures that rely on darkvision.'},
      {lvl:7,name:'Iron Mind',desc:'Proficiency in WIS saves. If already proficient, choose INT or CHA saves instead.'},
      {lvl:11,name:'Stalker\'s Flurry',desc:'Once per turn when you miss an attack, you can immediately make another attack.'},
      {lvl:15,name:'Shadowy Dodge',desc:'Reaction when a creature attacks you: impose disadvantage on the attack roll.'},
    ]},
    'Horizon Walker':{src:'XGtE',desc:'Horizon Walkers guard the multiverse against extraplanar threats and are comfortable moving between planes.',feats:[
      {lvl:3,name:'Detect Portal',desc:'Sense the presence of planar portals within 1 mile (action). Once per short or long rest.'},
      {lvl:3,name:'Planar Warrior',desc:'Bonus action when you make an Attack action: choose a creature. Your next attack deals extra 1d8 force damage, and the damage type changes to force. At level 11, deals 2d8.'},
      {lvl:7,name:'Ethereal Step',desc:'Bonus action at start of your turn: cast etherealness spell (no slot) until end of your turn. Once per short or long rest.'},
      {lvl:11,name:'Distant Strike',desc:'When you take the Attack action, teleport up to 10 ft before each attack. If you attack two different creatures this turn, make a third attack against a third creature.'},
      {lvl:15,name:'Spectral Defense',desc:'Reaction when you take damage: gain resistance to that damage type until end of your next turn (including the triggering damage).'},
    ]},
    'Monster Slayer':{src:'XGtE',desc:'Monster Slayers hunt supernatural threats: vampires, dragons, evil fey. They are expert at disrupting magic and defeating powerful monsters.',feats:[
      {lvl:3,name:'Hunter\'s Sense',desc:'Action: identify a creature\'s damage immunities, resistances, and vulnerabilities (if any) within 60 ft. Uses = WIS modifier per long rest.'},
      {lvl:3,name:'Slayer\'s Prey',desc:'Bonus action: choose one creature within 60 ft. Once per turn when you hit it, deal extra 1d6 damage. Lasts until prey drops to 0 or you use it on another.'},
      {lvl:7,name:'Supernatural Defense',desc:'When your Slayer\'s Prey forces a save, add 1d6 to the roll. When it grapples you, add 1d6 to your escape attempt.'},
      {lvl:11,name:'Magic-User\'s Nemesis',desc:'Reaction when a creature within 60 ft casts a spell or teleports: impose disadvantage on the concentration check or teleport attempt (WIS save). Once per short or long rest.'},
      {lvl:15,name:'Slayer\'s Counter',desc:'Reaction when your Slayer\'s Prey forces you to make a saving throw: make one weapon attack against it. On a hit, you have advantage on the saving throw.'},
    ]},
    'Fey Wanderer':{src:'TCoE',desc:'Fey Wanderers carry the magic of the Feywild with them, dealing psychic damage and charming or terrifying foes.',feats:[
      {lvl:3,name:'Dreadful Strikes',desc:'Once per turn when you hit with a weapon, deal +1d4 psychic damage (scales to 1d6 at level 11).'},
      {lvl:3,name:'Fey Wanderer Magic',desc:'Always have charm person, misty step, dispel magic, dimension door, mislead prepared (at appropriate levels).'},
      {lvl:3,name:'Otherworldly Glamour',desc:'Add WIS modifier to CHA checks (if not already adding a modifier). Proficiency in Deception, Performance, or Persuasion.'},
      {lvl:7,name:'Beguiling Twist',desc:'Reaction when a creature within 120 ft succeeds on a save against charm or fear: apply that condition to a different creature within 30 ft of the first (WIS save negates).'},
      {lvl:11,name:'Fey Reinforcements',desc:'Cast summon fey once without a slot. Can also replace a slot to cast it. Once per long rest for the free casting.'},
      {lvl:15,name:'Misty Wanderer',desc:'Cast misty step without a slot (uses = WIS modifier per long rest). When you cast it, take one willing creature within 5 ft along.'},
    ]},
    'Swarmkeeper':{src:'TCoE',desc:'Swarmkeepers bond with a swarm of nature spirits in the form of Tiny creatures that surround them, aiding in attacks and movement.',feats:[
      {lvl:3,name:'Gathered Swarm',desc:'A swarm of nature spirits surrounds you. Once per turn when you hit, choose one effect: deal +1d6 piercing damage, push target 15 ft (STR save negates), or move yourself up to 5 ft without provoking opportunity attacks.'},
      {lvl:3,name:'Swarmkeeper Magic',desc:'Always have mage hand prepared. The hand takes the form of your swarm.'},
      {lvl:7,name:'Writhing Tide',desc:'Bonus action: ride the swarm to gain a flying speed of 10 ft for 1 minute. Uses = prof bonus per long rest.'},
      {lvl:11,name:'Mighty Swarm',desc:'Gathered Swarm improves: push becomes 30 ft and knocks prone, self-movement becomes 10 ft and doesn\'t provoke, and extra damage becomes 1d8.'},
      {lvl:15,name:'Swarming Dispersal',desc:'Reaction when you take damage: become invisible and teleport up to 30 ft. You remain invisible until end of your next turn or until you attack/cast. Uses = prof bonus per long rest.'},
    ]},
    'Drakewarden':{src:'FToD',desc:'Drakewardens bond with a drake companion, nurturing it as it grows from a Small beast into a powerful draconic mount.',feats:[
      {lvl:3,name:'Draconic Gift',desc:'Learn Draconic language. Also learn the thaumaturgy cantrip.'},
      {lvl:3,name:'Drake Companion',desc:'Bond with a drake (Small dragon, 5+5×ranger level HP, AC 14+prof). It obeys your commands. As a bonus action, you can command it to attack, dealing 1d6+prof piercing damage. At level 7 it grows to Medium, level 15 Large.'},
      {lvl:7,name:'Bond of Fang and Scale',desc:'Your drake\'s natural weapons deal your chosen damage type. You can ride the drake (Large at level 15). While mounted or within 5 ft, you have resistance to your drake\'s damage type.'},
      {lvl:11,name:'Drake\'s Breath',desc:'Action (or bonus action commanding your drake): breathe a 30-ft cone or 60-ft line of your chosen damage type (8d6 damage, DEX save for half). Uses = prof bonus per long rest.'},
      {lvl:15,name:'Perfected Bond',desc:'Your drake gains a flying speed of 40 ft. While mounted on it, cast spells targeting only yourself as if targeting both you and the drake.'},
    ]},
  },
  Rogue:{
    'Thief':{src:'PHB',desc:'Thieves are hoarders of skills, picking up new abilities wherever they can to become the ultimate generalists of stealth and infiltration.',feats:[
      {lvl:3,name:'Fast Hands',desc:'Use Cunning Action to also: make a Sleight of Hand check, use a tool, or take the Use an Object action.'},
      {lvl:3,name:'Second-Story Work',desc:'Climb speed = walk speed. Running jump distance increases by DEX modifier.'},
      {lvl:9,name:'Supreme Sneak',desc:'Advantage on Stealth checks when moving at half speed.'},
      {lvl:13,name:'Use Magic Device',desc:'Ignore all class, race, and level requirements on magic items.'},
      {lvl:17,name:'Thief\'s Reflexes',desc:'In the first round of combat, take two turns (one at your normal initiative, one at -10).'},
    ]},
    'Assassin':{src:'PHB',desc:'Assassins specialize in killing quickly and efficiently — ideally before combat truly begins.',feats:[
      {lvl:3,name:'Bonus Proficiencies',desc:'Proficiency with disguise kit and poisoner\'s kit.'},
      {lvl:3,name:'Assassinate',desc:'Advantage on attack rolls against creatures that haven\'t taken a turn yet. Hits against surprised creatures are automatic critical hits.'},
      {lvl:9,name:'Infiltration Expertise',desc:'Spend 7 days and 25 gp to create a false identity including documentation and established history. While using it, advantage on Deception checks to pass as that identity.'},
      {lvl:13,name:'Impostor',desc:'After 3 hours of studying a creature, perfectly mimic its speech, writing, and behavior. Observers must succeed on a Perception check vs. your Deception to detect the forgery.'},
      {lvl:17,name:'Death Strike',desc:'When you score a critical hit on a surprised creature, it must make a CON save (DC = 8+DEX+prof) or take double damage from the attack.'},
    ]},
    'Arcane Trickster':{src:'PHB',desc:'Arcane Tricksters combine spellcasting with roguish skills, using illusion and enchantment magic to distract foes and escape danger.',feats:[
      {lvl:3,name:'Spellcasting',desc:'Cast spells from the wizard list (mainly illusion and enchantment). INT is your spellcasting ability. You have spell slots like a one-third caster.'},
      {lvl:3,name:'Mage Hand Legerdemain',desc:'Your mage hand is invisible. As a bonus action, stow/retrieve items from another creature\'s container, pick locks, and disarm traps — all from 30 ft, using Sleight of Hand.'},
      {lvl:9,name:'Magical Ambush',desc:'When you are hidden from a creature when you cast a spell, it has disadvantage on the saving throw.'},
      {lvl:13,name:'Versatile Trickster',desc:'Bonus action: use Mage Hand to distract a creature within 5 ft of the hand. You gain advantage on your next attack against that creature this turn.'},
      {lvl:17,name:'Spell Thief',desc:'Reaction when a creature casts a spell targeting you: make a saving throw against the spell\'s save DC using the relevant save. On success, negate the spell and prepare it yourself (lasts 8 hours). Once per long rest.'},
    ]},
    'Inquisitive':{src:'XGtE',desc:'Inquisitives excel at rooting out secrets and are often found in service of law, temples, or themselves as private investigators.',feats:[
      {lvl:3,name:'Ear for Deceit',desc:'Minimum roll of 8 for Insight checks (treat rolls below 8 as 8).'},
      {lvl:3,name:'Eye for Detail',desc:'Bonus action: make a Perception check to spot a hidden creature or object, or an Investigation check to uncover clues.'},
      {lvl:3,name:'Insightful Fighting',desc:'Bonus action: make an Insight check vs. a creature\'s Deception. On success, Sneak Attack that creature even without ally adjacency (lasts until combat ends or you successfully use this against another). Doesn\'t require advantage.'},
      {lvl:9,name:'Steady Eye',desc:'If you don\'t move during your turn, advantage on Perception and Investigation checks.'},
      {lvl:13,name:'Unerring Eye',desc:'Action: sense the presence of illusions, shapechangers, hidden objects, or planar portals within 30 ft (not blocked by cover). Uses = WIS modifier per long rest.'},
      {lvl:17,name:'Eye for Weakness',desc:'While Insightful Fighting is active against a creature, your Sneak Attack deals +3d6 extra damage against it.'},
    ]},
    'Mastermind':{src:'XGtE',desc:'Masterminds are information brokers and tacticians who use people as pieces in elaborate schemes.',feats:[
      {lvl:3,name:'Master of Intrigue',desc:'Proficiency with disguise kit, forgery kit, and one gaming set. Speak two extra languages. Mimic the accent and speech patterns of another region after 1 hour of listening.'},
      {lvl:3,name:'Master of Tactics',desc:'Help action range is 30 ft. You can Help a creature with their attacks even if you aren\'t adjacent to the enemy.'},
      {lvl:9,name:'Insightful Manipulator',desc:'After 1 minute of interaction, learn two of: CHA score, INT score, levels in a class, or class levels compared to you.'},
      {lvl:13,name:'Misdirection',desc:'Bonus action: distract a creature within 30 ft that can see you. It thinks an adjacent ally that it can\'t see is you, and that ally can Hide as a bonus action.'},
      {lvl:17,name:'Soul of Deceit',desc:'Your thoughts can\'t be read by telepathy or divination unless you choose. Lie detectors always detect you as telling the truth. You can freely use Deception even while under a truth-compelling spell (they can\'t detect your lie).'},
    ]},
    'Scout':{src:'XGtE',desc:'Scouts are skilled in stealth and surviving far from civilization. They are expert at moving quickly through terrain and ambushing unsuspecting enemies.',feats:[
      {lvl:3,name:'Skirmisher',desc:'Reaction when a creature ends its turn within 5 ft of you: move up to half your speed without provoking opportunity attacks.'},
      {lvl:3,name:'Survivalist',desc:'Proficiency and expertise in Nature and Survival.'},
      {lvl:9,name:'Superior Mobility',desc:'Walking speed increases by 10 ft. Also gain climb speed and swim speed equal to your walking speed.'},
      {lvl:13,name:'Ambush Master',desc:'Advantage on initiative rolls. On your first turn, creatures you attack can be Sneak Attacked even if you aren\'t hidden and they aren\'t adjacent to an ally.'},
      {lvl:17,name:'Sudden Strike',desc:'On your first turn of combat, if you take the Attack action, you can make two attacks instead of one as part of that action. Both can benefit from Sneak Attack (against different targets).'},
    ]},
    'Swashbuckler':{src:'XGtE',desc:'Swashbucklers excel in single combat, using panache and finesse rather than brute force. They never stay in one place long enough for enemies to surround them.',feats:[
      {lvl:3,name:'Fancy Footwork',desc:'When you make a melee attack against a creature, it can\'t make opportunity attacks against you for the rest of your turn.'},
      {lvl:3,name:'Rakish Audacity',desc:'Add CHA modifier to initiative. You can Sneak Attack a creature you\'re dueling (you\'re within 5 ft, no other creatures are within 5 ft of you, and you don\'t have disadvantage) without needing an ally adjacent.'},
      {lvl:9,name:'Panache',desc:'Action: make a Persuasion check vs. a creature\'s Insight. Non-hostile: charmed by you for 1 minute (doesn\'t break on attacks from allies). Hostile: taunted — disadvantage on attacks against others, can\'t make opportunity attacks against non-you, lasts 1 minute or until it can\'t see you.'},
      {lvl:13,name:'Elegant Maneuver',desc:'Bonus action: advantage on your next Acrobatics or Athletics check.'},
      {lvl:17,name:'Master Duelist',desc:'Once per short or long rest, if you miss an attack roll, you can reroll it with advantage.'},
    ]},
    'Phantom':{src:'TCoE',desc:'Phantom rogues dabble in the magic of death, stealing memories and proficiencies from the dead.',feats:[
      {lvl:3,name:'Whispers of the Dead',desc:'When you finish a short or long rest, a remnant of a dead soul whispers to you — gain proficiency in one skill or tool of your choice until your next rest.'},
      {lvl:3,name:'Wails from the Grave',desc:'After dealing Sneak Attack damage, send necrotic energy into a second creature within 30 ft of the first: 1/2 Sneak Attack dice in necrotic damage (no save). Uses = prof bonus per long rest.'},
      {lvl:9,name:'Tokens of the Departed',desc:'Reaction when a creature within 30 ft dies: create a Trinket Soul (small token). You can hold up to prof-bonus trinkets. Spend one (as a bonus action) to ask the soul one question; spend one as you Wails from the Grave to regain a use.'},
      {lvl:13,name:'Ghost Walk',desc:'Bonus action: assume a spectral form for 10 minutes. Fly 10 ft. Resistance to all damage except psychic and force. Move through creatures and objects (end turn inside = 1d10 force). Once per long rest (or spend a Token of the Departed).'},
      {lvl:17,name:'Death\'s Friend',desc:'Wails from the Grave now also deals damage equal to your Sneak Attack to the primary target (not half). Also, one Whispers of the Dead proficiency is now permanent.'},
    ]},
    'Soulknife':{src:'TCoE',desc:'Soulknives channel psychic energy into lethal blades, slipping into targets\' minds as easily as through their armor.',feats:[
      {lvl:3,name:'Psionic Power',desc:'Psionic Energy dice (PED, d6 scaling to d12 at level 17; two free per short or long rest): Psi-Bolstered Knack (fail an ability check using prof: expend a PED and add it, possibly succeeding), Psychic Whispers (spend a PED to communicate telepathically for hours = PED roll, with up to prof-bonus creatures).'},
      {lvl:3,name:'Psychic Blades',desc:'When you take the Attack action, manifest a psychic blade in a free hand (bonus action for off-hand): ranged 60 ft or melee, dealing 1d6 psychic (1d4 off-hand). It\'s a magical finesse weapon; it vanishes after hitting or missing.'},
      {lvl:9,name:'Soul Blades',desc:'Homing Strikes: when psychic blade misses, spend a PED to add the roll to the attack (maybe turning a miss into hit). Psychic Teleportation: bonus action to fling a psychic blade up to 30 ft and teleport to a space within 3 ft of where it lands.'},
      {lvl:13,name:'Psychic Veil',desc:'Action: become invisible for 1 hour. Ends when you choose, attack, or force a save. Once per long rest (or PED).'},
      {lvl:17,name:'Rend Mind',desc:'When you use Psychic Blades and deal Sneak Attack damage, force a WIS save (DC 8+prof+DEX/INT). On failure, target is stunned until end of your next turn. Once per long rest (or three PEDs).'},
    ]},
  },
  Sorcerer:{
    'Draconic Bloodline':{src:'PHB',desc:'Your innate magic comes from draconic magic that was mingled with your blood. Most often, sorcerers with this origin trace their descent to a mighty dragon.',feats:[
      {lvl:1,name:'Dragon Ancestor',desc:'Choose a dragon type — it determines your damage affinity (fire, cold, lightning, etc.). You can speak, read, and write Draconic. Charisma checks with dragons have advantage.'},
      {lvl:1,name:'Draconic Resilience',desc:'HP maximum increases by 1 per sorcerer level. When not wearing armor, AC = 13 + DEX modifier.'},
      {lvl:6,name:'Elemental Affinity',desc:'When you cast a spell dealing damage of your dragon ancestor type, add CHA modifier to one damage roll. Spend 1 sorcery point to gain resistance to that damage type for 1 hour.'},
      {lvl:14,name:'Dragon Wings',desc:'Bonus action: sprout dragon wings and gain a fly speed = walk speed. Wings last until dismissed or you use armor.'},
      {lvl:18,name:'Draconic Presence',desc:'Spend 5 sorcery points as an action: 60-ft aura for 1 minute (concentration). Enemies in the aura must make WIS saves or be frightened or charmed (your choice).'},
    ]},
    'Wild Magic':{src:'PHB',desc:'Wild Magic sorcerers have a connection to the raw chaos of magic. Their spells sometimes trigger unpredictable effects from the Wild Magic Surge table.',feats:[
      {lvl:1,name:'Wild Magic Surge',desc:'When you cast a sorcerer spell of 1st level or higher, the DM can call for a Wild Magic Surge (roll d20; on a 1, roll d100 on the Surge table). Effects include: casting random spells, exploding in fire, turning invisible, growing, being stunned, becoming small.'},
      {lvl:1,name:'Tides of Chaos',desc:'Gain advantage on one attack roll, ability check, or saving throw. Recharges on long rest (or after the DM triggers a Wild Magic Surge from you).'},
      {lvl:6,name:'Bend Luck',desc:'Reaction: spend 2 sorcery points to add or subtract 1d4 from a creature\'s attack roll, ability check, or saving throw within 120 ft (choose before the roll is resolved).'},
      {lvl:14,name:'Controlled Chaos',desc:'When you roll on the Wild Magic Surge table, roll twice and choose either result.'},
      {lvl:18,name:'Spell Bombardment',desc:'Once per turn when you roll damage for a spell and roll the highest possible result on a die, add another roll of that die to the damage.'},
    ]},
    'Divine Soul':{src:'XGtE',desc:'Divine Souls have a spark of divine power in their blood, blending arcane and divine magic with access to both sorcerer and cleric spell lists.',feats:[
      {lvl:1,name:'Divine Magic',desc:'You can learn spells from the cleric spell list (they count as sorcerer spells). Also learn one cleric spell of your choice.'},
      {lvl:1,name:'Favored by the Gods',desc:'If you fail a death save or miss a creature with an attack roll, add 2d4 to the roll. Once per short or long rest.'},
      {lvl:6,name:'Empowered Healing',desc:'Spend 1 sorcery point as a bonus action when you or an ally within 5 ft rolls dice to regain HP: reroll any number of those dice and use the new results. Once per turn.'},
      {lvl:14,name:'Otherworldly Wings',desc:'Bonus action: sprout wings (angelic or fiendish). Fly speed = walk speed. You can dismiss and resummon them freely.'},
      {lvl:18,name:'Unearthly Recovery',desc:'When you have fewer than half your HP maximum, use a bonus action: regain HP equal to half your HP maximum. Once per long rest.'},
    ]},
    'Shadow Magic':{src:'XGtE',desc:'Shadow sorcerers draw power from the Shadowfell. They are survivors of dark places and their magic is tinged with death.',feats:[
      {lvl:1,name:'Eyes of the Dark',desc:'Darkvision 120 ft. At level 3, cast darkness for 2 sorcery points; you can see through this darkness.'},
      {lvl:1,name:'Strength of the Grave',desc:'When damage reduces you to 0 HP (not radiant, not critical hit): CON save DC = 5 + damage dealt. On success, drop to 1 HP instead. Once per long rest.'},
      {lvl:6,name:'Hound of Ill Omen',desc:'Spend 3 sorcery points as a bonus action to summon a hound (stats of a dire wolf) targeting a creature within 30 ft. It appears within 30 ft of the target and tracks it. While within 5 ft of the target: the target has disadvantage on saves against your spells. Lasts 5 minutes or until dropped to 0 HP.'},
      {lvl:14,name:'Shadow Walk',desc:'When you are in dim light or darkness, bonus action to teleport up to 120 ft to an unoccupied dim-or-dark space you can see.'},
      {lvl:18,name:'Umbral Form',desc:'Spend 6 sorcery points as a bonus action: become shadow for 1 minute. Resistance to all damage except force and radiant. Move through creatures/objects (3 ft inside at end of turn = 1d10 force). Dim light or darkness-only movement through objects.'},
    ]},
    'Storm Sorcery':{src:'XGtE',desc:'Storm sorcerers have power over wind and lightning, drawing their magic from the fury of storms.',feats:[
      {lvl:1,name:'Wind Speaker',desc:'Speak, read, and write Primordial (and thus Aquan, Auran, Ignan, Terran).'},
      {lvl:1,name:'Tempestuous Magic',desc:'When you cast a spell of 1st level or higher, as a bonus action on the same turn, you can fly up to 10 ft without provoking opportunity attacks.'},
      {lvl:6,name:'Heart of the Storm',desc:'Resistance to lightning and thunder damage. When you cast a spell dealing lightning or thunder damage, deal CHA-modifier lightning or thunder damage (your choice) to all creatures within 10 ft.'},
      {lvl:6,name:'Storm Guide',desc:'Stop rain within 20 ft (no concentration). Bonus action (concentration): choose wind direction within 100 ft.'},
      {lvl:14,name:'Storm\'s Fury',desc:'Reaction when hit by a melee attack: deal 2d6 lightning damage to attacker and force a STR save or be pushed 20 ft.'},
      {lvl:18,name:'Wind Soul',desc:'Immunity to lightning and thunder damage. Fly speed of 60 ft. Reduce fly speed to 30 ft to share it with up to 3 willing creatures within 30 ft (they must fly within 30 ft of you).'},
    ]},
    'Aberrant Mind':{src:'TCoE',desc:'Aberrant Mind sorcerers have a psionic connection to aberrant creatures from the Far Realm, granting telepathy and alien power.',feats:[
      {lvl:1,name:'Telepathic Speech',desc:'Speak telepathically with one creature within 30 ft for CHA-modifier minutes. It need not share a language. Once per long rest.'},
      {lvl:1,name:'Psionic Spells',desc:'Always have certain spells prepared (arms of Hadar, dissonant whispers, calm emotions, detect thoughts, hunger of Hadar, sending, Evard\'s black tentacles, summon aberration, telepathy, telekinesis). Spend 1 sorcery point to cast any of these without using a spell slot (once each per long rest).'},
      {lvl:6,name:'Warped Being',desc:'Resistance to psychic damage. When you cast a sorcerer spell, you can expend a sorcery point to temporarily reshape your body: gain one mutation (roll or choose from table) lasting 1 minute.'},
      {lvl:14,name:'Revelation in Flesh',desc:'Spend 1+ sorcery points as a bonus action for 10 minutes: gain one benefit per point — swim speed = walk (and breathe water), fly speed = walk, move through creatures/objects, see into Ethereal Plane 60 ft. Max 4 points.'},
      {lvl:18,name:'Warping Implosion',desc:'Action: teleport up to 120 ft. Creatures within 30 ft of your original space make STR saves (DC = spell save DC) or be pulled up to 30 ft toward your destination and take 3d10 force damage. Once per long rest (or 5 sorcery points).'},
    ]},
    'Clockwork Soul':{src:'TCoE',desc:'Clockwork Soul sorcerers draw magic from the plane of absolute order (Mechanus), countering chaos and imposing cosmic balance.',feats:[
      {lvl:1,name:'Clockwork Magic',desc:'Always have certain spells prepared (alarm, protection from evil and good, aid, lesser restoration, dispel magic, protection from energy, freedom of movement, summon construct, wall of force, hold monster).'},
      {lvl:1,name:'Restore Balance',desc:'Reaction when a creature about to roll with advantage or disadvantage within 60 ft: cancel the advantage or disadvantage. Uses = prof bonus per long rest.'},
      {lvl:6,name:'Bulwark of Law',desc:'Action: expend 1–5 sorcery points, giving a creature within 30 ft a number of d8s equal to the points spent. That creature can roll one die and subtract it from one damage roll it suffers (until next long rest).'},
      {lvl:14,name:'Trance of Order',desc:'Bonus action: enter a state of clockwork consciousness for 1 minute. Your attacks can\'t have disadvantage, and creatures can\'t have advantage against your saves. Once per long rest (or 5 sorcery points).'},
      {lvl:18,name:'Clockwork Cavalcade',desc:'Action: call on Mechanus itself. Within a 30-ft cube: repair up to 100 HP among constructs/objects, end all spells of 6th level or lower, and remove all curses/poisons/diseases. Once per long rest.'},
    ]},
  },
  Warlock:{
    'The Archfey':{src:'PHB',desc:'Your patron is a lord of the Feywild, whose whims and moods are inscrutable and whose power is enormous. Fey Presence and Misty Escape make you elusive and terrifying.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Faerie fire, sleep, calm emotions, phantasmal force, blink, plant growth, dominate beast, greater invisibility, dominate person, seeming.'},
      {lvl:1,name:'Fey Presence',desc:'Action: charm or frighten all creatures within 10 ft (WIS save) until end of your next turn. Once per short or long rest.'},
      {lvl:6,name:'Misty Escape',desc:'Reaction when you take damage: become invisible and teleport up to 60 ft (until start of your next turn or until you attack/force a save). Once per short or long rest.'},
      {lvl:10,name:'Beguiling Defenses',desc:'Immune to the charmed condition. Reaction when a creature tries to charm you: turn the charm back on it (WIS save, lasts 1 minute).'},
      {lvl:14,name:'Dark Delirium',desc:'Action: charm or frighten a creature within 60 ft for 1 minute (WIS save ends at end of each turn). While charmed/frightened, the creature is incapacitated and speed is 0. Once per short or long rest.'},
    ]},
    'The Fiend':{src:'PHB',desc:'You have made a pact with a fiend whose power touches the lower planes. The Fiend is widely considered one of the strongest warlock subclasses due to Dark One\'s Blessing and the spell list.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Burning hands, command, blindness/deafness, scorching ray, fireball, stinking cloud, fire shield, wall of fire, flame strike, hallow.'},
      {lvl:1,name:'Dark One\'s Blessing',desc:'When you reduce a hostile creature to 0 HP, gain temp HP equal to CHA modifier + warlock level.'},
      {lvl:6,name:'Dark One\'s Own Luck',desc:'Add 1d10 to one ability check or saving throw. Once per short or long rest.'},
      {lvl:10,name:'Fiendish Resilience',desc:'After a short or long rest, choose one damage type. You have resistance to that type until you choose a different one.'},
      {lvl:14,name:'Hurl Through Hell',desc:'Reaction when you hit a creature: send it through hell. It disappears until end of your next turn and takes 10d10 psychic damage (no save). Once per long rest.'},
    ]},
    'The Great Old One':{src:'PHB',desc:'Your patron is an unfathomable entity of the Far Realm. You gain telepathic abilities and unsettling knowledge.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Dissonant whispers, Tasha\'s hideous laughter, detect thoughts, phantasmal force, clairvoyance, sending, dominate beast, Evard\'s black tentacles, dominate person, telepathy.'},
      {lvl:1,name:'Awakened Mind',desc:'Telepathically speak to a creature you can see within 30 ft in any language. It doesn\'t need to know the language; you don\'t need to share one.'},
      {lvl:6,name:'Entropic Ward',desc:'Reaction when attacked: impose disadvantage on the attack. If it misses, you have advantage on your next attack against it. Once per short or long rest.'},
      {lvl:10,name:'Thought Shield',desc:'Your thoughts can\'t be read. Resistance to psychic damage. When a creature deals psychic damage to you, it takes the same amount.'},
      {lvl:14,name:'Create Thrall',desc:'Touch an incapacitated humanoid: charm it. Charmed creatures are charmed by you until a remove curse spell is cast on it. You can communicate telepathically with it (any distance, same plane).'},
    ]},
    'The Celestial':{src:'XGtE',desc:'Your patron is a powerful being of the Upper Planes. You can heal allies as you cast spells of destruction, a holy light counterbalancing your patron\'s power.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Cure wounds, guiding bolt, flaming sphere, lesser restoration, daylight, revivify, guardian of faith, wall of fire, flame strike, greater restoration.'},
      {lvl:1,name:'Bonus Cantrips',desc:'Learn sacred flame and light.'},
      {lvl:1,name:'Healing Light',desc:'Pool of d6s = 1+warlock level. Bonus action: expend dice (up to CHA modifier at once) and restore that much HP to a creature within 60 ft.'},
      {lvl:6,name:'Radiant Soul',desc:'Resistance to radiant damage. Once per turn when you cast a spell dealing fire or radiant damage, add CHA modifier to one damage roll.'},
      {lvl:10,name:'Celestial Resilience',desc:'At end of a short or long rest, you and up to 5 allies gain temp HP: you gain 10 + CHA modifier, allies gain 5 + CHA modifier.'},
      {lvl:14,name:'Searing Vengeance',desc:'When you would make a death saving throw, you can instead recover HP equal to half your max HP and stand up, and hostile creatures within 30 ft take 2d8 radiant damage and are blinded until end of your next turn. Once per long rest.'},
    ]},
    'The Hexblade':{src:'XGtE',desc:'The Hexblade is a powerful martial warlock, creating a shadowy weapon and cursing enemies to their doom. Widely considered one of the strongest warlock subclasses.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Shield, wrathful smite, blur, branding smite, blink, elemental weapon, phantasmal killer, staggering smite, banishing smite, cone of cold.'},
      {lvl:1,name:'Hexblade\'s Curse',desc:'Bonus action: curse a creature within 30 ft for 1 minute. You gain proficiency bonus to damage rolls against it; score a crit on 19-20; regain HP = CHA modifier + warlock level when it dies. Once per short or long rest.'},
      {lvl:1,name:'Hex Warrior',desc:'Proficiency with medium armor, shields, and martial weapons. Choose one non-heavy non-two-handed weapon — use CHA for attack/damage with it. After a long rest, choose any weapon you\'re holding.'},
      {lvl:6,name:'Accursed Specter',desc:'When you kill a humanoid, capture its specter. The specter serves you for 24 hours (once per long rest).'},
      {lvl:10,name:'Armor of Hexes',desc:'Reaction when your Hexblade\'s Curse target hits you: roll a d6. On 4+, the attack misses instead.'},
      {lvl:14,name:'Master of Hexes',desc:'When a creature under Hexblade\'s Curse dies, you can transfer the curse to a new creature within 30 ft (no action required). The curse doesn\'t end when the creature dies this way.'},
    ]},
    'The Fathomless':{src:'TCoE',desc:'Your patron lurks in the depths of the ocean. You channel tentacled, watery power that can protect, attack, and teleport.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Create or destroy water, thunderwave, gust of wind, silence, lightning bolt, sleet storm, control water, summon elemental (water only), Bigby\'s hand, cone of cold.'},
      {lvl:1,name:'Tentacle of the Deeps',desc:'Bonus action: summon a 10-ft tentacle for 1 minute in a space within 60 ft. At the start of each of your turns, deal 1d8 cold damage to one creature within 10 ft of the tentacle (CHA save for half). Move the tentacle up to 30 ft as a bonus action. Uses = prof bonus per long rest.'},
      {lvl:1,name:'Gift of the Sea',desc:'Breathe underwater. Swim speed of 40 ft.'},
      {lvl:6,name:'Oceanic Soul',desc:'Resistance to cold damage. Communicate telepathically with any creature that has a swimming speed.'},
      {lvl:6,name:'Guardian Coil',desc:'Reaction when you or a creature within 10 ft of your tentacle takes damage: reduce the damage by 1d8.'},
      {lvl:10,name:'Grasping Tentacles',desc:'Cast Evard\'s black tentacles once per long rest without a slot; it doesn\'t require concentration when cast this way. When a creature is restrained by the spell, you gain temp HP = warlock level.'},
      {lvl:14,name:'Fathomless Plunge',desc:'Action: teleport yourself and up to 5 willing creatures within 30 ft up to 1 mile to a body of water you\'ve seen. Once per short or long rest.'},
    ]},
    'The Genie':{src:'TCoE',desc:'You made a pact with a noble genie (dao, djinni, efreeti, or marid). Your patron grants you access to a magical vessel and elemental power.',feats:[
      {lvl:1,name:'Genie\'s Vessel',desc:'Receive a magical vessel (tiny object). You can enter it as an action for short rests (up to prof-bonus hours per day). Creatures can\'t follow you in uninvited. Also: bonus action to use the vessel to deal extra damage equal to prof bonus once per turn.'},
      {lvl:1,name:'Genie\'s Wrath',desc:'Once per turn, deal extra damage (type depends on genie type: dao=bludgeoning, djinni=thunder, efreeti=fire, marid=cold) equal to your prof bonus when you hit with an attack.'},
      {lvl:6,name:'Elemental Gift',desc:'Resistance to your genie\'s damage type. Bonus action: fly speed = 30 ft for 10 minutes. Uses = prof bonus per long rest.'},
      {lvl:10,name:'Sanctuary Vessel',desc:'When you enter the vessel, choose up to 5 creatures to join you. Also, while inside, you and your guests can each regain one expended spell slot during a short rest.'},
      {lvl:14,name:'Limited Wish',desc:'Request a non-harmful wish to your patron. Replicate any spell of 6th level or lower. Once per 1d4 long rests.'},
    ]},
    'The Undead':{src:'VRGtR',desc:'You\'ve made a pact with a deathless being that defies the cycle of life and death, forsaking its mortal shell to eternally pursue its unfathomable ambitions. These ancient undead share profane knowledge of death and ambition.',feats:[
      {lvl:1,name:'Expanded Spell List',desc:'Bane, false life, blindness/deafness, phantasmal force, phantom steed, speak with dead, death ward, greater invisibility, antilife shell, cloudkill.'},
      {lvl:1,name:'Form of Dread',desc:'Bonus action: transform for 1 minute. Gain temp HP equal to 1d10 + warlock level; once per turn on a hit, force a WIS save or target is frightened of you until end of your next turn; you are immune to the frightened condition. Uses = prof bonus per long rest.'},
      {lvl:6,name:'Grave Touched',desc:'You don\'t need to eat, drink, or breathe. Once per turn when you deal damage, you can replace the damage type with necrotic. While using Form of Dread, roll one additional damage die for necrotic damage.'},
      {lvl:10,name:'Necrotic Husk',desc:'Resistance to necrotic damage (immunity while Form of Dread is active). Reaction when reduced to 0 HP: drop to 1 HP instead — each creature of your choice within 30 ft takes 2d10 + warlock level necrotic damage, and you gain 1 level of exhaustion. Once per 1d4 long rests.'},
      {lvl:14,name:'Spirit Projection',desc:'Action: project your spirit from your body for up to 1 hour (concentration). Your body is unconscious. Your spirit has your statistics (without possessions) and shares damage with your body. Benefits: resistance to B/P/S damage; conjuration/necromancy spells need no components (if no gold cost); flying speed = walking speed (hover); you can move through creatures/objects; while using Form of Dread, regain HP = half necrotic damage dealt. Once per long rest.'},
    ]},
  },
  Wizard:{
    'School of Abjuration':{src:'PHB',desc:'Abjurers are protective wizards, specializing in warding spells and nullifying magic. Their Ward is constantly recharged.',feats:[
      {lvl:2,name:'Abjuration Savant',desc:'Halve the gold and time cost to copy abjuration spells into your spellbook.'},
      {lvl:2,name:'Arcane Ward',desc:'When you cast an abjuration spell of 1st level or higher, create a magical ward (HP = twice wizard level + INT modifier). When you take damage, the ward takes it first. When reduced to 0, any overflow carries to you. Recharge by casting another abjuration spell (the spell restores HP = twice the spell\'s level).'},
      {lvl:6,name:'Projected Ward',desc:'Reaction when a creature within 30 ft takes damage: your Arcane Ward absorbs the damage instead.'},
      {lvl:10,name:'Improved Abjuration',desc:'Add your proficiency bonus to ability checks made as part of casting an abjuration spell (e.g., counterspell, dispel magic checks).'},
      {lvl:14,name:'Spell Resistance',desc:'Advantage on saving throws against spells. Resistance to spell damage.'},
    ]},
    'School of Conjuration':{src:'PHB',desc:'Conjurers call forth creatures and objects from other planes of existence. Benign Transposition gives exceptional mobility.',feats:[
      {lvl:2,name:'Conjuration Savant',desc:'Halve gold and time to copy conjuration spells.'},
      {lvl:2,name:'Minor Conjuration',desc:'Action: conjure one nonmagical object (up to 3 ft on each side, max 10 lb, not worth more than 25 gp) that lasts 1 hour or until you use this again.'},
      {lvl:6,name:'Benign Transposition',desc:'Action: teleport up to 30 ft to an unoccupied space you can see, OR swap places with a Small or Medium willing creature within 30 ft. Once per long rest (or whenever you cast a conjuration spell).'},
      {lvl:10,name:'Focused Conjuration',desc:'While concentrating on a conjuration spell, your concentration can\'t be broken by taking damage.'},
      {lvl:14,name:'Durable Summons',desc:'Creatures you summon or create with conjuration spells have 30 additional temp HP.'},
    ]},
    'School of Divination':{src:'PHB',desc:'Diviners peer into the future, gaining Portent dice to alter rolls and becoming increasingly clairvoyant.',feats:[
      {lvl:2,name:'Divination Savant',desc:'Halve gold and time to copy divination spells.'},
