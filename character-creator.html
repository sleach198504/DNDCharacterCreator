<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D 5e Character Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.3);
    --parchment: #f0dab0;
    --parchment-dim: #9a8060;
    --bg: #0e0705;
    --card-bg: rgba(20,10,5,0.85);
    --border: rgba(184,134,11,0.3);
    --border-hover: rgba(184,134,11,0.6);
    --red: #c94c4c;
    --green: #4caa6a;
    --purple: #9070cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #0e0705 0%, #160c05 60%, #0a0603 100%);
    min-height: 100vh;
    font-family: 'Lora', serif;
    color: var(--parchment);
  }
  /* Animated bg texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(184,100,30,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  #app { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  .app-header { text-align: center; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); position: relative; }
  .app-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(20px, 4vw, 30px); color: var(--gold); letter-spacing: 0.05em; text-shadow: 0 0 40px rgba(201,168,76,0.25); }
  .app-sub { color: var(--parchment-dim); font-size: 13px; margin-top: 6px; font-style: italic; }
  .home-link { position: absolute; top: 0; left: 0; font-family: 'Cinzel', serif; font-size: 11px; color: var(--parchment-dim); text-decoration: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; transition: all 0.2s; }
  .home-link:hover { color: var(--gold); border-color: rgba(184,134,11,0.6); }

  /* Step bar */
  .step-bar { display: flex; gap: 3px; flex-wrap: nowrap; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
  .step-bar::-webkit-scrollbar { height: 3px; }
  .step-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .step-pill {
    padding: 5px 9px; border-radius: 20px; font-size: 10px; white-space: nowrap; flex-shrink: 0;
    font-family: 'Cinzel', serif; letter-spacing: 0.04em;
    border: 1px solid rgba(184,134,11,0.2); color: var(--parchment-dim);
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .step-pill:hover { border-color: var(--border-hover); color: var(--gold); }
  .step-pill.active { background: var(--gold); color: #1a0a00; border-color: var(--gold); font-weight: 700; }
  .step-pill.done { background: rgba(76,170,106,0.15); color: var(--green); border-color: rgba(76,170,106,0.4); }
  .step-pill.warn { background: rgba(201,168,76,0.15); color: var(--gold); border-color: rgba(201,168,76,0.5); }

  /* Cards */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
    backdrop-filter: blur(4px);
  }
  .card.clickable { cursor: pointer; transition: all 0.18s; }
  .card.clickable:hover { border-color: var(--border-hover); background: rgba(30,15,5,0.9); }
  .card.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }

  /* Typography */
  .step-title { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--gold); margin-bottom: 20px; }
  .label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
  .muted { color: var(--parchment-dim); font-size: 13px; }

  /* Grids */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .g6 { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 8px; }
  @media(max-width:600px) { .g2{grid-template-columns:1fr;} .g3{grid-template-columns:1fr 1fr;} .g6{grid-template-columns:repeat(3,1fr);} }

  /* Form elements */
  select, input[type=text], input[type=number], textarea {
    width: 100%; padding: 9px 12px;
    background: rgba(8,4,1,0.8); border: 1px solid var(--border);
    border-radius: 6px; color: var(--parchment);
    font-family: 'Lora', serif; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--border-hover); }
  select option { background: #1a0a00; }
  textarea { resize: vertical; }

  /* Buttons */
  button {
    padding: 9px 20px; border-radius: 7px; font-family: 'Cinzel', serif;
    font-size: 12px; letter-spacing: 0.07em; font-weight: 700;
    cursor: pointer; transition: all 0.18s; border: 1px solid var(--border);
    background: transparent; color: var(--gold);
  }
  button:hover { background: rgba(201,168,76,0.12); border-color: var(--border-hover); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.btn-primary { background: var(--gold); color: #1a0a00; border-color: var(--gold); }
  button.btn-primary:hover { background: #dab84e; }
  button.btn-success { background: rgba(76,170,106,0.2); color: var(--green); border-color: rgba(76,170,106,0.5); }
  button.btn-success:hover { background: rgba(76,170,106,0.3); }
  button.btn-sm { padding: 5px 12px; font-size: 11px; }

  /* Tags/chips */
  .tag {
    display: inline-block; padding: 3px 10px; margin: 2px; border-radius: 20px;
    font-size: 11px; cursor: pointer; transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.1); color: var(--parchment-dim);
    background: rgba(255,255,255,0.03);
  }
  .tag:hover { border-color: var(--border-hover); color: var(--parchment); }
  .tag.sel-class { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.5); color: var(--gold); }
  .tag.sel-cantrip { background: rgba(144,112,204,0.2); border-color: rgba(144,112,204,0.5); color: var(--purple); }
  .tag.sel-spell { background: rgba(76,130,220,0.2); border-color: rgba(76,130,220,0.5); color: #7ab0ff; }

  /* Stat boxes */
  .stat-box { text-align: center; padding: 12px 6px; background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; }
  .stat-num { font-family: 'Cinzel Decorative', serif; font-size: 22px; color: var(--parchment); }
  .stat-mod { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); font-weight: 700; }
  .stat-lbl { font-size: 9px; color: var(--parchment-dim); font-family: 'Cinzel', serif; text-transform: uppercase; }

  /* Skill rows */
  .skill-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px dotted rgba(184,134,11,0.15); font-size: 12px; }
  .skill-prof { color: var(--green); font-weight: 700; }
  .skill-half { color: var(--parchment-dim); font-style: italic; }
  .skill-bonus { font-family: 'Cinzel', serif; font-size: 12px; }

  /* Feature rows */
  .feat-row { font-size: 12px; padding: 4px 0; border-bottom: 1px dotted rgba(184,134,11,0.15); color: var(--parchment-dim); }
  .feat-lvl { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); margin-right: 6px; }

  /* Point buy */
  .pb-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .pb-score { font-family: 'Cinzel Decorative', serif; font-size: 20px; min-width: 32px; text-align: center; }

  /* Badge */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-family: 'Cinzel', serif; margin: 2px; }
  .badge-gold { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); }
  .badge-purple { background: rgba(144,112,204,0.15); border: 1px solid rgba(144,112,204,0.4); color: var(--purple); }
  .badge-green { background: rgba(76,170,106,0.15); border: 1px solid rgba(76,170,106,0.4); color: var(--green); }
  .badge-red { background: rgba(201,76,76,0.15); border: 1px solid rgba(201,76,76,0.4); color: var(--red); }

  /* Nav */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* Export msg */
  .export-msg { margin-top: 14px; padding: 12px 16px; background: rgba(76,170,106,0.12); border: 1px solid rgba(76,170,106,0.35); border-radius: 7px; color: var(--green); font-size: 13px; text-align: center; }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  /* Item search suggestions */
  .item-search-wrap { position:relative; margin-bottom:8px; }
  .item-suggestions {
    position:absolute; top:100%; left:0; right:0; z-index:200;
    background:rgba(20,10,5,0.98); border:1px solid var(--border-hover);
    border-top:none; border-radius:0 0 6px 6px; max-height:220px; overflow-y:auto;
  }
  .item-sug {
    padding:7px 12px; font-size:12px; cursor:pointer;
    border-bottom:1px solid rgba(184,134,11,0.1); color:var(--parchment);
  }
  .item-sug:hover { background:rgba(201,168,76,0.12); color:var(--gold); }
  .item-sug:last-child { border-bottom:none; }

  /* Popup overlay */
  #popup-overlay {
    display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(0,0,0,0.78); backdrop-filter:blur(3px);
    align-items:center; justify-content:center;
    padding:16px;
  }
  #popup-overlay.open { display:flex; }
  #popup-card {
    background:rgba(20,10,5,0.98); border:1px solid var(--gold);
    border-radius:12px; padding:22px 24px 20px; max-width:480px; width:100%;
    max-height:80vh; overflow-y:auto;
    box-shadow:0 12px 48px rgba(0,0,0,0.7);
    position:relative;
  }
  #popup-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border);
  }
  #popup-title { font-family:'Cinzel',serif; font-size:14px; color:var(--gold); line-height:1.3; }
  #popup-src { font-family:'Cinzel',serif; font-size:10px; color:var(--parchment-dim); margin-top:3px; }
  #popup-close {
    background:none; border:none; color:var(--parchment-dim); font-size:20px;
    cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0; margin-left:12px;
  }
  #popup-close:hover { color:var(--gold); }
  #popup-body { font-size:13px; line-height:1.75; color:var(--parchment); }
  .tag.has-popup { cursor:pointer; }
  .tag.has-popup:hover { border-color:var(--gold); color:var(--gold); }
</style>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

</div>

const RACE_DESC = {
  'Dragonborn': 'Born of dragons, Dragonborn walk proudly through a world that greets them with fearful incomprehension. They share traits with dragons: scales, a breath weapon, and resistance to one damage type. They value clan, excellence, and honor above all.',
  'Dwarf': 'Bold and hardy, Dwarves are known as skilled warriors, miners, and stone crafters. They stand around 4–5 ft. tall with broad, compact bodies. Their culture values tradition, craftsmanship, and a deeply held code of honor.',
  'Elf': 'Elves are a magical people of otherworldly grace, living in places of ethereal beauty. They typically live for over 700 years and are rarely in a hurry. Elves love nature, magic, music, poetry, and the finer things of life.',
  'Gnome': 'The smallest of the common races, Gnomes are energetic and curious, with a natural curiosity that leads them to tinker, invent, and explore. They live up to 500 years and delight in life\'s pleasures.',
  'Half-Elf': 'Walking in two worlds but truly belonging to neither, Half-Elves combine human curiosity and ambition with elven refinement. They are diplomatic and charming, excelling in many fields.',
  'Half-Orc': 'Half-Orcs are built for violence with a strong, muscular frame. They tend toward aggression but can harness that drive into fierce determination. They mature quickly and live to around 75 years old.',
  'Halfling': 'The comforts of home are the hallmarks of the Halfling\'s life. Small, practical folk, they enjoy the pleasures of life and rarely find themselves wrapped up in adventure—unless adventure finds them. Nimble and lucky.',
  'Human': 'Humans are the most adaptable and ambitious people among the common races. Their empires and settlements span every continent, and they vary enormously in appearance, culture, and religion. They live short but impactful lives.',
  'Tiefling': 'To be a Tiefling is to know that others may fear or hate you. Their infernal heritage marks them with horns, a tail, solid-colored eyes, and sometimes unusual skin. They value independence and self-reliance.',
  'Aasimar': 'Aasimar bear within their souls the light of the heavens. They are descended from beings touched by the divine and carry a divine charge to serve as guardians of the weak. [VGtM]',
  'Firbolg': 'Firbolgs are reclusive giants who prefer to live in deep forests. Gentle and wise, they protect their home with tireless devotion and possess an innate magic tied to nature. [VGtM]',
  'Goliath': 'At the peaks of the highest mountains dwell the Goliaths. They compete among themselves constantly to prove their worth in the eyes of their tribe, driven by an intense need to contribute and to excel. [VGtM]',
  'Kenku': 'Cursed to never fly and unable to speak except by mimicry, Kenku are cunning flightless avian humanoids. Their forgery skills are legendary, and their ability to reproduce any sound they have heard gives them an eerie advantage. [VGtM]',
  'Tabaxi': 'Driven by an insatiable curiosity, Tabaxi are cat-like humanoids that collect stories, artifacts, and lore from across the world. Quick and stealthy, they dart from place to place and rarely stay long. [VGtM]',
  'Tortle': 'Tortles have a peaceful nature and a desire to experience the world before they settle down to raise a family. Their shells make them naturally resilient—they have no need for heavy armor. [TP]',
  'Changeling': 'Changelings can subtly reshape their faces and bodies, making them unparalleled infiltrators and social chameleons. They live quiet lives of constant reinvention or become spies and manipulators. [UA]',
  'Shifter': 'Shifters are sometimes called weretouched, as many believe they are the descendants of humans and lycanthropes. They can briefly harness that animalistic power in a burst of adrenaline. [UA]',
  'Warforged': 'Warforged are soldiers manufactured to fight in the Last War. Built to be warriors, they are made from wood and metal, yet feel, think, and dream as any living creature does. [UA]',
  'Lizardfolk': 'Lizardfolk possess an alien and inscrutable mindset, their desires and emotions simple but never tame. They are skilled survivalists and pragmatic hunters with little interest in the trappings of civilization. [VGtM]',
  'Triton': 'Tritons are a sea-dwelling race who have guarded the ocean depths for eons. They have brought many threats to heel, and they feel pride in this work—sometimes to the point of arrogance. [VGtM]',
  'Bugbear': 'Bugbears are large, hairy humanoids who exist on the fringes of goblinoid society. They are born hunters and prefer ambush over open combat. [VGtM]',
  'Goblin': 'Goblins occupy a lowly place in the pecking order of Darks\'s monstrous creatures. But many Goblins have rejected their violent tendencies and seek their own path. Quick, nimble, and small. [VGtM]',
  'Hobgoblin': 'Hobgoblins are a fierce and militaristic people ruled by a code of honor and order. They prize martial ability above all else, organizing themselves in strict military units. [VGtM]',
  'Kobold': 'Kobolds are craven reptilian humanoids who worship evil dragons as gods and serve them as minions and toadies. They are weak alone but dangerous in packs. [VGtM]',
  'Orc': 'Orcs are savage raiders and pillagers with stooped postures, low foreheads, and piggish faces with prominent lower canines. They live by brute strength and a ferocious will to survive. [VGtM]',
  'Yuan-Ti Pureblood': 'The most human-seeming of the Yuan-Ti, Purebloods appear human except for minor reptilian features. They are cunning and cold, able to resist magic and poison while manipulating others. [VGtM]',
  'Aarakocra': 'Sequestered in high mountains atop tall trees, Aarakocra evoke endangered species. They are consummate vigilantes, fiercely protective of their homes. They can fly, which makes them uniquely powerful. [EE]',
  'Air Genasi': 'Air Genasi have mastered the winds, taking after the djinn. They are proud and free-spirited, rarely staying in one place for long and ever seeking new vistas. [EE]',
  'Earth Genasi': 'As steady as stone, Earth Genasi are children of the Material Plane and the elemental earth. They are slow to change, stubborn, and calculating, with a talent for endurance. [EE]',
  'Fire Genasi': 'Fire Genasi carry the energy and heat of fire within them. They are volatile and passionate, quick to react and slow to forget. [EE]',
  'Water Genasi': 'Water Genasi are patient and accepting, rolling with the punches. They adapt to circumstances and find their own path through any obstacle, as water flows around stone. [EE]',
  // VRGtR
  'Dhampir': 'Dhampirs walk the razor\'s edge between life and undeath. Cursed with a vampiric hunger, they draw power from that dark inheritance — a supernatural bite, the ability to scale walls, and deathless endurance. Whether they embrace or struggle against their nature is theirs to decide. [VRGtR]',
  'Hexblood': 'Hexbloods are mortals transformed by the dark bargains or curses of hags. Touched by fey magic, they can communicate through strange tokens and wield innate hexing magic. Their connection to the hag-kind grants unsettling power at an unsettling price. [VRGtR]',
  'Reborn': 'Reborn are individuals who have escaped death, carrying fragments of a past life into their new existence. They require neither food, drink, nor sleep; their bodies are strange composites of what they were and what they are now. Memories from their former life surface in dreamlike visions. [VRGtR]',
};

const SUBRACE_DESC = {
  // ── Dragonborn (PHB p.34) ─────────────────────────────────────────────────
  'Dragonborn|Black':  'Tied to the cunning and cruelty of black dragons, these Dragonborn breathe a line of acid and resist acid damage. Black dragons hoard wealth deep in fetid swamps; their descendants tend toward ruthless pragmatism.',

  'Elf|Wood Elf':        '+1 WIS · Speed 35 ft · Mask of the Wild. Wood Elves have copper skin tinted by hours outdoors and hair ranging from tan to coppery red. They are fleet of foot, skilled at concealment in natural settings, and deeply distrustful of outsiders.',
  'Elf|Dark Elf (Drow)': '+1 CHA · Superior Darkvision (120 ft) · Sunlight Sensitivity · Drow Magic (Dancing Lights, Faerie Fire, Darkness). Banished to the Underdark for following the Spider Queen Lolth, Drow have obsidian skin and white hair. They have built a civilization of ruthless cunning beneath the earth.',
  // ── Gnome (PHB p.36) ─────────────────────────────────────────────────────
  'Gnome|Forest Gnome':  '+1 DEX · Minor Illusion cantrip · Speak with Small Beasts. The most reclusive of gnomes, Forest Gnomes dwell in hidden woodland communities. They are playful, warm-hearted, and in effortless harmony with nature and its creatures.',
  'Gnome|Rock Gnome':    '+1 CON · Artificer\'s Lore · Tinker. Rock Gnomes are the most commonly encountered gnomes, found throughout human lands as inventors, jewelers, and tinkerers. Driven by insatiable curiosity, they love building small mechanical gadgets.',
  'Gnome|Deep Gnome':    '+1 DEX · Superior Darkvision (120 ft) · Stone Camouflage. Svirfneblin live in small, secret communities deep in the Underdark. Somber and practical, they survive by staying hidden and knowing every escape route. Their outlook is far grimmer than their surface kin. [EE]',

  'Halfling|Lightfoot':  '+1 CHA · Naturally Stealthy. The most common halflings, Lightfoot Halflings are easy-going and adaptable. They are naturally lucky and prefer a quiet life, though they are capable of surprising resourcefulness when circumstances demand it.',
  'Halfling|Stout':      '+1 CON · Stout Resilience (advantage on saving throws vs. poison; resistance to poison damage). Sometimes called Strongheart Halflings, Stout Halflings are stockier and hardier than their Lightfoot cousins. Some say they carry a trace of dwarf blood.',
  // ── Human (PHB p.31) ─────────────────────────────────────────────────────
  'Human|Standard':      '+1 to all six ability scores. Standard Humans represent the broad, adaptable majority of humankind. Their lack of specialization is balanced by breadth: they excel at everything and nothing in particular, shaped entirely by culture and will.',

  'Aasimar|Scourge':     '+1 CON · Radiant Consumption: emit searing light dealing radiant damage (including to self) each turn for 1 minute; others nearby take radiant damage (1/long rest). Scourge Aasimar blaze with divine energy that is difficult to contain. They are fervent in their war against evil, sometimes recklessly so.',

const BG_FEATURE_DESC = {

  'Wall of Force':{lv:5,sch:'Evoc',cast:'1a',rng:'120ft',conc:true,rit:false,cls:["Wizard"],src:'PHB',d:'Invisible impenetrable wall (immune to all damage, Disintegrate destroys); up to 10 panels (10x10ft each); 10 min'},
  'Wall of Stone':{lv:5,sch:'Evoc',cast:'1a',rng:'120ft',conc:true,rit:false,cls:["Artificer", "Druid", "Sorcerer", "Wizard"],src:'PHB',d:'Up to 10 panels (10x10x6in each) non-magical stone wall; can be permanent; 10 min (or permanent)'},

// Base class feature descriptions (PHB/XGtE/TCoE)
const CLASS_FEAT_DESC = {
  // BARBARIAN
  'Rage':'As a bonus action, enter a rage lasting 1 minute. While raging: advantage on STR checks and saving throws, bonus damage on STR-based melee attacks (+2/+3/+4 by level), and resistance to bludgeoning, piercing, and slashing damage. You cannot concentrate on spells or cast them while raging. Rage ends if you end your turn without attacking an enemy or taking damage. Uses per long rest: 2 (level 1), scaling to unlimited at level 20.',
  'Unarmored Defense':'While not wearing armor, your AC equals 10 + DEX modifier + CON modifier (Barbarian) or 10 + DEX modifier + WIS modifier (Monk). You can use a shield and still gain the Barbarian version.',
  'Reckless Attack':'When you make your first attack on your turn, you can choose to attack recklessly, gaining advantage on melee weapon attack rolls using STR this turn — but attack rolls against you have advantage until your next turn.',
  'Danger Sense':'You gain advantage on DEX saving throws against effects you can see, such as traps and spells. You cannot benefit from this while blinded, deafened, or incapacitated.',
  'Primal Path':'At 3rd level, you choose a Primal Path that shapes your rage. Your choice grants features at levels 3, 6, 10, and 14.',
  'Fast Movement':'Your speed increases by 10 feet while you aren\'t wearing heavy armor.',
  'Feral Instinct':'You have advantage on initiative rolls. If surprised at the start of combat, you can act normally on your first turn as long as you enter your rage before doing anything else.',
  'Brutal Critical':'Roll one additional weapon damage die when you score a critical hit with a melee attack. Two additional dice at level 13, three at level 17.',
  'Relentless Rage':'If you drop to 0 HP while raging and don\'t die outright, make a DC 10 CON save — on a success, you drop to 1 HP instead. Each success increases the DC by 5 (resets after a long rest).',
  'Primal Champion':'At level 20, your STR and CON scores each increase by 4. Your maximums for those scores become 24.',
  // BARBARIAN — TCoE Optional
  'Primal Knowledge (TCoE Optional)':'TCoE optional feature. At level 3, choose 2 skills from the Barbarian\'s skill list (Animal Handling, Athletics, Intimidation, Nature, Perception, Survival) and gain proficiency in them.',
  'Instinctive Pounce (TCoE Optional)':'TCoE optional feature. Available at level 7. When you use a bonus action to enter a rage, you can also move up to half your speed as part of that bonus action.',
  // BARD
  'Bardic Inspiration (d6)':'As a bonus action, a creature you choose within 60 feet that can hear you gains a Bardic Inspiration die (d6). Once within 10 minutes, it can add that roll to one ability check, attack roll, or saving throw. Uses = CHA modifier (min 1); regain on long rest. The die becomes d8 at level 5, d10 at level 10, d12 at level 15.',
  'Bardic Inspiration (d8)':'Your Bardic Inspiration die is now a d8, upgraded at level 5.',
  'Jack of All Trades':'Add half your proficiency bonus (rounded down) to any ability check that doesn\'t already include your proficiency bonus.',
  'Song of Rest':'If you or friendly creatures who can hear your performance spend Hit Dice at the end of a short rest, each such creature regains an extra 1d6 HP (scales to 1d12 at level 17).',
  'Bard College':'At 3rd level, you delve into a bard college, gaining features at levels 3, 6, and 14.',
  'Expertise':'Double your proficiency bonus for two skill proficiencies (or one skill + thieves\' tools). Choose two more at level 10.',
  'Font of Inspiration':'Regain all expended Bardic Inspiration uses on a short or long rest.',
  'Countercharm':'As an action, begin a performance lasting until the end of your next turn. During that time, you and friendly creatures within 30 feet have advantage on saving throws against being frightened or charmed.',
  'Magical Secrets':'Choose two spells from any class spell list; they count as bard spells for you. Additional choices at levels 14 and 18.',
  'Superior Inspiration':'At level 20, when you roll initiative with no Bardic Inspiration uses remaining, you regain 1 use.',
  // BARD — TCoE Optional
  'Magical Inspiration (TCoE Optional)':'TCoE optional feature. Available at level 2. If a creature has a Bardic Inspiration die from you and casts a spell that restores HP or deals damage, the creature can roll that die and choose a target affected by the spell. Add the result to the HP regained or damage dealt. The Bardic Inspiration die is then lost.',
  // CLERIC
  'Divine Domain':'At 1st level, choose a divine domain. It grants domain spells (always prepared, don\'t count against your limit) and features at levels 1, 2, 6, 8, and 17.',
  'Channel Divinity':'Channel divine energy to fuel magical effects. Start with Turn Undead and a domain effect; choose which to use each time. Once per short or long rest at level 2 (twice at level 6, three times at level 18).',
  'Destroy Undead':'When an undead fails its Turn Undead save, it is instantly destroyed if its CR is at or below your threshold: CR 1/2 at level 5, CR 1 at level 8, CR 2 at level 11, CR 3 at level 14, CR 4 at level 17.',
  'Divine Strike or Potent Spellcasting':'At level 8, your domain grants one of: Divine Strike (once per turn, +1d8 damage of your deity\'s type on weapon hits; +2d8 at level 14), or Potent Spellcasting (add WIS modifier to cleric cantrip damage).',
  'Divine Intervention':'As an action, implore your deity\'s aid. Roll d100; if you roll ≤ your cleric level, your deity intervenes (DM chooses form). Whether or not it succeeds, you can\'t use this again for 7 days. At level 20 it succeeds automatically.',
  'Improved Divine Intervention':'At level 20, Divine Intervention succeeds automatically (no roll needed).',
  // CLERIC — TCoE Optional
  'Cantrip Versatility (TCoE Optional)':'TCoE optional feature. Whenever you gain an ASI from this class, you can replace one cantrip you know with another from your class spell list.',
  'Blessed Strikes (TCoE Optional)':'TCoE optional feature — replaces Divine Strike or Potent Spellcasting (level 8). When a creature takes damage from one of your cantrips or weapon attacks, you can deal an extra 1d8 radiant damage to that creature. Once per turn.',
  // DRUID
  'Druidic':'You know Druidic, the secret language of druids. You can leave hidden messages; creatures who know Druidic spot them automatically. Others need a DC 15 Perception check.',
  'Wild Shape':'Use your action to transform into a beast you\'ve seen (CR limits apply: CR 1/4 at level 2, CR 1/2 at level 4, CR 1 at level 8). Your stats are replaced by the beast\'s, but you keep your WIS/INT/CHA. HP reverts when the form ends; you can\'t use class features or cast spells in beast form (except Beast Spells at level 18). Two uses per short or long rest.',
  'Druid Circle':'At 2nd level, choose a Druid Circle, granting features at levels 2, 6, 10, and 14.',
  'Wild Shape Improvement':'At level 4, your Wild Shape can take the form of beasts up to CR 1/2 (no flying speed). At level 8, up to CR 1.',
  'Circle Feature':'A feature granted by your Druid Circle subclass (at levels 6 and 10).',
  'Timeless Body':'For every 10 years that pass, your body ages only 1 year.',
  'Beast Spells':'At level 18, you can cast druid spells while in Wild Shape, performing the verbal and somatic components (but not material).',
  'Archdruid':'At level 20, use Wild Shape an unlimited number of times, and ignore the verbal, somatic, and non-cost material components of druid spells.',
  // DRUID — TCoE Optional
  'Wild Companion (TCoE Optional)':'TCoE optional feature. Available at level 2. You can expend a use of your Wild Shape feature to cast Find Familiar without material components. When cast this way, the familiar is fey rather than its normal type, and it disappears when you use Wild Shape again or finish a long rest.',
  // FIGHTER
  'Fighting Style':'Adopt a specialty: Archery (+2 ranged attacks), Defense (+1 AC in armor), Dueling (+2 damage with one weapon when empty-handed), Great Weapon Fighting (reroll 1–2 on damage dice), Protection (reaction to impose disadvantage on attacks vs. allies), or Two-Weapon Fighting (add ability modifier to off-hand damage).',
  'Second Wind':'On your turn, use a bonus action to regain 1d10 + fighter level HP. Recharges on short or long rest.',
  'Action Surge':'On your turn, take one additional action. Usable once per short or long rest (twice at level 17).',
  'Martial Archetype':'At 3rd level, choose a Martial Archetype that defines your combat style, granting features at levels 3, 7, 10, 15, and 18.',
  'Indomitable':'Reroll a failed saving throw (must use new roll). Once per long rest (twice at level 13, three times at level 17).',
  'Extra Attack':'When you take the Attack action, you can attack twice instead of once. Fighters gain Extra Attack (2) at level 11 and Extra Attack (3) at level 20.',
  'Extra Attack (2)':'At level 11, you can attack three times whenever you take the Attack action.',
  'Extra Attack (3)':'At level 20 (Fighter), you can attack four times whenever you take the Attack action.',
  // MONK
  'Martial Arts':'Use DEX instead of STR for unarmed strikes and monk weapons. Roll a d4 for unarmed damage (scales to d10 at level 17). After taking the Attack action with a monk weapon or unarmed strike, make one unarmed strike as a bonus action.',
  'Ki':'Ki points = your monk level. Spend to activate: Flurry of Blows (1 ki: two unarmed bonus action attacks), Patient Defense (1 ki: Dodge as bonus action), Step of the Wind (1 ki: Dash or Disengage as bonus action, double jump). Regain all on short or long rest.',
  'Unarmored Movement':'Speed +10 ft while unarmored and unshielded (+15 at level 6, +20 at level 10, +25 at level 14, +30 at level 18). At level 9, move along vertical surfaces and across liquids without falling.',
  'Monastic Tradition':'At 3rd level, commit to a tradition, granting features at levels 3, 6, 11, and 17.',
  'Deflect Missiles':'Reaction when hit by a ranged weapon attack: reduce damage by 1d10 + DEX modifier + monk level. If reduced to 0, catch the missile and optionally throw it back (1 ki, 20/60 ft, 1d4+DEX).',
  'Stunning Strike':'When you hit a creature with a melee weapon attack, spend 1 ki to force a CON save. On failure, the target is stunned until the end of your next turn.',
  'Ki-Empowered Strikes':'Your unarmed strikes count as magical for overcoming nonmagical resistance and immunity.',
  'Tranquility':'After a long rest, gain the effect of a sanctuary spell (DC = 8 + proficiency + WIS) until your next long rest.',
  'Empty Body':'Spend 4 ki to become invisible for 1 minute with resistance to all non-force damage. Spend 8 ki to cast astral projection (no material components).',
  'Perfect Self':'When you roll initiative with no ki points left, regain 4 ki points.',
  // MONK — TCoE Optional
  'Ki-Fueled Attack (TCoE Optional)':'TCoE optional feature. Available at level 3. If you spend 1 or more ki points as part of your action on your turn, you can make one attack with an unarmed strike or monk weapon as a bonus action before the end of your turn.',
  'Quickened Healing (TCoE Optional)':'TCoE optional feature. Available at level 4. As an action, spend 2 ki points to roll a martial arts die. You regain HP equal to the result.',
  'Focused Aim (TCoE Optional)':'TCoE optional feature. Available at level 5. When you miss with an attack roll, you can spend 1–3 ki points to increase your attack roll by 2 for each point spent, potentially turning the miss into a hit.',
  // PALADIN
  'Divine Sense':'Open your awareness to detect celestials, fiends, and undead within 60 feet that aren\'t behind total cover until the end of your next turn. Uses per long rest = 1 + CHA modifier.',
  'Lay on Hands':'Healing pool = 5 × paladin level. Touch a creature to restore HP from the pool, or spend 5 HP to cure one disease or neutralize one poison. Replenishes on long rest.',
  'Divine Smite':'When you hit with a melee weapon attack, expend a spell slot to deal extra radiant damage: 2d8 for a 1st-level slot, +1d8 per slot level above 1st (max 5d8). +1d8 if the target is a fiend or undead.',
  'Sacred Oath':'At 3rd level, swear your paladin oath, gaining Channel Divinity options, oath spells, and features at levels 3, 7, 15, and 20.',
  'Aura of Protection':'You and friendly creatures within 10 feet add your CHA modifier (min +1) to saving throws while you are conscious. Range extends to 30 feet at level 18.',
  'Improved Divine Smite':'Your melee weapon attacks deal an extra 1d8 radiant damage, in addition to any Divine Smite damage.',
  'Cleansing Touch':'As an action, end one spell effect on yourself or a willing creature you touch. Uses per long rest = CHA modifier (min 1).',
  // RANGER
  'Favored Enemy':'Choose one enemy type (creature type or two humanoid races). Advantage on Survival checks to track them and Intelligence checks to recall information about them; learn one language associated with your chosen enemy.',
  'Favored Foe (TCoE Optional)':'TCoE optional feature — replaces Favored Enemy. When you hit a creature with an attack roll, you can call on your mystical bond with nature to mark it as your favored enemy for 1 minute (or until you lose concentration). The first time each turn that you hit the favored enemy, you deal an extra 1d4 damage (1d6 at level 6, 1d8 at level 14). You can use this feature a number of times equal to your proficiency bonus, regaining uses on a long rest.',
  'Natural Explorer':'Choose a favored terrain. In that terrain: double proficiency on INT/WIS checks, can\'t be lost (nonmagically), no difficult terrain cost, alert while foraging, find double food, track at full speed. Gain more terrains at levels 6 and 10.',
  'Deft Explorer (TCoE Optional)':'TCoE optional feature — replaces Natural Explorer. Level 1 — Canny: expertise in one skill you\'re proficient in, plus you learn two languages. Level 6 — Roving: expertise in a second skill, +5 ft speed, climbing speed equal to walking speed, swimming speed equal to walking speed. Level 10 — Tireless: you can\'t be surprised while conscious; your allies have advantage on their initiative if they can see or hear you; once per long rest add 1d8 to your initiative.',
  'Ranger Archetype':'At 3rd level, choose an archetype, granting features at levels 3, 7, 11, and 15.',
  'Primeval Awareness':'Expend a spell slot (1 minute per slot level) to sense the types of favored enemies in your current area (6 miles in natural terrain, 1 mile in dungeon/urban). You know whether any aberrations, celestials, dragons, elementals, fey, fiends, or undead are present, but not their number or location.',
  "Land's Stride":'Moving through nonmagical difficult terrain costs no extra movement. Pass through nonmagical plants without being slowed or taking damage. Advantage on saves against magically created or manipulated plants.',
  'Hide in Plain Sight':'Spend 1 minute camouflaging yourself using natural materials. Gain +10 to Stealth checks while you remain motionless and don\'t speak. The camouflage is destroyed when you move.',
  'Vanish':'Use Hide as a bonus action. You can\'t be tracked by nonmagical means unless you choose to leave a trail.',
  'Feral Senses':'No disadvantage on attack rolls against creatures you can\'t see. Aware of the location of invisible creatures within 30 feet (if they aren\'t hidden and you aren\'t blinded/deafened).',
  'Foe Slayer':'Once per turn, add your WIS modifier to one attack roll or damage roll against a favored enemy.',
  // ROGUE
  'Sneak Attack (1d6)':'Once per turn, deal +1d6 damage to a target you hit if you have advantage on the roll, or if an unincapacitated ally is within 5 feet of the target (and you don\'t have disadvantage). Must use a finesse or ranged weapon. Scales by +1d6 every two levels (1d6 → 10d6 at level 19).',
  "Thieves' Cant":'A secret mix of dialect, jargon, and code used among criminals. You can embed hidden messages in conversation that only other speakers understand; takes 4× longer to deliver than plain speech.',
  'Cunning Action':'Use a bonus action each turn to Dash, Disengage, or Hide.',
  'Roguish Archetype':'At 3rd level, choose an archetype that defines your roguish specialty, granting features at levels 3, 9, 13, and 17.',
  'Uncanny Dodge':'When an attacker you can see hits you, use your reaction to halve the attack\'s damage.',
  'Evasion':'When a DEX save allows half damage on a success, you take no damage on a success and half on a failure.',
  'Reliable Talent':'When making an ability check that uses your proficiency bonus, treat any d20 roll of 9 or lower as a 10.',
  'Elusive':'No attack roll has advantage against you while you aren\'t incapacitated.',
  'Stroke of Luck':'Once per short or long rest, turn a missed attack into a hit, or treat a failed ability check as a d20 roll of 20.',
  // ROGUE — TCoE Optional
  'Steady Aim (TCoE Optional)':'TCoE optional feature. Bonus action: until end of your current turn, your attack rolls have advantage, but your speed is 0 until end of your turn. Available at level 3.',
  // SORCERER
  'Sorcerous Origin':'Choose the source of your innate magic at level 1, granting features at levels 1, 6, 14, and 18.',
  'Font of Magic':'Sorcery points = your sorcerer level. Convert sorcery points to spell slots (Flexible Casting: 2 pts = 1st-level slot, scaling to 7 pts = 5th) or vice versa (1 slot = its level in points). Regain all on long rest.',
  'Metamagic (2 options)':'Choose 2 Metamagic options to modify spells: Careful (allies auto-succeed on your spell saves), Distant (double range), Empowered (reroll up to CHA damage dice, 1 pt), Extended (double duration, 1 pt), Heightened (one target has disadvantage on first save, 3 pts), Quickened (cast as bonus action, 2 pts), Subtle (no verbal/somatic, 1 pt), Twinned (target second creature, pts = spell level). Gain a third at level 10, fourth at level 17.',
  'Metamagic (3 options)':'You now know 3 Metamagic options (third gained at level 10).',
  'Metamagic (4 options)':'You now know 4 Metamagic options (fourth gained at level 17).',
  'Origin Feature':'A feature granted by your Sorcerous Origin subclass (at levels 6 and 14).',
  'Sorcerous Restoration':'Regain 4 expended sorcery points whenever you finish a short rest.',
  // SORCERER — TCoE Optional
  'Sorcerous Versatility (TCoE Optional)':'TCoE optional feature. Whenever you reach a level in this class that grants an ASI, you can replace one Metamagic option you know with another, or replace one cantrip you know from this class with another from the sorcerer spell list.',
  'Magical Guidance (TCoE Optional)':'TCoE optional feature. Available at level 5. When you make an ability check that fails, you can spend 1 sorcery point and reroll the die, using the new roll.',
  // WARLOCK
  'Otherworldly Patron':'Strike a bargain with a powerful being. Your patron grants you expanded spell options and features at levels 1, 6, 10, and 14.',
  'Pact Magic':'Cast warlock spells using a small number of spell slots that all recharge on a short or long rest. All slots are the same level (based on warlock level). At level 11+, you gain Mystic Arcana — higher-level spells cast once per long rest without a slot.',
  'Eldritch Invocations':'Fragments of forbidden knowledge that grant permanent magical abilities. Gain 2 at level 2, scaling to 8 at level 15. Replace one on each level-up. Many invocations require a specific Pact Boon or minimum level.',
  'Pact Boon':'At level 3, choose: Pact of the Chain (special familiar options including imp, pseudodragon, quasit, or sprite), Pact of the Blade (summon a pact weapon bound to you), or Pact of the Tome (Book of Shadows with 3 cantrips from any list).',
  'Patron Feature':'A feature granted by your patron subclass (at levels 6 and 10).',
  'Mystic Arcanum (6th)':'Choose one 6th-level warlock spell. Cast it once per long rest without a slot. Gain 7th-level arcanum at level 13, 8th at level 15, 9th at level 17.',
  'Eldritch Master':'Spend 1 minute entreating your patron to regain all expended Pact Magic spell slots. Once per long rest.',
  // WARLOCK — TCoE Optional
  'Eldritch Versatility (TCoE Optional)':'TCoE optional feature. Whenever you reach a level in this class that grants an ASI, you can do one of the following: replace one cantrip from your class features, replace one first-level Pact Magic spell with another from the warlock list, or exchange your Pact Boon for another Pact Boon.',
  // WIZARD
  'Arcane Recovery':'Once per day when you finish a short rest, recover spell slots with combined level ≤ half your wizard level (rounded up, max slot level 5).',
  'Arcane Tradition':'At level 2, choose a tradition from one of the eight schools of magic (or another tradition). Grants features at levels 2, 6, 10, and 14.',
  'Tradition Feature':'A feature granted by your Arcane Tradition subclass (at levels 6 and 10).',
  'Spell Mastery':'Choose one 1st-level and one 2nd-level wizard spell from your spellbook. Cast them at their lowest level without expending spell slots (must have spellbook on hand). Swap them by spending 8 hours studying.',
  'Signature Spell':'Choose two 3rd-level wizard spells from your spellbook. They are always prepared and don\'t count against your limit. Cast each once per short or long rest at 3rd level without a spell slot.',
  // WIZARD — TCoE Optional
  'Cantrip Formulas (TCoE Optional)':'TCoE optional feature. Available at level 3. You have scribed a set of arcane formulas in your spellbook that you can use to formulate a cantrip in your mind. Whenever you finish a long rest, you can replace one wizard cantrip you know with another wizard cantrip from your spellbook.',
  // ARTIFICER
  'Magical Tinkering':'Touch a Tiny nonmagical object with artisan\'s tools to imbue it with a magical property: a light (5 ft radius), a recorded message (6 sec), a continuous sound or odor, or a static visual effect. Max active imbuements = INT modifier.',
  'Infuse Item':'Learn 4 infusion recipes (gain more as you level). Over a long rest, infuse nonmagical items with magic, turning them into magic items. Active infusions = 2 × proficiency bonus; oldest infusions end when you exceed the limit.',
  'Artificer Specialist':'At level 3, choose a specialty (Alchemist, Armorer, Artillerist, or Battle Smith), granting features at levels 3, 5, 9, and 15.',
  'Flash of Genius':'Reaction when a creature within 30 feet makes an ability check or saving throw: add your INT modifier to the roll. Uses = INT modifier; regain on long rest.',
  'Magic Item Savant':'Attune to up to 4 magic items at once. Ignore all class, race, spell, and level requirements on attuning to or using a magic item.',
  'Magic Item Master':'Attune to up to 5 magic items at once.',
  'Soul of Artifice':'Attune to up to 6 magic items at once. Gain +1 to all saving throws per attuned item.',
  // BLOOD HUNTER (Matt Mercer)
  "Hunter's Bane":'You have advantage on Survival checks to track fey, fiends, and undead. You also gain advantage on Intelligence checks to recall information about them. This bane is the foundation for your Crimson Rite and blood curse abilities.',
  'Blood Maledict':'You gain the ability to channel blood curses. You know one blood curse (chosen from the Blood Hunter list) and can use it a number of times equal to your proficiency bonus per long rest. Curse save DC = 8 + proficiency + INT modifier. At higher levels you gain additional curses and uses.',
  'Crimson Rite':'As a bonus action, you can activate a Crimson Rite on one weapon you hold, dealing an extra 1d4 rite damage of the chosen type (Rite of the Flame, Frozen, or Storm). The rite stays active until you finish a short or long rest. You take psychic damage equal to the rite die when you activate it (no save). Rite damage increases as you level: d4 (levels 1–4), d6 (5–10), d8 (11–16), d10 (17–20).',
  'Brand of Castigation':'When you use your Blood Maledict, you can also brand the cursed creature. While branded, if it deals damage to you, you can use your reaction to teleport up to 30 feet to an unoccupied space you can see. The brand lasts until the curse ends.',
  'Grim Psychometry':'When you touch an object and concentrate for 10 minutes, you can receive vague impressions of the last creature to use it — its appearance, emotional state, and a sense of its most recent purpose. DM decides the clarity and accuracy of the vision.',
  'Dark Augmentation':'Your blood-honed physiology grants you +1 to AC while not wearing heavy armor, advantage on STR saving throws, and your speed increases by 5 feet.',
  'Brand of Tethering':'When a creature branded with Brand of Castigation tries to teleport or travel to another plane, it must succeed on a CHA saving throw (DC = your blood curse DC) or the effect fails and the action is wasted.',
  'Hardened Soul':'You have advantage on saving throws against being frightened or charmed.',
  'Sanguine Mastery':'At level 20, once per turn when you score a critical hit with a weapon attack or reduce a creature to 0 HP, you regain one expended use of Blood Maledict. Additionally, when you use a blood curse feature, you can choose to amplify its effects without spending an additional use.',
  // SHARED
  'Spellcasting':'Cast spells from your class list. Spell save DC = 8 + proficiency bonus + spellcasting modifier. Spell attack bonus = proficiency + spellcasting modifier. Prepared casters choose their list each long rest; known casters have a fixed list; Wizards use a spellbook.',
};

const SUBCLASS_INFO = {

      {lvl:10,name:'Spirit Walker',desc:'Cast commune with nature as a ritual.'},
      {lvl:14,name:'Totemic Attunement',desc:'Bear: while raging, creatures within 5 ft are frightened on your turn (WIS save). Eagle: while raging, you gain a flying speed equal to your walking speed. Wolf: while raging, use bonus action to knock a prone creature prone after a hit.'},
    ]},
    'Path of the Ancestral Guardian':{src:'XGtE',desc:'Barbarians who follow this path call on the spirits of their ancestors to protect their allies in battle.',feats:[
      {lvl:3,name:'Ancestral Protectors',desc:'While raging, the first creature you hit on your turn becomes the focus of your ancestors. That creature has disadvantage on attacks against targets other than you, and those targets have resistance to the creature\'s attacks.'},
      {lvl:6,name:'Spirit Shield',desc:'Reaction when a creature you can see within 30 ft is damaged: reduce the damage by 2d6 (scales to 4d6 at level 10, 6d6 at level 14).'},
      {lvl:10,name:'Consult the Spirits',desc:'Cast clairvoyance once without a spell slot; regain on short or long rest. WIS is your spellcasting ability for this.'},
      {lvl:14,name:'Vengeful Ancestors',desc:'Your Spirit Shield can deal the reduced damage back to the attacker as force damage.'},

    'Path of the Storm Herald':{src:'XGtE',desc:'Followers of this path transform their rage into a storm of elemental power, choosing Desert, Sea, or Tundra at level 3.',feats:[
      {lvl:3,name:'Storm Aura',desc:'While raging, emit a 10-ft aura each turn as a bonus action. Desert: all creatures except you take 2 fire damage (scales). Sea: choose a target within 10 ft to take 1d6+rage-level lightning. Tundra: chosen creature within 10 ft gains 2 temp HP (scales).'},
      {lvl:6,name:'Storm Soul',desc:'Desert: fire resistance, can set things ablaze. Sea: lightning resistance, breathe underwater, swim speed. Tundra: cold resistance, freeze water, chill touch.'},
      {lvl:10,name:'Shielding Storm',desc:'Your Storm Aura also extends its damage resistance to all friendly creatures within it.'},
      {lvl:14,name:'Raging Storm',desc:'Desert: reaction when hit — attacker makes DEX save or falls prone. Sea: when you hit, force STR save or target is knocked prone. Tundra: when you hit, target\'s speed drops to 0 until your next turn (CON save negates).'},
    ]},
    'Path of the Zealot':{src:'XGtE',desc:'Divine fury channels through you. Zealots fight with divine fervor and are nearly impossible to kill permanently.',feats:[
      {lvl:3,name:'Divine Fury',desc:'While raging, the first creature you hit each turn takes extra 1d6 necrotic or radiant damage (your choice at level 3) + half your barbarian level.'},
      {lvl:3,name:'Warrior of the Gods',desc:'If a spell would return you to life (like revivify), the caster needs no material components.'},
      {lvl:6,name:'Fanatical Focus',desc:'Once per rage, if you fail a saving throw, you can reroll it, taking the new result.'},
      {lvl:10,name:'Zealous Presence',desc:'Once per long rest, as a bonus action, choose up to 10 creatures within 60 ft — they gain advantage on attacks and saving throws until the start of your next turn.'},
      {lvl:14,name:'Rage Beyond Death',desc:'While raging, having 0 HP doesn\'t knock you unconscious. You still make death saving throws. You die if you fail three death saves, but you don\'t fall unconscious from 0 HP while raging.'},
    ]},
    'Path of the Beast':{src:'TCoE',desc:'Barbarians on this path tap into the beast within, manifesting natural weapons and feral traits.',feats:[
      {lvl:3,name:'Form of the Beast',desc:'While raging, you can manifest one of: Bite (1d8 piercing, regain HP on hit = prof bonus), Claws (two attacks each dealing 1d6 slashing, bonus action), or Tail (1d8 piercing reach, reaction to add +1d8 to AC once per round).'},
      {lvl:6,name:'Bestial Soul',desc:'Your natural weapons count as magical. Also choose one permanent benefit: swim speed = walk speed, climb speed = walk speed (hands free), or jump distance doubled.'},
      {lvl:10,name:'Infectious Fury',desc:'When you hit with natural weapons while raging, the target must succeed on a WIS save (DC 8+prof+CON) or suffer one of: impose disadvantage on allies\' attacks vs. you, or use its reaction to attack another creature of your choice.'},
      {lvl:14,name:'Call the Hunt',desc:'When you rage, choose up to 5 willing creatures within 30 ft. They each gain 5 temp HP, and once per turn when they hit a creature with an attack, you gain 5 temp HP.'},
    ]},
    'Path of Wild Magic':{src:'TCoE',desc:'These barbarians have been exposed to wild magic and their rage unleashes it in unpredictable bursts.',feats:[
      {lvl:3,name:'Magic Awareness',desc:'As an action, open your senses to detect spells or magic items within 60 ft until end of your next turn (as detect magic, no concentration). Uses = prof bonus per long rest.'},
      {lvl:3,name:'Wild Surge',desc:'When you enter a rage, roll on the Wild Surge table (d8). Effects include: teleport, levitation, spectral claws, ghostly shield, fire aura, plant growth, banishment, or a beam of force.'},
      {lvl:6,name:'Bolstering Magic',desc:'Bonus action: touch a creature (including yourself) to grant either +1d3 to attack/check rolls for 10 minutes, or let it roll a d3 and regain a spell slot of that level or lower. Uses = prof bonus per long rest.'},
      {lvl:10,name:'Unstable Backlash',desc:'Reaction when you take damage or fail a save while raging: immediately roll on the Wild Surge table.'},
      {lvl:14,name:'Controlled Surge',desc:'When you roll on the Wild Surge table, roll two d8s and choose which result to use.'},
    ]},
  },
  Bard:{
    'College of Lore':{src:'PHB',desc:'Bards of the College of Lore know something about everything. They gather scraps of knowledge from every source to undermine enemies with cutting words.',feats:[
      {lvl:3,name:'Bonus Proficiencies',desc:'Gain proficiency in three skills of your choice.'},
      {lvl:3,name:'Cutting Words',desc:'Reaction when a creature within 60 ft that you can hear makes an attack roll, ability check, or damage roll: expend a Bardic Inspiration die and subtract the result from that roll.'},
      {lvl:6,name:'Additional Magical Secrets',desc:'Learn two spells of your choice from any class. They count as bard spells and don\'t count against your spells known.'},
      {lvl:14,name:'Peerless Skill',desc:'When you make an ability check, expend a Bardic Inspiration die and add the result to your roll. You can do this after you roll but before the outcome is revealed.'},
    ]},
    'College of Valor':{src:'PHB',desc:'Bards of the College of Valor are daring skalds who inspire their allies and wade into battle themselves.',feats:[
      {lvl:3,name:'Bonus Proficiencies',desc:'Gain proficiency with medium armor, shields, and martial weapons.'},
      {lvl:3,name:'Combat Inspiration',desc:'Creatures with your Bardic Inspiration die can also use it to add to a weapon damage roll or to their AC as a reaction against one attack.'},
      {lvl:6,name:'Extra Attack',desc:'You can attack twice when you take the Attack action.'},
      {lvl:14,name:'Battle Magic',desc:'When you use your action to cast a bard spell, you can make one weapon attack as a bonus action.'},
    ]},
    'College of Glamour':{src:'XGtE',desc:'The College of Glamour draws on the enchanting magic of the Feywild to captivate and inspire with supernatural grace.',feats:[
      {lvl:3,name:'Mantle of Inspiration',desc:'Bonus action: expend a Bardic Inspiration die to give up to 5 creatures within 60 ft temp HP equal to the die roll + CHA modifier. Each can also immediately move up to their speed without provoking opportunity attacks.'},
      {lvl:3,name:'Enthralling Performance',desc:'After a 1-minute performance, choose up to CHA-modifier humanoids within 60 ft. Each must succeed on a WIS save or be charmed for 1 hour. Usable once per short or long rest.'},
      {lvl:6,name:'Mantle of Majesty',desc:'Bonus action: cast command without a spell slot and take on an unearthly appearance for 1 minute. While active, cast command as a bonus action each turn (no slot). Creatures charmed by you automatically fail their save. Once per long rest.'},
      {lvl:14,name:'Unbreakable Majesty',desc:'Bonus action: assume a magisterial form for 1 minute. Creatures that attempt to attack you must succeed on a CHA save or target another creature. If the attack misses, they are frightened until end of their next turn. Once per short or long rest.'},
    ]},
    'College of Swords':{src:'XGtE',desc:'Bards of the College of Swords entertain using deadly maneuvers with blades, and they are formidable combatants.',feats:[
      {lvl:3,name:'Bonus Proficiencies',desc:'Gain proficiency with medium armor and scimitars.'},
      {lvl:3,name:'Fighting Style',desc:'Choose Dueling or Two-Weapon Fighting.'},
      {lvl:3,name:'Blade Flourish',desc:'When you take the Attack action, your speed increases by 10 ft this turn. Once per turn when you hit, spend a Bardic Inspiration die: Defensive Flourish (add roll to damage + AC until next turn), Slashing Flourish (add roll to damage + damage all other creatures within 5 ft), or Mobile Flourish (add roll to damage + push target 5+roll ft, then move next to them as reaction).'},
      {lvl:6,name:'Extra Attack',desc:'Attack twice when you take the Attack action.'},
      {lvl:14,name:'Master\'s Flourish',desc:'When you use a Blade Flourish option, roll a d6 instead of expending a Bardic Inspiration die.'},
    ]},
    'College of Whispers':{src:'XGtE',desc:'The College of Whispers uses music as a cover for their true skills: manipulation, fear, and assassination.',feats:[
      {lvl:3,name:'Psychic Blades',desc:'When you hit a creature with a weapon attack, expend a Bardic Inspiration die to deal extra psychic damage (2d6 at level 3, scaling up to 8d6 at level 15).'},
      {lvl:3,name:'Words of Terror',desc:'After 1 minute of conversation with a humanoid, they must succeed on a WIS save or be frightened of you or someone you describe for 1 hour. On a success they don\'t know you attempted this. Once per short or long rest.'},
      {lvl:6,name:'Mantle of Whispers',desc:'Reaction when a humanoid dies within 30 ft: capture their shadow. As an action, use it to assume their appearance for 1 hour. You learn their surface memories. Other creatures need an INT check vs. your Deception to see through it.'},
      {lvl:14,name:'Shadow Lore',desc:'As an action, whisper to a creature within 30 ft. It must make a WIS save or be frightened of you for 8 hours, treating you as its darkest secret. While frightened, it must follow your instructions (not suicidal). Once per long rest.'},
    ]},
    'College of Creation':{src:'TCoE',desc:'Minstrels of the College of Creation tap into the Song of Creation that brought the multiverse into being, manifesting objects and animating them.',feats:[
      {lvl:3,name:'Mote of Potential',desc:'When a creature uses your Bardic Inspiration die, it gains an extra effect based on how it\'s used: attack roll (advantage on next attack if die doesn\'t help), ability check (area ripples causing 1d4+CHA psychic damage to nearby enemies), saving throw (temp HP equal to the die roll + CHA modifier).'},
      {lvl:3,name:'Performance of Creation',desc:'Action: create one nonmagical item of up to 20 gp value in an empty space within 10 ft. It lasts for a number of hours = prof bonus. Only one item at a time. Size scales with level (Medium → Huge at level 14). Once per long rest (or spend a spell slot to reuse).'},
      {lvl:6,name:'Animating Performance',desc:'Action or when you cast animate objects: animate one Large or smaller nonmagical item within 30 ft as a Dancing Item. It has its own HP, AC, and attacks (uses your spell save DC). You can give it commands as a bonus action. Lasts 1 hour. Once per long rest (or spell slot).'},
      {lvl:14,name:'Creative Crescendo',desc:'When you use Performance of Creation, create up to prof-bonus items simultaneously (only one can be larger than Small). Items don\'t count against your slot economy.'},
    ]},
    'College of Eloquence':{src:'TCoE',desc:'Masters of oratory, these bards wield words as weapons, always finding the perfect phrase to move hearts or pierce defenses.',feats:[
      {lvl:3,name:'Silver Tongue',desc:'When you make a Persuasion or Deception check, treat a d20 roll of 9 or lower as a 10.'},
      {lvl:3,name:'Unsettling Words',desc:'Bonus action: expend a Bardic Inspiration die and choose one creature you can see within 60 ft. It subtracts the result of the die from the next saving throw it makes before your next turn.'},
      {lvl:6,name:'Unfailing Inspiration',desc:'If a creature adds your Bardic Inspiration die to a roll and still fails, it keeps the Bardic Inspiration die.'},
      {lvl:6,name:'Universal Speech',desc:'Action: choose up to CHA-modifier creatures within 60 ft. They can magically understand you regardless of language for 1 hour. Once per long rest (or spend a spell slot).'},
      {lvl:14,name:'Infectious Inspiration',desc:'When a creature within 60 ft uses your Bardic Inspiration die and succeeds, you can use your reaction to give a different creature (not the original) a Bardic Inspiration die for free. Uses = CHA modifier per long rest.'},
    ]},
    'College of Spirits':{src:'VRGtR',desc:'Bards of the College of Spirits seek tales with inherent power, using occult trappings to conjure spiritual embodiments. These spirits are capricious, and what a bard summons isn\'t always entirely under their control.',feats:[
      {lvl:3,name:'Guiding Whispers',desc:'You learn the guidance cantrip, which doesn\'t count against bard cantrips known. It has a range of 60 feet when you cast it.'},
      {lvl:3,name:'Spiritual Focus',desc:'You can use a candle, crystal ball, skull, spirit board, or tarokka deck as a spellcasting focus for bard spells. Starting at 6th level, when you cast a bard spell that deals damage or restores HP through the Spiritual Focus, roll a d6 and add it to one damage or healing roll.'},
      {lvl:3,name:'Tales from Beyond',desc:'Bonus action: expend one use of Bardic Inspiration and roll on the Spirit Tales table (using your Bardic Inspiration die) to determine the tale. You retain it until you bestow its effect (action: target one creature within 30 ft) or finish a short/long rest. Roll again to replace. If the effect requires a save, DC = your spell save DC. Effects range from temporary HP, teleportation, forced saves, and damage, to invisibility and healing — depending on the die result (1-12).'},
      {lvl:6,name:'Spirit Session',desc:'Conduct a 1-hour ritual with up to your prof-bonus willing creatures (during a rest). At the end, temporarily learn one spell from any class that is of a level ≤ the number of participants, is castable by you, and is from the divination or necromancy school. It counts as a bard spell but not against spells known. You forget it at the start of your next long rest. Once per long rest.'},
      {lvl:14,name:'Mystical Connection',desc:'When you roll on the Spirit Tales table, roll the die twice and choose which of the two effects to bestow. If both dice show the same number, ignore both and choose any effect on the table.'},
    ]},
  },
  Cleric:{
    'Life Domain':{src:'PHB',desc:'The Life domain focuses on positive energy — healing the living and turning undead. Life clerics are exceptional healers.',feats:[
      {lvl:1,name:'Bonus Proficiency',desc:'Heavy armor proficiency.'},
      {lvl:1,name:'Disciple of Life',desc:'Whenever you use a spell of 1st level or higher to restore HP, the creature regains additional HP equal to 2 + the spell\'s level.'},
      {lvl:2,name:'Channel Divinity: Preserve Life',desc:'Action: restore HP to creatures within 30 ft (up to 5× your cleric level total). Each creature can be restored up to half its HP maximum.'},
      {lvl:6,name:'Blessed Healer',desc:'When you cast a healing spell of 1st level or higher targeting another creature, you regain HP equal to 2 + the spell\'s level.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 radiant damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Supreme Healing',desc:'When you would roll dice to restore HP, use the maximum number instead.'},
    ]},
    'Light Domain':{src:'PHB',desc:'The Light domain promotes ideals of rebirth and renewal, truth, vigilance, and the pursuit of beauty. Light clerics are blasters with excellent defensive options.',feats:[
      {lvl:1,name:'Bonus Cantrip',desc:'Gain the light cantrip if you don\'t already know it.'},
      {lvl:1,name:'Warding Flare',desc:'Reaction when an attacker within 30 ft hits you: impose disadvantage on the attack roll. Uses = WIS modifier per long rest.'},
      {lvl:2,name:'Channel Divinity: Radiance of the Dawn',desc:'Action: dispel magical darkness in a 30-ft radius, and hostile creatures within the radius take 2d10 + cleric level radiant damage (CON save for half).'},
      {lvl:6,name:'Improved Flare',desc:'Your Warding Flare can now protect other creatures within 30 ft, not just yourself.'},
      {lvl:8,name:'Potent Spellcasting',desc:'Add your WIS modifier to the damage you deal with any cleric cantrip.'},
      {lvl:17,name:'Corona of Light',desc:'Action: activate an aura lasting 1 minute. Hostile creatures within 60 ft have disadvantage on saving throws against spells that deal fire or radiant damage.'},
    ]},
    'War Domain':{src:'PHB',desc:'War domain clerics are powerful warriors inspired by gods of conflict. They balance physical combat with divine spellcasting.',feats:[
      {lvl:1,name:'Bonus Proficiencies',desc:'Martial weapons and heavy armor.'},
      {lvl:1,name:'War Priest',desc:'When you use the Attack action, you can make one weapon attack as a bonus action. Uses = WIS modifier per long rest.'},
      {lvl:2,name:'Channel Divinity: Guided Strike',desc:'When you make an attack roll, add +10 to the roll.'},
      {lvl:6,name:"Channel Divinity: War God's Blessing",desc:'Reaction when a creature within 30 ft makes an attack roll: grant it a +10 bonus to that roll.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 damage of the weapon type on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Avatar of Battle',desc:'Gain resistance to bludgeoning, piercing, and slashing damage from nonmagical weapons.'},
    ]},
    'Trickery Domain':{src:'PHB',desc:'Gods of trickery are mischief-makers and instigators of chaos. Their clerics are skilled liars, thieves, and spies.',feats:[
      {lvl:1,name:'Blessing of the Trickster',desc:'Touch a willing creature to give it advantage on Stealth checks for 1 hour (not yourself). Once per long rest.'},
      {lvl:2,name:'Channel Divinity: Invoke Duplicity',desc:'Action: create an illusory duplicate of yourself within 30 ft for 1 minute (concentration). You can cast spells as if you were in the duplicate\'s space, and you and allies have advantage on attacks against creatures within 5 ft of it.'},
      {lvl:6,name:'Channel Divinity: Cloak of Shadows',desc:'Action: become invisible until end of next turn or until you attack/cast a spell.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 poison damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Improved Duplicity',desc:'You can create up to four duplicates at once. As a bonus action on your turn, you can move any number of them up to 30 ft.'},
    ]},
    'Tempest Domain':{src:'PHB',desc:'Gods of storms are some of the most powerful deities. Tempest clerics call on the power of lightning and thunder to smite enemies.',feats:[
      {lvl:1,name:'Bonus Proficiencies',desc:'Martial weapons and heavy armor.'},
      {lvl:1,name:'Wrath of the Storm',desc:'Reaction when a creature within 5 ft hits you: deal 2d8 lightning or thunder damage (DEX save for half). Uses = WIS modifier per long rest.'},
      {lvl:2,name:'Channel Divinity: Destructive Wrath',desc:'When you roll lightning or thunder damage, use the maximum result instead of rolling.'},
      {lvl:6,name:'Thunderbolt Strike',desc:'When you deal lightning damage to a Large or smaller creature, you can push it up to 10 feet away.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 thunder damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Stormborn',desc:'You gain a flying speed equal to your current walking speed whenever you are not underground or indoors.'},
    ]},
    'Knowledge Domain':{src:'PHB',desc:'The gods of knowledge prize learning above all. Clerics of this domain study ancient tomes and gather secrets.',feats:[
      {lvl:1,name:'Blessings of Knowledge',desc:'Learn two languages and gain proficiency in two of: Arcana, History, Nature, or Religion. Your proficiency bonus is doubled for those skills.'},
      {lvl:2,name:'Channel Divinity: Knowledge of the Ages',desc:'Action: choose a skill or tool. Gain proficiency with it for 10 minutes.'},
      {lvl:2,name:'Channel Divinity: Read Thoughts',desc:'Action: read the surface thoughts of a creature within 60 ft (WIS save). If it fails, read thoughts for 1 minute and cast suggestion once without a spell slot.'},
      {lvl:6,name:'Potent Spellcasting',desc:'Add your WIS modifier to cleric cantrip damage.'},
      {lvl:8,name:'Visions of the Past',desc:'Meditate for 1 minute to learn recent history of a held object or nearby location.'},
      {lvl:17,name:'Read Thoughts (improved)',desc:'You can cast the read thoughts effect more broadly, learning deeper information.'},
    ]},
    'Nature Domain':{src:'PHB',desc:'Nature domain clerics are bonded to the natural world and its wild creatures.',feats:[
      {lvl:1,name:'Acolyte of Nature',desc:'Learn one druid cantrip. Gain proficiency in Animal Handling, Nature, or Survival.'},
      {lvl:1,name:'Bonus Proficiency',desc:'Heavy armor.'},
      {lvl:2,name:'Channel Divinity: Charm Animals and Plants',desc:'Action: all beasts and plants within 30 ft are charmed by you for 1 minute (WIS save negates).'},
      {lvl:6,name:'Dampen Elements',desc:'Reaction when you or a creature within 30 ft takes acid, cold, fire, lightning, or thunder damage: grant resistance to that damage for the attack.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 cold, fire, or lightning damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Master of Nature',desc:'Creatures charmed by your Channel Divinity obey your spoken commands (no action required).'},
    ]},
    'Forge Domain':{src:'XGtE',desc:'The gods of the forge are masters of creation. Forge clerics create and protect, and are well-armored combatants.',feats:[
      {lvl:1,name:'Bonus Proficiency',desc:'Heavy armor and smith\'s tools.'},
      {lvl:1,name:'Blessing of the Forge',desc:'At the end of a long rest, imbue one weapon or piece of armor to become magical: weapon gets +1 to attack/damage, armor gets +1 AC. Lasts until your next long rest.'},
      {lvl:2,name:'Channel Divinity: Artisan\'s Blessing',desc:'1-hour ceremony: create a nonmagical item of metal worth up to 100 gp (requires raw materials equal to the item\'s cost).'},
      {lvl:6,name:'Soul of the Forge',desc:'Resistance to fire damage. While wearing heavy armor, +1 AC.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 fire damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Saint of Forge and Fire',desc:'Immunity to fire damage. While wearing heavy armor, resistance to bludgeoning, piercing, and slashing from nonmagical attacks.'},
    ]},
    'Grave Domain':{src:'XGtE',desc:'Grave clerics watch over the line between life and death, fighting undead and ensuring the dead remain at peace.',feats:[
      {lvl:1,name:'Circle of Mortality',desc:'When you cast a healing spell on a creature with 0 HP, use the maximum result. You also learn spare the dying, which has 30 ft range and can be cast as a bonus action.'},
      {lvl:1,name:'Eyes of the Grave',desc:'Action: detect undead within 60 ft (as detect evil, but undead only). Uses = WIS modifier per long rest.'},
      {lvl:2,name:'Channel Divinity: Path to the Grave',desc:'Action: curse a creature within 30 ft until end of your next turn — the next hit against it becomes a critical hit (automatically).'},
      {lvl:6,name:'Sentinel at Death\'s Door',desc:'Reaction when you or an ally within 30 ft suffers a critical hit: turn that hit into a normal hit. Uses = WIS modifier per long rest.'},
      {lvl:8,name:'Potent Spellcasting',desc:'Add WIS modifier to cleric cantrip damage.'},
      {lvl:17,name:'Keeper of Souls',desc:'Reaction when a creature dies within 60 ft: that creature\'s soul grants 1 HP per its CR to you or a creature within 60 ft.'},
    ]},
    'Order Domain':{src:'TCoE',desc:'Order domain clerics enforce law and structure, commanding allies and striking enemies with holy authority.',feats:[
      {lvl:1,name:'Bonus Proficiencies',desc:'Heavy armor and Intimidation or Persuasion.'},
      {lvl:1,name:'Voice of Authority',desc:'When you cast a spell of 1st level or higher that targets a friendly creature, that creature can use its reaction to make one melee weapon attack.'},
      {lvl:2,name:'Channel Divinity: Order\'s Demand',desc:'Action: charm any number of creatures within 30 ft (WIS save negates). Charmed creatures are incapacitated and their speed drops to 0. Effect ends if they take damage or you use Channel Divinity again.'},
      {lvl:6,name:'Embodiment of the Law',desc:'When you cast an enchantment spell of 1st level or higher, you can cast it as a bonus action (uses = WIS modifier per long rest).'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 psychic damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Order\'s Wrath',desc:'When a creature affected by Voice of Authority attacks an enemy, that enemy is cursed until your next turn — your divine strike deals an extra 2d8 psychic damage against it.'},
    ]},
    'Peace Domain':{src:'TCoE',desc:'Peace domain clerics foster harmony and protect their allies with bonds of divine energy.',feats:[
      {lvl:1,name:'Implement of Peace',desc:'Proficiency in Insight, Performance, or Persuasion (your choice).'},
      {lvl:1,name:'Emboldening Bond',desc:'Action: create a bond between up to prof-bonus willing creatures within 30 ft for 10 minutes. Once per turn, a bonded creature can add 1d4 to one attack roll, ability check, or saving throw while within 30 ft of another bonded creature.'},
      {lvl:2,name:'Channel Divinity: Balm of Peace',desc:'Move up to your speed without provoking opportunity attacks. When you move within 5 ft of a creature, restore 2d6 + WIS modifier HP to it (each creature only once per use).'},
      {lvl:6,name:'Protective Bond',desc:'Bonded creatures can protect each other: when one is about to take damage, another bonded creature within 60 ft can use its reaction to teleport to the first and take all the damage instead.'},
      {lvl:8,name:'Potent Spellcasting',desc:'Add WIS modifier to cleric cantrip damage.'},
      {lvl:17,name:'Expansive Bond',desc:'Emboldening Bond works at any range, and Protective Bond works within 60 ft.'},
    ]},
    'Twilight Domain':{src:'TCoE',desc:'Twilight domain clerics guard the boundary between day and night, protecting the vulnerable from the terrors of the dark.',feats:[
      {lvl:1,name:'Bonus Proficiencies',desc:'Martial weapons and heavy armor.'},
      {lvl:1,name:'Eyes of Night',desc:'See in magical and nonmagical darkness up to 300 ft. Bonus action: grant darkvision (300 ft) to up to 5 creatures within 10 ft for 1 hour. Uses = WIS modifier per long rest.'},
      {lvl:1,name:'Vigilant Blessing',desc:'When you finish a long rest, touch one creature and grant them advantage on their next initiative roll.'},
      {lvl:2,name:'Channel Divinity: Twilight Sanctuary',desc:'Action: emanate a 30-ft sphere of twilight for 1 minute (concentration). Creatures that end their turn inside choose: gain temp HP equal to 1d6 + cleric level, or end one charm or fear effect.'},
      {lvl:6,name:'Steps of Night',desc:'When you\'re in dim light or darkness, bonus action to gain a flying speed equal to your walking speed for 1 minute. Uses = prof bonus per long rest.'},
      {lvl:8,name:'Divine Strike',desc:'Once per turn, deal +1d8 radiant or necrotic damage on a weapon hit (2d8 at level 14).'},
      {lvl:17,name:'Twilight Shroud',desc:'You and allies in your Twilight Sanctuary have half cover.'},
    ]},
  },
  Druid:{
    'Circle of the Land':{src:'PHB',desc:'Land druids draw power from the natural world and a specific terrain, becoming experts in the magic associated with it.',feats:[
      {lvl:2,name:'Bonus Cantrip',desc:'Learn one additional druid cantrip.'},
      {lvl:2,name:'Natural Recovery',desc:'After a short rest, recover expended spell slots with combined level ≤ half your druid level (rounded up, max 5th level). Once per long rest.'},
      {lvl:2,name:'Circle Spells',desc:'Choose Arctic, Coast, Desert, Forest, Grassland, Mountain, Swamp, or Underdark. You always have specific spells prepared for that terrain (e.g. Forest: barkskin, spider climb, call lightning, plant growth, commune with nature).'},
      {lvl:6,name:"Land's Stride",desc:'Moving through nonmagical difficult terrain costs no extra movement. Advantage on saves against magically created plants.'},
      {lvl:10,name:"Nature's Ward",desc:'Immune to poison and disease; immune to charm and fear from elementals and fey.'},
      {lvl:14,name:"Nature's Sanctuary",desc:'Beasts and plants that attack you must make a WIS save or choose a different target.'},
    ]},
    'Circle of the Moon':{src:'PHB',desc:'Moon druids are masters of Wild Shape, transforming into powerful beasts in combat far beyond what other druids can manage.',feats:[
      {lvl:2,name:'Combat Wild Shape',desc:'Use Wild Shape as a bonus action. While in beast form, use a bonus action to expend spell slots to heal (1d8 HP per slot level). CR limit is now 1 per druid level (max CR 6 at level 6, and includes beasts with a swim/fly speed from level 8).'},
      {lvl:2,name:'Circle Forms',desc:'Your CR limit is max CR = your druid level ÷ 3 (minimum CR 1), much higher than normal.'},
      {lvl:6,name:'Primal Strike',desc:'Your attacks in beast form count as magical for overcoming resistance and immunity.'},
      {lvl:10,name:'Elemental Wild Shape',desc:'Spend two uses of Wild Shape to transform into an air, earth, fire, or water elemental.'},
      {lvl:14,name:'Thousand Forms',desc:'Cast alter self at will.'},
    ]},
    'Circle of Dreams':{src:'XGtE',desc:'Dreamland druids forge connections to the Feywild, using its magic to heal and protect.',feats:[
      {lvl:2,name:'Balm of the Summer Court',desc:'Pool of healing dice = your druid level. Bonus action: restore 1d6 per die spent (up to your WIS modifier dice at once) to a creature within 120 ft, plus 1 temp HP per die spent. Replenish on long rest.'},
      {lvl:6,name:'Hearth of Moonlight and Shadow',desc:'During a short or long rest: create a 30-ft invisible sphere of magic. Bright light inside doesn\'t radiate outward; creatures within have +5 Perception and can\'t be surprised.'},
      {lvl:10,name:'Hidden Paths',desc:'Bonus action: teleport up to 60 ft to a visible unoccupied space. Or touch a willing creature and teleport it up to 30 ft. Uses = WIS modifier per long rest.'},
