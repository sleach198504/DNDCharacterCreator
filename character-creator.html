        if(clsTag){clsTag.style.cssText='font-size:9px;color:var(--parchment-dim);min-width:68px;';clsTag.textContent='('+entry.cls+')';}
        if(i===0){
          const fixedSpan=document.createElement('span'); fixedSpan.style.cssText='color:var(--parchment-dim);';
          fixedSpan.textContent=`d${hdN} (max) + CON ${conMod2>=0?'+':''}${conMod2} = ${hdN+conMod2} HP`;
          row.appendChild(lvlSpan); if(clsTag)row.appendChild(clsTag); row.appendChild(fixedSpan);
        } else {
          const inp=document.createElement('input'); inp.type='number'; inp.min='1'; inp.max=String(hdN);
          inp.value=(C.hpPerLevel||[])[i]||avg;
          inp.style.cssText='width:52px;padding:3px 6px;font-size:12px;';
          inp.placeholder=String(avg);
          inp.addEventListener('change',e=>{if(!C.hpPerLevel)C.hpPerLevel=[];C.hpPerLevel[i]=parseInt(e.target.value)||1;render();});
          const conSpan=document.createElement('span'); conSpan.style.cssText='color:var(--parchment-dim);';
          const roll=parseInt((C.hpPerLevel||[])[i])||avg;
          conSpan.textContent=`d${hdN} + CON ${conMod2>=0?'+':''}${conMod2} = ${roll+conMod2} HP`;
          row.appendChild(lvlSpan); if(clsTag)row.appendChild(clsTag); row.appendChild(inp); row.appendChild(conSpan);
        }
        tbl.appendChild(row);
      }
      hpCard.appendChild(tbl);
      const tot=document.createElement('div'); tot.style.cssText='font-family:Cinzel,serif;font-size:14px;color:var(--gold);margin-top:10px;border-top:1px solid var(--border);padding-top:8px;';
      tot.textContent=`Total Max HP: ${computeMaxHP()}`;
      hpCard.appendChild(tot);
    }
    el.appendChild(hpCard);
  }

  const ci = C.charInfo;
  const field=(label,key,placeholder,multiline)=>{
    const wrap=document.createElement('div'); wrap.style.marginBottom='14px';
    const lbl=document.createElement('div'); lbl.className='label'; lbl.textContent=label;
    wrap.appendChild(lbl);
    if(multiline){
      const ta=document.createElement('textarea'); ta.rows=4; ta.value=ci[key]; ta.placeholder=placeholder||'';
      ta.addEventListener('input',e=>{ci[key]=e.target.value;});
      wrap.appendChild(ta);
    } else {
      const inp=document.createElement('input'); inp.type='text'; inp.value=ci[key]; inp.placeholder=placeholder||'';
      inp.addEventListener('input',e=>{ci[key]=e.target.value;});
      wrap.appendChild(inp);
    }
    return wrap;
  };

  // Physical appearance
  const physCard=document.createElement('div'); physCard.className='card'; physCard.style.marginBottom='14px';
  physCard.appendChild(Object.assign(document.createElement('div'),{className:'label',textContent:'Physical Appearance',style:'margin-bottom:12px;'}));
  const physGrid=document.createElement('div'); physGrid.className='g3';
  physGrid.appendChild(field('Age','age','e.g. 25'));
  physGrid.appendChild(field('Height','height','e.g. 5\'10"'));
  physGrid.appendChild(field('Weight','weight','e.g. 160 lbs'));
  physGrid.appendChild(field('Eyes','eyes','e.g. Brown'));
  physGrid.appendChild(field('Skin','skin','e.g. Tan'));
  physGrid.appendChild(field('Hair','hair','e.g. Black'));
  physCard.appendChild(physGrid); el.appendChild(physCard);

  // Personality
  const persCard=document.createElement('div'); persCard.className='card'; persCard.style.marginBottom='14px';
  persCard.appendChild(Object.assign(document.createElement('div'),{className:'label',textContent:'Personality & Backstory',style:'margin-bottom:12px;'}));
  const persNote=document.createElement('div'); persNote.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:12px;';
  persNote.textContent='These details shape your character\'s role-playing identity. Reference your background for inspiration.';
  persCard.appendChild(persNote);
  const persGrid=document.createElement('div'); persGrid.className='g2';
  persGrid.appendChild(field('Personality Traits','personality','How does your character act? What quirks or habits do they have?',true));
  persGrid.appendChild(field('Ideals','ideals','What drives your character? What principles do they hold above all else?',true));
  persGrid.appendChild(field('Bonds','bonds','What connects your character to the world — people, places, or things they care about?',true));
  persGrid.appendChild(field('Flaws','flaws','What weakness, compulsion, or dark secret does your character have?',true));
  persCard.appendChild(persGrid); el.appendChild(persCard);

  // Backstory
  const bgCard=document.createElement('div'); bgCard.className='card'; bgCard.style.marginBottom='14px';
  bgCard.appendChild(Object.assign(document.createElement('div'),{className:'label',textContent:'Backstory',style:'margin-bottom:8px;'}));
  const bsNote=document.createElement('div'); bsNote.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:10px;';
  bsNote.textContent='Where did your character come from? What shaped them before the adventure began?';
  bgCard.appendChild(bsNote);
  bgCard.appendChild(field('','backstory','Write your character\'s backstory here...',true));
  el.appendChild(bgCard);
}

function renderReview(el) {
  const title=document.createElement('div'); title.className='step-title'; title.textContent='Review & Export';
  el.appendChild(title);
  const cls=CLASSES[C.cls]||{};
  const race=RACES[C.race]||{bonus:{},traits:[],spd:30};
  const bg=getEffectiveBg();
  const bgReplacements=C.bgSkillReplacements||{};
  const effectiveBgSkills=bg.skills.map(s=>bgReplacements[s]||s);
  const allSkills=getAllSkillProfs(); // includes class/subclass skill grants
  const profB=pb(totalCharLevel());
  const hd=parseInt((cls.hd||'d8').replace('d',''));
  const allClassEntries=getAllClasses();
  const conMod=mmod(fs('CON'));
  const maxHP=computeMaxHP();
  const ac=computeAC();

  // Identity card
  const idCard=document.createElement('div'); idCard.className='card'; idCard.style.marginBottom='14px';
  idCard.innerHTML=`<div style="font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold);margin-bottom:8px;">${C.name||'Unnamed Hero'}</div>`;
  const chips=document.createElement('div');
  const raceDisplay=(C.subrace==='Variant')?'Variant Human':(C.subrace||C.race);
  const classLabel=allClassEntries.length>1
    ? allClassEntries.map(e=>`${e.cls} ${e.level}`).join(' / ')
    : (C.cls?(C.subclass?`${C.cls} (${C.subclass})`:C.cls):'');
  const levelLabel=allClassEntries.length>1?`Total Lv ${totalCharLevel()}`:`Level ${C.level}`;
  for(const x of [raceDisplay,classLabel,allClassEntries.length>1?null:C.subclass,levelLabel,C.bg,C.alignment].filter(Boolean)){
    const sp=document.createElement('span'); sp.className='badge badge-gold'; sp.textContent=x; chips.appendChild(sp);
  }
  if(C.hp){ const hpSp=document.createElement('span'); hpSp.className='badge badge-gold'; hpSp.textContent=`HP: ${C.hp}`; chips.appendChild(hpSp); }
  idCard.appendChild(chips);
  const ci=C.charInfo||{};
  const physPairs=[['Age',ci.age],['Height',ci.height],['Weight',ci.weight],['Eyes',ci.eyes],['Skin',ci.skin],['Hair',ci.hair]].filter(([,v])=>v);
  if(physPairs.length){
    const physRow=document.createElement('div'); physRow.style.cssText='display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;';
    for(const [lbl,val] of physPairs){const d=document.createElement('div');d.innerHTML=`<span class="label" style="font-size:9px;">${lbl}</span><div style="font-size:12px;">${val}</div>`;physRow.appendChild(d);}
    idCard.appendChild(physRow);
  }
  const persPairs=[['Personality',ci.personality],['Ideals',ci.ideals],['Bonds',ci.bonds],['Flaws',ci.flaws],['Backstory',ci.backstory]].filter(([,v])=>v);
  if(persPairs.length){
    const persDiv=document.createElement('div'); persDiv.style.marginTop='10px';
    for(const [lbl,val] of persPairs){const d=document.createElement('div');d.style.cssText='font-size:12px;margin-bottom:6px;';d.innerHTML=`<span class="label" style="font-size:9px;">${lbl}: </span><span style="color:var(--parchment-dim);">${val}</span>`;persDiv.appendChild(d);}
    idCard.appendChild(persDiv);
  }
  el.appendChild(idCard);

  // Combat stats
  const combatCard=document.createElement('div'); combatCard.className='card'; combatCard.style.marginBottom='14px';
  const cg=document.createElement('div'); cg.className='g3';
  const {bonus:initBonus,adv:initAdv}=computeInitiative();
  const initStr=(initBonus>=0?'+':'')+initBonus+(initAdv?' (Adv)':'');
  for(const [l,v] of [['Max HP',maxHP],['AC',ac],['Initiative',initStr],['Prof Bonus','+'+profB],['Speed',race.spd+' ft'],['Passive Perc',10+getSkillBonus('Perception')]]) {
    const d=document.createElement('div'); d.style.textAlign='center';
    d.innerHTML=`<div class="label">${l}</div><div style="font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--parchment);">${v}</div>`;
    cg.appendChild(d);
  }
  // Armor/shield selector row
  const autoInferred=inferArmorFromInventory();
  const armorInInventory=getArmorInInventory();
  // Only show armor that is both proficient AND present in inventory
  const allowedArmor=getArmorOptions().filter(r=>armorInInventory.has(r[0]));
  const hasShieldProf=classHasShieldProf();
  const armorRow=document.createElement('div'); armorRow.style.cssText='display:flex;gap:8px;align-items:center;margin-top:10px;border-top:1px solid var(--border);padding-top:10px;flex-wrap:wrap;';
  const armorLbl=document.createElement('span'); armorLbl.style.cssText='font-size:11px;color:var(--parchment-dim);'; armorLbl.textContent='Armor:';
  const armorSel=document.createElement('select'); armorSel.style.cssText='font-size:11px;padding:4px 6px;flex:1;min-width:120px;';
  const autoLabel=`Auto (${autoInferred.armor==='Unarmored'?'none in inventory':autoInferred.armor})`;
  // Unarmored formula label
  const allClsNames=allClassEntries.map(e=>e.cls);
  const unarmoredLabel='Unarmored (10+DEX'+(allClsNames.includes('Barbarian')?'+CON':allClsNames.includes('Monk')?'+WIS':'')+')';
  armorSel.innerHTML=
    `<option value="Auto"${C.armorName==='Auto'?' selected':''}>${autoLabel}</option>`+
    `<option value="Unarmored"${C.armorName==='Unarmored'?' selected':''}>${unarmoredLabel}</option>`+
    (allowedArmor.length
      ? '<optgroup label="Proficient Armor">'+
        allowedArmor.map(r=>`<option value="${r[0]}"${C.armorName===r[0]?' selected':''}>${r[0]} (${r[2]})</option>`).join('')+
        '</optgroup>'
      : '');
  armorSel.value=C.armorName||'Auto';
  armorSel.addEventListener('change',e=>{C.armorName=e.target.value;render();});
  armorRow.appendChild(armorLbl); armorRow.appendChild(armorSel);
  // Shield checkbox — always manual, only shown if class is proficient
  if(hasShieldProf){
    const shieldChk=document.createElement('input'); shieldChk.type='checkbox';
    shieldChk.checked=C.hasShield||false; shieldChk.id='shield-chk';
    shieldChk.addEventListener('change',e=>{C.hasShield=e.target.checked;render();});
    const shieldLbl=document.createElement('label'); shieldLbl.htmlFor='shield-chk';
    shieldLbl.style.cssText='font-size:11px;color:var(--parchment-dim);cursor:pointer;';
    shieldLbl.textContent='Shield (+2)';
    armorRow.appendChild(shieldChk); armorRow.appendChild(shieldLbl);
  }
  const acNote=document.createElement('span'); acNote.style.cssText='font-size:11px;color:var(--gold);margin-left:auto;font-family:Cinzel,serif;'; acNote.textContent='AC: '+ac;
  armorRow.appendChild(acNote);
  combatCard.appendChild(cg); combatCard.appendChild(armorRow); el.appendChild(combatCard);

  // Spell Slots card (only for casters)
  {
    const slotsInfo = getSpellSlotsInfo();
    if (slotsInfo && (slotsInfo.rows.length || slotsInfo.warlockRow)) {
      const slotCard = document.createElement('div'); slotCard.className = 'card'; slotCard.style.marginBottom = '14px';
      slotCard.innerHTML = '<div class="label" style="margin-bottom:8px;">Spell Slots (Per Long Rest)</div>';
      const slotGrid = document.createElement('div');
      slotGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;';
      const allSlotRows = slotsInfo.warlockRow ? [...slotsInfo.rows, slotsInfo.warlockRow] : slotsInfo.rows;
      for (const {label, count} of allSlotRows) {
        const box = document.createElement('div');
        box.style.cssText = 'text-align:center;min-width:52px;padding:6px 8px;background:rgba(201,168,76,0.1);border:1px solid var(--border);border-radius:4px;';
        box.innerHTML = `<div style="font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--parchment);">${count}</div><div style="font-size:9px;color:var(--parchment-dim);margin-top:2px;">${label}</div>`;
        slotGrid.appendChild(box);
      }
      slotCard.appendChild(slotGrid);
      if (slotsInfo.note) {
        const noteEl = document.createElement('div'); noteEl.style.cssText = 'font-size:11px;color:var(--parchment-dim);font-style:italic;margin-top:4px;';
        noteEl.textContent = slotsInfo.note; slotCard.appendChild(noteEl);
      }
      el.appendChild(slotCard);
    }
  }

  // Final scores
  const scCard=document.createElement('div'); scCard.className='card'; scCard.style.marginBottom='14px';
  scCard.innerHTML='<div class="label" style="margin-bottom:10px;">Ability Scores</div>';
  const sg=document.createElement('div'); sg.className='g6';
  for(const ab of ABS){ const f=fs(ab); const box=document.createElement('div'); box.className='stat-box'; box.innerHTML=`<div class="stat-lbl">${ab}</div><div class="stat-num">${f}</div><div class="stat-mod">${mstr(f)}</div>`; sg.appendChild(box); }
  scCard.appendChild(sg); el.appendChild(scCard);

  // Skills + saves + features
  const twoCol=document.createElement('div'); twoCol.className='g2'; twoCol.style.marginBottom='14px';
  // Skills
  const skCard=document.createElement('div'); skCard.className='card';
  skCard.innerHTML='<div class="label" style="margin-bottom:8px;">Skills</div>';
  const expertiseSkills=getExpertiseSkills();
  const bardEntry=allClassEntries.find(e=>e.cls==='Bard');
  const joat=!!(bardEntry&&bardEntry.level>=2);
  for(const [sk,ab] of Object.entries(SKILLS_MAP)){
    const prof=allSkills.includes(sk);
    const exp=expertiseSkills.includes(sk);
    const bon=getSkillBonus(sk);
    const halfProf=!prof&&joat;
    const row=document.createElement('div'); row.className='skill-row';
    const marker=exp?'★ ':prof?'● ':'○ ';
    const markerStyle=exp?'color:var(--gold);':'';
    row.innerHTML=`<span class="${prof||exp?'skill-prof':halfProf?'skill-half':''}" style="${markerStyle}">${marker}${sk} <span class="muted" style="font-size:10px;">(${ab}${exp?' ×2 Exp':halfProf?' ½ JoAT':''})</span></span><span class="skill-bonus">${bon>=0?'+':''}${bon}</span>`;
    const sd=SKILL_DESC[sk];
    if(sd){ row.style.cursor='pointer'; row.title='Click for details'; row.addEventListener('click',()=>showPopup(sk,`<strong style="color:var(--gold)">${sd.ab} ability</strong><br><br>${sd.desc}`,'PHB')); }
    skCard.appendChild(row);
  }
  twoCol.appendChild(skCard);
  // Right col: saves + features
  const rightCol=document.createElement('div');
  const savCard=document.createElement('div'); savCard.className='card'; savCard.style.marginBottom='14px';
  savCard.innerHTML='<div class="label" style="margin-bottom:8px;">Saving Throws</div>';
  const allSaves=[...new Set(allClassEntries.flatMap(e=>(CLASSES[e.cls]||{}).saves||[]))];
  for(const ab of ABS){ const prof=allSaves.includes(ab); const bon=mmod(fs(ab))+(prof?profB:0); const row=document.createElement('div'); row.className='skill-row'; row.innerHTML=`<span class="${prof?'skill-prof':''}">${prof?'● ':'○ '}${ab}</span><span class="skill-bonus">${bon>=0?'+':''}${bon}</span>`; savCard.appendChild(row); }
  rightCol.appendChild(savCard);
  const featCard=document.createElement('div'); featCard.className='card';
  featCard.innerHTML='<div class="label" style="margin-bottom:8px;">Class Features</div>';
  for(const entry of allClassEntries){
    const eClsObj=CLASSES[entry.cls]||{};
    if(allClassEntries.length>1){
      const hdr=document.createElement('div'); hdr.style.cssText='font-size:10px;color:var(--gold);font-family:Cinzel,serif;margin-top:6px;margin-bottom:2px;';
      hdr.textContent=entry.cls+' (Lv '+entry.level+')'; featCard.appendChild(hdr);
    }
    for(const [l,fs2] of Object.entries(eClsObj.feats||{}).filter(([l])=>parseInt(l)<=entry.level)){
      const row=document.createElement('div'); row.className='feat-row'; row.innerHTML=`<span class="feat-lvl">Lv${l}</span>${fs2.join(', ')}`; featCard.appendChild(row);
    }
    // Subclass features for this class entry
    if(entry.subclass){
      const subInfoEntry=(SUBCLASS_INFO[entry.cls]||{})[entry.subclass];
      if(subInfoEntry){
        const scFeatsEntry=(subInfoEntry.feats||[]).filter(f=>f.lvl<=entry.level);
        for(const sf of scFeatsEntry){
          const row=document.createElement('div'); row.className='feat-row';
          row.innerHTML=`<span class="feat-lvl" style="font-style:italic;">Lv${sf.lvl}</span>${sf.name}<span style="color:var(--parchment-dim);font-size:9px;margin-left:4px;">(${entry.subclass})</span>`;
          featCard.appendChild(row);
        }
      }
    }
  }
  rightCol.appendChild(featCard);
  twoCol.appendChild(rightCol); el.appendChild(twoCol);

  // Spells
  const hasMCSpRev=Object.values(C.mcSpells||{}).some(st=>(st.cantrips||[]).length||(st.spells1||[]).length||(st.otherSpells||[]).length);
  if(C.cantrips.length||C.spells1.length||(C.otherSpells||[]).length||(C.extraSpells||[]).length||hasMCSpRev){
    const sc=document.createElement('div'); sc.className='card'; sc.style.marginBottom='14px';
    const clsObj=CLASSES[C.cls]||{};
    const spellInfoParts=allClassEntries.filter(e=>(CLASSES[e.cls]||{}).castAbil).map(e=>{
      const ca=(CLASSES[e.cls]||{}).castAbil; return allClassEntries.length>1?`${e.cls}: DC ${8+profB+mmod(fs(ca))}, +${profB+mmod(fs(ca))}`:(`DC ${8+profB+mmod(fs(ca))}, Attack +${profB+mmod(fs(ca))}`);
    });
    sc.innerHTML=`<div class="label" style="margin-bottom:6px;">Spells${spellInfoParts.length?` — ${spellInfoParts.join(' | ')}`:''}  </div>`;
    // Prepared per day note for prepared/spellbook casters
    getAllClasses().filter(e=>SPELL_TYPE[e.cls]==='prepared'||SPELL_TYPE[e.cls]==='spellbook').forEach(e=>{
      const lv=e.isPrimary?C.level:(e.level||1); const cnt=getPreparedCount(e.cls,lv); if(!cnt) return;
      const note=document.createElement('div'); note.style.cssText='font-size:11px;color:var(--gold);margin-bottom:6px;font-style:italic;';
      const multi=allClassEntries.length>1;
      const abilStr=(CLASSES[e.cls]||{}).castAbil||'INT';
      const half=e.cls==='Paladin'||e.cls==='Artificer';
      note.textContent=`${multi?e.cls+' p':'P'}repared/day: ${cnt} spells (${abilStr} mod ${mmod(fs(abilStr))>=0?'+':''}${mmod(fs(abilStr))} + ${half?'½ ':''}level ${half?Math.floor(lv/2):lv})`;
      sc.appendChild(note);
    });
    // Merge extraSpells into display by level
    const allExtra=[...(C.extraSpells||[])];
    const extraCantrips=allExtra.filter(n=>(SPELL_REF[n]||{}).lv===0);
    const extraLv1=allExtra.filter(n=>(SPELL_REF[n]||{}).lv===1);
    const allCantrips=[...C.cantrips,...extraCantrips].filter((v,i,a)=>a.indexOf(v)===i);
    const allLv1=[...C.spells1,...extraLv1].filter((v,i,a)=>a.indexOf(v)===i);
    if(allCantrips.length) { const d=document.createElement('div'); d.style.marginBottom='6px'; d.innerHTML=`<span class="muted" style="font-size:11px;">Cantrips: </span><span style="font-size:13px;">${allCantrips.join(', ')}</span>`; sc.appendChild(d); }
    if(allLv1.length) { const d=document.createElement('div'); d.style.marginBottom='6px'; d.innerHTML=`<span class="muted" style="font-size:11px;">1st Level: </span><span style="font-size:13px;">${allLv1.join(', ')}</span>`; sc.appendChild(d); }
    // Group otherSpells + higher extraSpells by level
    const otherByLv={};
    const combined=[...(C.otherSpells||[]),...allExtra.filter(n=>(SPELL_REF[n]||{}).lv>1)];
    for(const s of combined){const lv=(SPELL_REF[s]||{}).lv;if(lv!=null&&lv>1)(otherByLv[lv]=otherByLv[lv]||[]).push(s);}
    const lvOrd=lv=>lv===2?'2nd':lv===3?'3rd':lv+'th';
    for(const lv of Object.keys(otherByLv).map(Number).sort((a,b)=>a-b)){
      const d=document.createElement('div'); d.style.marginBottom='6px'; d.innerHTML=`<span class="muted" style="font-size:11px;">${lvOrd(lv)} Level: </span><span style="font-size:13px;">${[...new Set(otherByLv[lv])].join(', ')}</span>`; sc.appendChild(d);
    }
    if(C.spellNotes) { const d=document.createElement('div'); d.innerHTML=`<span class="muted" style="font-size:11px;">Notes: </span><span style="font-size:12px;color:var(--parchment-dim);">${C.spellNotes}</span>`; sc.appendChild(d); }
    // MC spells in review
    for (const [mcClsRev, mcStRev] of Object.entries(C.mcSpells||{})) {
      if (!(mcStRev.cantrips||[]).length && !(mcStRev.spells1||[]).length && !(mcStRev.otherSpells||[]).length) continue;
      const mcRevHdr=document.createElement('div'); mcRevHdr.style.cssText='margin-top:8px;margin-bottom:4px;font-size:11px;color:var(--gold);font-weight:600;';
      mcRevHdr.textContent=`${mcClsRev} (Multiclass):`; sc.appendChild(mcRevHdr);
      if((mcStRev.cantrips||[]).length){const d=document.createElement('div');d.style.marginBottom='4px';d.innerHTML=`<span class="muted" style="font-size:11px;">Cantrips: </span><span style="font-size:13px;">${mcStRev.cantrips.join(', ')}</span>`;sc.appendChild(d);}
      if((mcStRev.spells1||[]).length){const d=document.createElement('div');d.style.marginBottom='4px';d.innerHTML=`<span class="muted" style="font-size:11px;">1st Level: </span><span style="font-size:13px;">${mcStRev.spells1.join(', ')}</span>`;sc.appendChild(d);}
      const mcRevByLv={};
      for(const s of (mcStRev.otherSpells||[])){const lv=(SPELL_REF[s]||{}).lv;if(lv!=null&&lv>1)(mcRevByLv[lv]=mcRevByLv[lv]||[]).push(s);}
      for(const lv of Object.keys(mcRevByLv).map(Number).sort((a,b)=>a-b)){const d=document.createElement('div');d.style.marginBottom='4px';d.innerHTML=`<span class="muted" style="font-size:11px;">${lv===2?'2nd':lv===3?'3rd':lv+'th'} Level: </span><span style="font-size:13px;">${[...new Set(mcRevByLv[lv])].join(', ')}</span>`;sc.appendChild(d);}
    }
    el.appendChild(sc);
  }

  // Improvements (ASIs + Feats)
  const asiOppsReview=getAllASIOpportunities();
  if(asiOppsReview.length){
    const fc=document.createElement('div'); fc.className='card'; fc.style.marginBottom='14px';
    fc.innerHTML=`<div class="label" style="margin-bottom:8px;">Ability Score Improvements & Feats</div>`;
    asiOppsReview.forEach((opp,idx)=>{
      const imp=C.improvements[idx]||{type:'none'};
      const d=document.createElement('div'); d.className='feat-row';
      if(imp.type==='asi'&&imp.mode==='double'&&imp.ab1) d.innerHTML=`<span class="feat-lvl">${opp.shortLabel}</span>+2 ${imp.ab1}`;
      else if(imp.type==='asi'&&imp.mode==='split'&&imp.ab1) d.innerHTML=`<span class="feat-lvl">${opp.shortLabel}</span>+1 ${imp.ab1}${imp.ab2?', +1 '+imp.ab2:''}`;
      else if(imp.type==='feat'&&imp.feat){ const f=FEATS.find(x=>x.name===imp.feat); d.innerHTML=`<span class="feat-lvl">${opp.shortLabel}</span><strong>${imp.feat}:</strong> ${f?f.desc:''}`; }
      else d.innerHTML=`<span class="feat-lvl">${opp.shortLabel}</span><span class="muted">Not chosen</span>`;
      fc.appendChild(d);
    });
    el.appendChild(fc);
  }

  // Level-Up History (only meaningful above level 1, hidden for multiclass)
  if(C.level > 1 && cls && allClassEntries.length === 1){
    const subLvl=SUBCLASS_LVL[C.cls]||3;
    const asiLvlsAll=ASI_LEVELS[C.cls]||DEFAULT_ASI_LEVELS;
    const luCard=document.createElement('div'); luCard.className='card'; luCard.style.marginBottom='14px';
    const luhdr=document.createElement('div'); luhdr.style.cssText='display:flex;justify-content:space-between;align-items:center;cursor:pointer;';
    luhdr.innerHTML=`<div class="label" style="margin-bottom:0;">Level-Up History</div><span style="color:var(--parchment-dim);font-size:12px;" id="lu-toggle">▶ Show</span>`;
    const luBody=document.createElement('div'); luBody.style.display='none'; luBody.style.marginTop='10px';
    let luOpen=false;
    luhdr.addEventListener('click',()=>{ luOpen=!luOpen; luBody.style.display=luOpen?'block':'none'; luhdr.querySelector('#lu-toggle').textContent=luOpen?'▼ Hide':'▶ Show'; });
    for(let lvl=1;lvl<=C.level;lvl++){
      const lines=[];
      // Proficiency bonus change
      const pbNew=Math.ceil(lvl/4)+1; const pbOld=lvl>1?Math.ceil((lvl-1)/4)+1:0;
      if(lvl===1||pbNew!==pbOld) lines.push(`Proficiency Bonus +${pbNew}`);
      // Class features
      if(cls.feats&&cls.feats[lvl]) lines.push(...cls.feats[lvl]);
      // Subclass unlock
      if(lvl===subLvl) lines.push(C.subclass?`Subclass: ${C.subclass}`:`Subclass choice (${C.cls})`);
      // ASI/feat
      const asiIdx=asiLvlsAll.indexOf(lvl);
      if(asiIdx>-1&&asiIdx<(C.improvements||[]).length){
        const imp=C.improvements[asiIdx]||{type:'none'};
        if(imp.type==='asi'&&imp.mode==='double'&&imp.ab1) lines.push(`ASI: +2 ${imp.ab1}`);
        else if(imp.type==='asi'&&imp.mode==='split'&&imp.ab1) lines.push(`ASI: +1 ${imp.ab1}${imp.ab2?', +1 '+imp.ab2:''}`);
        else if(imp.type==='feat'&&imp.feat) lines.push(`Feat: ${imp.feat}`);
        else lines.push('ASI / Feat — not chosen');
      }
      if(!lines.length) continue;
      const row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start;';
      row.innerHTML=`<span style="font-family:'Cinzel',serif;color:var(--gold);font-size:10px;min-width:28px;padding-top:2px;flex-shrink:0;">Lv${lvl}</span><span>${lines.join(' · ')}</span>`;
      luBody.appendChild(row);
    }
    luCard.appendChild(luhdr); luCard.appendChild(luBody); el.appendChild(luCard);
  }

  // Character Sheet Templates card
  {
    const tmplCard=document.createElement('div'); tmplCard.className='card'; tmplCard.style.marginBottom='14px';
    const tmplHdr=document.createElement('div'); tmplHdr.style.cssText='display:flex;justify-content:space-between;align-items:center;cursor:pointer;';
    tmplHdr.innerHTML=`<div class="label" style="margin-bottom:0;">Character Sheet Templates</div><span style="color:var(--parchment-dim);font-size:12px;" id="tmpl-toggle">▶ Show</span>`;
    const tmplBody=document.createElement('div'); tmplBody.style.display='none'; tmplBody.style.marginTop='10px';
    let tmplOpen=false;
    tmplHdr.addEventListener('click',()=>{tmplOpen=!tmplOpen;tmplBody.style.display=tmplOpen?'block':'none';tmplHdr.querySelector('#tmpl-toggle').textContent=tmplOpen?'▼ Hide':'▶ Show';});
    const tmplNote=document.createElement('div'); tmplNote.style.cssText='font-size:12px;color:var(--parchment-dim);margin-bottom:10px;';
    tmplNote.textContent='Fillable PDFs can be opened or auto-populated with your character data. PDFs must be in the sheets/ folder alongside index.html.';
    tmplBody.appendChild(tmplNote);
    const sheets=[
      {name:'Character Sheet — Form Fillable',            file:'Character Sheet - Form Fillable.pdf',             fillable:true},
      {name:'Character Sheet — Alternative (Form Fillable)',file:'Character Sheet - Alternative - Form Fillable.pdf',fillable:true},
      {name:'Character Details — Form Fillable (Optional)',file:'Character Details (Optional) - Form Fillable.pdf', fillable:true},
      {name:'Spellcasting Sheet — Form Fillable (Optional)',file:'Spellcasting Sheet (Optional) - Form Fillable.pdf',fillable:true},

      const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;';
      const nameEl=document.createElement('span'); nameEl.style.cssText='font-size:13px;flex:1;'; nameEl.textContent=name;
      const btnGroup=document.createElement('div'); btnGroup.style.cssText='display:flex;gap:6px;flex-shrink:0;';
      if(fillable){
        // Single button: fill with character data and open in new tab

        fillBtn.textContent='Fill & Open';

        openBtn.href=`sheets/${encodeURIComponent(file)}`;
        openBtn.target='_blank';
        openBtn.style.cssText='font-size:11px;color:var(--gold);padding:4px 10px;border:1px solid var(--border);border-radius:4px;text-decoration:none;white-space:nowrap;cursor:pointer;';
        openBtn.textContent='Open PDF';
        btnGroup.appendChild(openBtn);
      }
      row.appendChild(nameEl); row.appendChild(btnGroup); tmplBody.appendChild(row);
    }
    tmplCard.appendChild(tmplHdr); tmplCard.appendChild(tmplBody);
    el.appendChild(tmplCard);
  }

  // Beast Master Primal Companion card (TCoE)
  if (C.cls === 'Ranger' && C.subclass === 'Beast Master' && C.level >= 3) {
    const beastChoice = (C.subclassChoices?.primalCompanion || [])[0] || null;
    const bmCard = document.createElement('div'); bmCard.className='card'; bmCard.style.marginBottom='14px';

    // Define the three beast stat blocks (stats scale with prof)
    const BEAST_STATS = {
      'Beast of the Air': {

      },
      'Beast of the Earth': {
        size:'Medium', speed:'40 ft, burrow/climb/swim 30 ft', darkvision:'60 ft',

        attack:'Binding Strike', atkDesc:`Melee Weapon Attack: +${prof+wisMod} to hit, reach 5 ft, one target. Hit: ${prof} piercing or bludgeoning (your choice) + ${wisMod>=0?'+':''}${wisMod} (WIS mod). DC ${spellDC} STR or DEX save or restrained until start of your next turn.`,

    const beastList = beastChoice ? [beastChoice] : ['Beast of the Air','Beast of the Earth','Beast of the Sea'];
    const beastLabel = document.createElement('div');
    beastLabel.style.cssText='font-size:12px;color:var(--parchment-dim);margin-bottom:12px;';
    beastLabel.textContent = beastChoice
      ? `Your Primal Companion: ${beastChoice} (Level ${C.level} — Prof +${prof})`
      : `No Primal Companion selected yet. All three options shown for reference (Prof +${prof}).`;
    bmBody.appendChild(beastLabel);

    for (const bName of beastList) {
      const b = BEAST_STATS[bName]; if (!b) continue;
      const bDiv = document.createElement('div');
      bDiv.style.cssText='border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:10px;background:rgba(201,168,76,0.04);';
      const abilMod = s => Math.floor((s-10)/2);
      const fm = n => (n>=0?'+':'')+n;
      bDiv.innerHTML = `
        <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:4px;">${bName}</div>
        <div style="font-size:10px;color:var(--parchment-dim);margin-bottom:8px;">${b.size} Beast · ${b.speed} · Darkvision ${b.darkvision}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;">
          <div style="font-size:11px;"><span class="label" style="font-size:9px;">HP</span> ${b.hp}</div>
          <div style="font-size:11px;"><span class="label" style="font-size:9px;">AC</span> ${b.ac}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;text-align:center;">
          ${['STR','DEX','CON','INT','WIS','CHA'].map((ab,i)=>{const score=[b.str,b.dex,b.con,b.int,b.wis,b.cha][i];return `<div style="font-size:10px;border:1px solid var(--border);border-radius:4px;padding:3px;"><div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold);">${ab}</div><div>${score}</div><div style="color:var(--parchment-dim);">${fm(abilMod(score))}</div></div>`;}).join('')}
        </div>
        <div style="font-size:11px;margin-bottom:4px;"><span style="font-family:'Cinzel',serif;color:var(--gold);">${b.attack}:</span> ${b.atkDesc}</div>
        <div style="font-size:11px;color:var(--parchment-dim);">${b.special}</div>
      `;
      bmBody.appendChild(bDiv);
    }

    // Print button
    const bmPrintBtn = document.createElement('button');
    bmPrintBtn.style.cssText='margin-top:4px;padding:5px 14px;font-family:"Cinzel",serif;font-size:11px;cursor:pointer;background:rgba(201,168,76,0.12);border:1px solid var(--gold-dim);color:var(--gold);border-radius:4px;';
    bmPrintBtn.textContent='Print / Save as PDF';
    bmPrintBtn.addEventListener('click', () => {
      const win = window.open('','_blank');
      if (!win) { alert('Allow popups to print.'); return; }
      const rows = beastList.map(bName => {
        const b = BEAST_STATS[bName]; if (!b) return '';
        const abilMod = s => Math.floor((s-10)/2);
        const fm = n => (n>=0?'+':'')+n;
        return `<div style="border:1.5px solid #b8860b;border-radius:8px;padding:14px 16px;margin-bottom:16px;break-inside:avoid;">
          <div style="font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#5a2e0a;margin-bottom:3px;">${bName}</div>
          <div style="font-size:10px;color:#7a4520;margin-bottom:8px;">${b.size} Beast · ${b.speed} · Darkvision ${b.darkvision}</div>
          <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px;">
            <span><strong>HP</strong> ${b.hp}</span><span><strong>AC</strong> ${b.ac}</span>
            <span><strong>Atk</strong> ${fm(prof+wisMod)}</span><span><strong>Spell Save DC</strong> ${spellDC}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;text-align:center;">
            ${['STR','DEX','CON','INT','WIS','CHA'].map((ab,i)=>{const score=[b.str,b.dex,b.con,b.int,b.wis,b.cha][i];return `<div style="border:1px solid #b8860b22;border-radius:4px;padding:4px 2px;background:#fffbf0;"><div style="font-family:'Cinzel',serif;font-size:9px;">${ab}</div><div style="font-size:13px;font-weight:700;">${score}</div><div style="font-size:10px;color:#7a4520;">${fm(abilMod(score))}</div></div>`;}).join('')}
          </div>
          <div style="font-size:11px;margin-bottom:4px;"><strong>${b.attack}:</strong> ${b.atkDesc}</div>
          <div style="font-size:11px;color:#555;">${b.special}</div>
        </div>`;
      }).join('');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Beast Master Companion</title>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
        <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Lora',serif;color:#2a1505;padding:20px;background:#fdf8ec;}h1{font-family:'Cinzel',serif;font-size:18px;margin-bottom:4px;color:#5a2e0a;}h2{font-size:12px;color:#7a4520;margin-bottom:16px;font-style:italic;}@page{margin:0.5in;}</style>
      </head><body>
        <h1>${C.name||'Ranger'} — Beast Master Companion</h1>
        <h2>Level ${C.level} Ranger (Prof +${prof}) · WIS mod ${fm(wisMod)} · Spell Save DC ${spellDC}</h2>
        ${rows}
        <script>window.onload=()=>window.print();<\/script>
      </body></html>`);
      win.document.close();
    });
    bmBody.appendChild(bmPrintBtn);

    bmCard.appendChild(bmHdr); bmCard.appendChild(bmBody);
    el.appendChild(bmCard);
  }

  // Download Guides section
  {
    const guidesCard=document.createElement('div'); guidesCard.className='card'; guidesCard.style.marginBottom='14px';
    guidesCard.innerHTML=`<div class="label" style="margin-bottom:4px;">Character Guides</div>`;
    const guidesNote=document.createElement('div'); guidesNote.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:10px;';
    guidesNote.textContent='Click a guide name to preview it (opens in new tab with print/PDF option). Formatted for A4.';
    guidesCard.appendChild(guidesNote);
    for(const [type,label,desc] of [
      ['combat','⚔ Combat Guide','Attacks, actions, spell DCs, combat features'],
      ['rp','🎭 Role-Play Guide','Personality, backstory, bonds, spells, features'],
      ['general','📜 General Reference','Full character summary with all abilities'],
    ]){
      const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;';
      row.addEventListener('click',()=>previewGuide(type));
      const left=document.createElement('div');
      const titleEl=document.createElement('div'); titleEl.style.cssText="font-family:'Cinzel',serif;font-size:12px;color:var(--gold);text-decoration:underline dotted;"; titleEl.textContent=label;
      const descEl=document.createElement('div'); descEl.style.cssText='font-size:10px;color:var(--parchment-dim);margin-top:1px;'; descEl.textContent=desc;
      left.appendChild(titleEl); left.appendChild(descEl);
      const arrow=document.createElement('span'); arrow.style.cssText='color:var(--parchment-dim);font-size:12px;margin-left:10px;flex-shrink:0;'; arrow.textContent='▶ Preview';
      row.appendChild(left); row.appendChild(arrow);
      guidesCard.appendChild(row);
    }

    // Spellbook row — only for casters with spells selected
    const allSelectedSpells = [...(C.cantrips||[]), ...(C.spells1||[]), ...(C.otherSpells||[]), ...(C.extraSpells||[]), ...Object.values(C.mcSpells||{}).flatMap(st=>[...(st.cantrips||[]),...(st.spells1||[]),...(st.otherSpells||[])])];
    const anyCasterForSB = (CLASSES[C.cls]||{}).caster || (C.multiclasses||[]).some(mc=>(CLASSES[mc.cls]||{}).caster||SUBCLASS_CASTER_INFO[mc.subclass]);
    if (anyCasterForSB && allSelectedSpells.length > 0) {
      const sbRow = document.createElement('div'); sbRow.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:5px 0;cursor:pointer;';
      sbRow.addEventListener('click', () => previewSpellbook());
      const sbLeft = document.createElement('div');
      const sbTitleEl = document.createElement('div'); sbTitleEl.style.cssText="font-family:'Cinzel',serif;font-size:12px;color:var(--gold);text-decoration:underline dotted;"; sbTitleEl.textContent = '📖 Spellbook';
      const sbDescEl = document.createElement('div'); sbDescEl.style.cssText = 'font-size:10px;color:var(--parchment-dim);margin-top:1px;'; sbDescEl.textContent = `Printable spell cards — ${allSelectedSpells.length} spell${allSelectedSpells.length===1?'':'s'} selected, grouped by level.`;
      sbLeft.appendChild(sbTitleEl); sbLeft.appendChild(sbDescEl);
      const sbArrow = document.createElement('span'); sbArrow.style.cssText='color:var(--parchment-dim);font-size:12px;margin-left:10px;flex-shrink:0;'; sbArrow.textContent='▶ Preview';
      sbRow.appendChild(sbLeft); sbRow.appendChild(sbArrow);
      guidesCard.appendChild(sbRow);
    }

    // Full class spellbook — reference document for all spells of each caster class
    const casterClsEntries = getAllClasses().filter(e => (CLASSES[e.cls]||{}).caster || SUBCLASS_CASTER_INFO[e.subclass]);
    const uniqueSpellCls = [...new Set(casterClsEntries.map(e => SUBCLASS_CASTER_INFO[e.subclass]?.cls || e.cls))];
    if (uniqueSpellCls.length) {
      const fsbSection = document.createElement('div');
      fsbSection.style.cssText = 'padding-top:8px;margin-top:4px;border-top:1px solid var(--border);';

      const fsbHdr = document.createElement('div');
      fsbHdr.style.cssText = "font-family:'Cinzel',serif;font-size:12px;color:var(--gold);margin-bottom:6px;";
      fsbHdr.textContent = '📚 Full Class Spell Reference';
      fsbSection.appendChild(fsbHdr);

      const fsbDesc = document.createElement('div');
      fsbDesc.style.cssText = 'font-size:10px;color:var(--parchment-dim);margin-bottom:8px;';
      fsbDesc.textContent = 'Complete spell list for a class — every level on its own page.';
      fsbSection.appendChild(fsbDesc);

      const ctrlRow = document.createElement('div');
      ctrlRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;align-items:center;';

      // Class selector
      const clsSel = document.createElement('select');
      clsSel.style.cssText = 'padding:4px 8px;font-size:11px;flex:1;min-width:100px;';
      for (const c of uniqueSpellCls) {
        const opt = document.createElement('option'); opt.value = c; opt.textContent = c;
        clsSel.appendChild(opt);
      }
      ctrlRow.appendChild(clsSel);

      // Max level selector
      const lvlSel = document.createElement('select');
      lvlSel.style.cssText = 'padding:4px 8px;font-size:11px;';
      const lvlOpts = [['All levels',9],['Cantrips only',0],['Up to 1st',1],['Up to 2nd',2],['Up to 3rd',3],['Up to 4th',4],['Up to 5th',5],['Up to 6th',6],['Up to 7th',7],['Up to 8th',8]];
      for (const [label, val] of lvlOpts) {
        const opt = document.createElement('option'); opt.value = val; opt.textContent = label;
        if (val === 9) opt.selected = true;
        lvlSel.appendChild(opt);
      }
      ctrlRow.appendChild(lvlSel);

      const previewBtn = document.createElement('button');
      previewBtn.textContent = '▶ Preview';
      previewBtn.style.cssText = 'padding:4px 12px;font-size:11px;cursor:pointer;background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;font-family:inherit;';
      previewBtn.addEventListener('click', () => previewFullClassSpellbook(clsSel.value, parseInt(lvlSel.value)));
      ctrlRow.appendChild(previewBtn);

      fsbSection.appendChild(ctrlRow);
      guidesCard.appendChild(fsbSection);
    }

    el.appendChild(guidesCard);
  }

}

// ─── EXPORT ───────────────────────────────────────────────────────────────────

function buildSheet() {
  const cls=CLASSES[C.cls]||{};
  const race=RACES[C.race]||{bonus:{},traits:[],spd:30};
  const bg=getEffectiveBg();
  const bgReplacements=C.bgSkillReplacements||{};
  const effectiveBgSkills=bg.skills.map(s=>bgReplacements[s]||s);
  const allSkills=getAllSkillProfs();
  const expertSkills=getExpertiseSkills();
  const allCE_bs=getAllClasses();
  const bardEntryBs=allCE_bs.find(e=>e.cls==='Bard');
  const joatActive=!!(bardEntryBs&&bardEntryBs.level>=2);
  const profB=pb(totalCharLevel());
  const hd=parseInt((cls.hd||'d8').replace('d',''));
  const conMod=mmod(fs('CON'));
  const maxHP=computeMaxHP();
  const acVal=computeAC();
  const allCastersCS=getAllClasses().filter(e=>(CLASSES[e.cls]||{}).caster||SUBCLASS_CASTER_INFO[e.subclass]);
  const primCasterCS=allCastersCS[0];
  const castAbilCS=primCasterCS?(SUBCLASS_CASTER_INFO[primCasterCS.subclass]?.castAbil||(CLASSES[primCasterCS.cls]||{}).castAbil||'INT'):(cls.castAbil||'INT');
  const spDC=primCasterCS?8+profB+mmod(fs(castAbilCS)):0;
  const spAtk=primCasterCS?profB+mmod(fs(castAbilCS)):0;
  // Weapon attacks
  const sheetStrMod=mmod(fs('STR')), sheetDexMod=mmod(fs('DEX'));
  const sheetStyles=getActiveFightingStyles();
  const WLUP={}; for(const r of WEAPON_TABLE) WLUP[r[0]]={cat:r[1],die:r[2],dmgType:r[3],props:r[4]};
  const sheetEquipStr=[resolveEquip(),C.extraEquip||''].join(' ');
  const sheetWpns=Object.keys(WLUP).filter(w=>new RegExp('\\b'+w+'s?\\b','i').test(sheetEquipStr)).slice(0,5).map(name=>{

function _guideHtml(type){

  const toolbar=`<div style="position:fixed;top:0;left:0;right:0;background:#2a1505;color:#f0dab0;padding:8px 16px;display:flex;gap:8px;align-items:center;z-index:9999;font-family:sans-serif;font-size:13px;"><span style="flex:1;font-weight:bold;">${label}</span><button onclick="window.print()" style="padding:5px 14px;background:#c9a84c;color:#1a0a00;border:none;border-radius:4px;cursor:pointer;font-weight:700;">🖨 Print / Save PDF</button><button onclick="window.close()" style="padding:5px 14px;background:transparent;color:#f0dab0;border:1px solid rgba(240,218,176,0.3);border-radius:4px;cursor:pointer;">✕ Close</button></div><div style="height:46px;"></div>`;
  // Auto-scale script: zooms page to fit A4 if it overflows
  const scaleScript=`<script>window.addEventListener('load',function(){
  var p=document.querySelector('.page');if(!p)return;
  var a4=297*(96/25.4);
  var h=p.scrollHeight;

});<\/script>`;

}

function buildSpellbook() {
  const cls = CLASSES[C.cls] || {};
  const profB = pb(totalCharLevel());
  const allCastersSB=getAllClasses().filter(e=>(CLASSES[e.cls]||{}).caster||SUBCLASS_CASTER_INFO[e.subclass]);
  const primCasterSB=allCastersSB[0];
  const castAbil = primCasterSB?(SUBCLASS_CASTER_INFO[primCasterSB.subclass]?.castAbil||(CLASSES[primCasterSB.cls]||{}).castAbil||'INT'):(cls.castAbil||'INT');
  const spDC = primCasterSB ? 8 + profB + mmod(fs(castAbil)) : 0;
  const spAtk = primCasterSB ? profB + mmod(fs(castAbil)) : 0;

  const SCHOOL_COLOR = {
    Abjur:'#3a6abf', Conj:'#b07a10', Div:'#6b5b9e', Ench:'#b84278',
    Evoc:'#c44a1a', Illus:'#7a3a8c', Necro:'#2e7a45', Trans:'#2a8a7a',
  };
  const SCHOOL_NAME = {
    Abjur:'Abjuration', Conj:'Conjuration', Div:'Divination', Ench:'Enchantment',
    Evoc:'Evocation', Illus:'Illusion', Necro:'Necromancy', Trans:'Transmutation',
  };

  // Gather all selected spells with their SPELL_REF data
  const allSpells = [
    ...(C.cantrips || []).map(n => ({name:n, data:SPELL_REF[n]})),
    ...(C.spells1  || []).map(n => ({name:n, data:SPELL_REF[n]})),
    ...(C.otherSpells || []).map(n => ({name:n, data:SPELL_REF[n]})),
    ...(C.extraSpells || []).map(n => ({name:n, data:SPELL_REF[n]})),
    ...Object.values(C.mcSpells||{}).flatMap(st=>[...(st.cantrips||[]),...(st.spells1||[]),...(st.otherSpells||[])]).map(n=>({name:n, data:SPELL_REF[n]})),
  ].filter(s => s.data).filter((s,i,a)=>a.findIndex(x=>x.name===s.name)===i); // dedupe

  if (!allSpells.length) return null;

  // Group by level
  const byLevel = {};
  for (const s of allSpells) {
    const lv = s.data.lv ?? 0;
    (byLevel[lv] = byLevel[lv] || []).push(s);
  }

  const levelLabel = lv => lv === 0 ? 'Cantrip' : lv === 1 ? '1st Level' : lv === 2 ? '2nd Level' :
    lv === 3 ? '3rd Level' : lv + 'th Level';

  let cardsHtml = '';
  for (const lv of Object.keys(byLevel).map(Number).sort((a,b) => a-b)) {
    const color = lv === 0 ? '#888' : '#b8860b';
    cardsHtml += `<div class="lvl-hdr" style="border-color:${color};color:${color};">${levelLabel(lv)}</div>`;
    for (const {name, data} of byLevel[lv]) {
      const sch = data.sch || '';
      const schColor = SCHOOL_COLOR[sch] || '#888';
      const schName = SCHOOL_NAME[sch] || sch;
      const tags = [];
      if (data.conc) tags.push('<span class="tag tag-conc">Concentration</span>');
      if (data.rit)  tags.push('<span class="tag tag-rit">Ritual</span>');
      const lvLabel = lv === 0 ? `Cantrip · ${schName}` : `Level ${lv} ${schName}`;
      cardsHtml += `
<div class="card" style="--sch:${schColor};">
  <div class="card-top">
    <div class="card-name">${name}</div>
    <div class="card-lvl">${lvLabel}</div>
  </div>
  <div class="card-meta">
    <span><b>Cast:</b> ${data.cast||'—'}</span>
    <span><b>Range:</b> ${data.rng||'—'}</span>
    <span><b>Source:</b> ${data.src||'—'}</span>
  </div>
  ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
  <div class="card-desc">${data.d||''}</div>
</div>`;
    }
  }

  const charLine = [C.name, C.cls && C.level ? `${C.cls} ${C.level}` : C.cls].filter(Boolean).join(' — ');
  const statLine = primCasterSB ? `Spell Save DC: ${spDC} &nbsp;|&nbsp; Spell Attack: +${spAtk} &nbsp;|&nbsp; Ability: ${castAbil}` : '';

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>${C.name || 'Character'} — Spellbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5ede0;font-family:'Lora',serif;color:#2a1505;padding:12mm;}
h1{font-family:'Cinzel',serif;font-size:20px;color:#5a2e0a;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-size:12px;color:#7a4520;margin-bottom:2px;}
.statline{text-align:center;font-size:11px;color:#b8860b;font-family:'Cinzel',serif;font-weight:600;margin-bottom:10px;letter-spacing:.05em;}
.divider{border:none;border-top:2px solid #b8860b;margin:8px auto 12px;width:60%;}
.lvl-hdr{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;border-bottom:1.5px solid;padding-bottom:3px;margin:12px 0 8px;grid-column:1/-1;break-after:avoid;page-break-after:avoid;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.card{background:#fffbf0;border:2px solid var(--sch,#888);border-radius:6px;padding:8px 9px;break-inside:avoid;page-break-inside:avoid;}
.card-top{border-bottom:1px solid var(--sch,#888);margin-bottom:6px;padding-bottom:5px;}
.card-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#2a1505;line-height:1.2;}
.card-lvl{font-size:9.5px;color:var(--sch,#888);font-style:italic;margin-top:2px;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:9.5px;color:#5a3a10;margin-bottom:4px;}
.card-meta span{white-space:nowrap;}
.card-tags{margin-bottom:4px;display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:8.5px;font-family:'Cinzel',serif;letter-spacing:.04em;padding:1px 5px;border-radius:3px;font-weight:600;}
.tag-conc{background:#fff3cc;color:#8a6800;border:1px solid #d4a800;}
.tag-rit{background:#e8f4e8;color:#2a6a2a;border:1px solid #4a9a4a;}
.card-desc{font-size:10px;line-height:1.45;color:#3a2008;}
@page{size:A4;margin:0;}
@media print{
  body{background:white;padding:10mm;}
  .card{background:white;}
  .no-print{display:none!important;}
}
</style>
</head><body>
<h1>📖 ${C.name ? C.name + "'s " : ''}Spellbook</h1>
${charLine ? `<div class="subtitle">${charLine}</div>` : ''}
${statLine ? `<div class="statline">${statLine}</div>` : ''}
<hr class="divider">
<div class="grid">${cardsHtml}</div>
</body></html>`;
}

function previewSpellbook() {
  const html = buildSpellbook();
  if (!html) { alert('No spells selected yet.'); return; }

  w.document.write(html); w.document.close();

    const bar = w.document.createElement('div');
    bar.className = 'no-print';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#2a1505;color:#f0dab0;padding:8px 16px;display:flex;gap:10px;align-items:center;z-index:9999;font-family:sans-serif;font-size:13px;';
    bar.innerHTML = `<span style="flex:1;font-weight:bold;">📖 Spellbook Preview</span>`;
    const pBtn = w.document.createElement('button'); pBtn.textContent = '🖨 Print / Save PDF'; pBtn.style.cssText = 'padding:5px 14px;background:#c9a84c;color:#1a0a00;border:none;border-radius:4px;cursor:pointer;font-weight:700;';
    pBtn.addEventListener('click', () => w.print());
    const dBtn = w.document.createElement('button'); dBtn.textContent = '⬇ Download HTML'; dBtn.style.cssText = 'padding:5px 14px;background:rgba(201,168,76,0.2);color:#f0dab0;border:1px solid #c9a84c;border-radius:4px;cursor:pointer;';
    dBtn.addEventListener('click', () => downloadSpellbook());
    const cBtn = w.document.createElement('button'); cBtn.textContent = '✕ Close'; cBtn.style.cssText = 'padding:5px 14px;background:transparent;color:#f0dab0;border:1px solid rgba(240,218,176,0.3);border-radius:4px;cursor:pointer;';
    cBtn.addEventListener('click', () => w.close());

  }, 200);

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${(C.name||'character').replace(/\s+/g,'_')}_spellbook.html`; a.click();
  URL.revokeObjectURL(url);
}

function buildFullClassSpellbook(spellCls, maxLevel) {
  const SCHOOL_COLOR = {
    Abjur:'#3a6abf', Conj:'#b07a10', Div:'#6b5b9e', Ench:'#b84278',
    Evoc:'#c44a1a', Illus:'#7a3a8c', Necro:'#2e7a45', Trans:'#2a8a7a',
  };
  const SCHOOL_NAME = {
    Abjur:'Abjuration', Conj:'Conjuration', Div:'Divination', Ench:'Enchantment',
    Evoc:'Evocation', Illus:'Illusion', Necro:'Necromancy', Trans:'Transmutation',
  };
  const levelLabel = lv => lv===0?'Cantrips':lv===1?'1st-Level Spells':lv===2?'2nd-Level Spells':lv===3?'3rd-Level Spells':lv+'th-Level Spells';

  const spells = Object.entries(SPELL_REF)
    .filter(([, ref]) => {
      if (ref.lv > maxLevel) return false;
      const ca = Array.isArray(ref.cls) ? ref.cls : (ref.cls||'').split(',').map(s=>s.trim());
      return ca.includes(spellCls);
    })
    .map(([name, data]) => ({name, data}))
    .sort((a, b) => a.data.lv - b.data.lv || a.name.localeCompare(b.name));

  if (!spells.length) return null;

  const byLevel = {};
  for (const s of spells) {
    const lv = s.data.lv ?? 0;
    (byLevel[lv] = byLevel[lv] || []).push(s);
  }

  const levels = Object.keys(byLevel).map(Number).sort((a,b)=>a-b);
  let sectionsHtml = '';
  for (let i = 0; i < levels.length; i++) {
    const lv = levels[i];
    const color = lv === 0 ? '#888' : '#b8860b';
    const spellsAtLv = byLevel[lv];
    sectionsHtml += `<div class="level-section${i===0?' first':''}">`;
    sectionsHtml += `<div class="lvl-hdr" style="border-color:${color};color:${color};">${levelLabel(lv)} <span class="spell-count">(${spellsAtLv.length})</span></div>`;
    sectionsHtml += `<div class="grid">`;
    for (const {name, data} of spellsAtLv) {
      const sch = data.sch || '';
      const schColor = SCHOOL_COLOR[sch] || '#888';
      const schName = SCHOOL_NAME[sch] || sch;
      const tags = [];
      if (data.conc) tags.push('<span class="tag tag-conc">Concentration</span>');
      if (data.rit)  tags.push('<span class="tag tag-rit">Ritual</span>');
      const lvLabel = lv===0?`Cantrip · ${schName}`:`Level ${lv} ${schName}`;
      const src = data.src||'PHB';
      sectionsHtml += `
<div class="card" style="--sch:${schColor};">
  <div class="card-top">
    <div class="card-name">${name}${src!=='PHB'?`<span class="card-src">[${src}]</span>`:''}
    </div>
    <div class="card-lvl">${lvLabel}</div>
  </div>
  <div class="card-meta">
    <span><b>Cast:</b> ${data.cast||'—'}</span>
    <span><b>Range:</b> ${data.rng||'—'}</span>
    <span><b>Duration:</b> ${data.dur||'—'}</span>
    <span><b>Components:</b> ${data.comp||'—'}</span>
  </div>
  ${tags.length?`<div class="card-tags">${tags.join('')}</div>`:''}
  <div class="card-desc">${data.d||''}</div>
</div>`;
    }
    sectionsHtml += `</div></div>`;
  }

  const maxLvLabel = maxLevel===0?'Cantrips':maxLevel===9?'All Levels':`Up to ${maxLevel===1?'1st':maxLevel===2?'2nd':maxLevel===3?'3rd':maxLevel+'th'} Level`;
  const totalCount = spells.length;

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>${spellCls} Spellbook — ${maxLvLabel}</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5ede0;font-family:'Lora',serif;color:#2a1505;padding:10mm 12mm;}
h1{font-family:'Cinzel',serif;font-size:20px;color:#5a2e0a;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-size:12px;color:#7a4520;margin-bottom:8px;}
.divider{border:none;border-top:2px solid #b8860b;margin:8px auto 12px;width:60%;}
.level-section{margin-bottom:0;}
.level-section+.level-section{break-before:page;page-break-before:always;}
.lvl-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;border-bottom:2px solid;padding-bottom:4px;margin-bottom:10px;}
.spell-count{font-size:10px;letter-spacing:0;text-transform:none;opacity:0.7;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.card{background:#fffbf0;border:2px solid var(--sch,#888);border-radius:6px;padding:8px 9px;break-inside:avoid;page-break-inside:avoid;}
.card-top{border-bottom:1px solid var(--sch,#888);margin-bottom:6px;padding-bottom:5px;}
.card-name{font-family:'Cinzel',serif;font-size:11.5px;font-weight:700;color:#2a1505;line-height:1.2;}
.card-src{font-size:8px;color:#888;font-family:'Lora',serif;font-weight:400;margin-left:4px;}
.card-lvl{font-size:9.5px;color:var(--sch,#888);font-style:italic;margin-top:2px;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:9px;color:#5a3a10;margin-bottom:4px;}
.card-meta span{white-space:nowrap;}
.card-tags{margin-bottom:4px;display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:8px;font-family:'Cinzel',serif;letter-spacing:.04em;padding:1px 5px;border-radius:3px;font-weight:600;}
.tag-conc{background:#fff3cc;color:#8a6800;border:1px solid #d4a800;}
.tag-rit{background:#e8f4e8;color:#2a6a2a;border:1px solid #4a9a4a;}
.card-desc{font-size:9.5px;line-height:1.4;color:#3a2008;}
@page{size:A4;margin:0;}
@media print{body{background:white;padding:10mm 12mm;}.card{background:white;}.no-print{display:none!important;}}
</style>
</head><body>
<h1>📚 ${spellCls} Spell Reference</h1>
<div class="subtitle">${maxLvLabel} &nbsp;·&nbsp; ${totalCount} spell${totalCount===1?'':'s'}</div>
<hr class="divider">
${sectionsHtml}
</body></html>`;
}

function previewFullClassSpellbook(spellCls, maxLevel) {
  const html = buildFullClassSpellbook(spellCls, maxLevel);
  if (!html) { alert('No spells found for that class/level combination.'); return; }
  const w = window.open('', '_blank', 'width=960,height=1100');
  w.document.write(html); w.document.close();
  setTimeout(() => {
    const bar = w.document.createElement('div');
    bar.className = 'no-print';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#2a1505;color:#f0dab0;padding:8px 16px;display:flex;gap:10px;align-items:center;z-index:9999;font-family:sans-serif;font-size:13px;';
    bar.innerHTML = `<span style="flex:1;font-weight:bold;">📚 ${spellCls} Spell Reference</span>`;
    const pBtn = w.document.createElement('button'); pBtn.textContent = '🖨 Print / Save PDF'; pBtn.style.cssText='padding:5px 14px;background:#c9a84c;color:#1a0a00;border:none;border-radius:4px;cursor:pointer;font-weight:700;';
    pBtn.addEventListener('click', () => w.print());
    const dBtn = w.document.createElement('button'); dBtn.textContent = '⬇ Download HTML'; dBtn.style.cssText='padding:5px 14px;background:rgba(201,168,76,0.2);color:#f0dab0;border:1px solid #c9a84c;border-radius:4px;cursor:pointer;';
    dBtn.addEventListener('click', () => {
      const blob = new Blob([html], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      const a = w.document.createElement('a'); a.href=url; a.download=`${spellCls.toLowerCase().replace(/\s+/g,'_')}_spells_lv${maxLevel}.html`; a.click();
      URL.revokeObjectURL(url);
    });
    const cBtn = w.document.createElement('button'); cBtn.textContent = '✕ Close'; cBtn.style.cssText='padding:5px 14px;background:transparent;color:#f0dab0;border:1px solid rgba(240,218,176,0.3);border-radius:4px;cursor:pointer;';
    cBtn.addEventListener('click', () => w.close());
    bar.appendChild(pBtn); bar.appendChild(dBtn); bar.appendChild(cBtn);
    w.document.body.insertBefore(bar, w.document.body.firstChild);
    const firstSection = w.document.querySelector('.level-section');
    if (firstSection) firstSection.style.marginTop = '44px';
  }, 200);
}

async function fillAndDownloadPDF(fileName) {
  // Require pdf-lib
  if (typeof PDFLib === 'undefined') {
    alert('pdf-lib not loaded. Check your internet connection.'); return;
  }
  if (window.location.protocol === 'file:') {
    alert('PDF auto-fill requires HTTP hosting (GitHub Pages, Netlify, or a local server).\nTo run locally: python -m http.server 8080\nthen visit http://localhost:8080'); return;
  }
  try {
    const url = 'sheets/' + encodeURIComponent(fileName);
    const bytes = await fetch(url).then(r => { if(!r.ok) throw new Error(r.status); return r.arrayBuffer(); });
    const { PDFDocument } = PDFLib;
    const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: true });
    const form = pdfDoc.getForm();

    const tx = (name, val) => {
      try { form.getTextField(name).setText(String(val ?? '')); } catch(e) {}
    };
    const cb = (name, checked) => {
      try { const f=form.getCheckBox(name); checked ? f.check() : f.uncheck(); } catch(e) {}
    };

    // ── Shared character data ──────────────────────────────────────────────
    const cls = CLASSES[C.cls] || {};
    const race = RACES[C.race] || {bonus:{}, traits:[], spd:30};
    const bg = getEffectiveBg();
    const bgRep = C.bgSkillReplacements || {};
    const effectiveBgSkills = bg.skills.map(s => bgRep[s] || s);
    const allSkills = getAllSkillProfs();
    const profB = pb(totalCharLevel());
    const raceDisplay = (C.race==='Human'&&C.subrace==='Variant') ? 'Variant Human' : (C.subrace||C.race||'');
    const hd = parseInt((cls.hd||'d8').replace('d',''));
    const conMod = mmod(fs('CON'));
    const maxHP = computeMaxHP();
    const acVal = computeAC();

    // Weapon attacks
    const WL = {};
    for (const r of WEAPON_TABLE) WL[r[0]] = {cat:r[1],dmg:r[2]+' '+r[3],props:r[4]};
    const equipStr = [resolveEquip(), C.extraEquip||''].join(' ');
    const foundWpns = Object.keys(WL).filter(w => new RegExp('\\b'+w+'s?\\b','i').test(equipStr));
    const strMod = mmod(fs('STR')), dexMod = mmod(fs('DEX'));
    const revStyles = getActiveFightingStyles();
    const wpnAtk = name => {
      const w = WL[name]; if (!w) return null;
      const fin = w.props.includes('Finesse'), rng = w.cat.includes('Ranged');
      const mod = fin ? Math.max(strMod,dexMod) : (rng ? dexMod : strMod);
      const atkBonus = rng && revStyles.includes('Archery') ? 2 : 0;
      const dmgBonus = !rng && revStyles.includes('Dueling') ? 2 : 0;
      const atk = mod + profB + atkBonus;
      const totalDmgMod = mod + dmgBonus;
      // w.dmg = "1d8 slashing" — split off the dice portion, append modifier
      const [dicePart, ...typeParts] = w.dmg.split(' ');
      return { name, atk: (atk>=0?'+':'')+atk, dmg: dicePart+(totalDmgMod>=0?'+':'')+totalDmgMod+' '+(typeParts.join(' ')) };
    };
    const wpns = foundWpns.slice(0,3).map(wpnAtk).filter(Boolean);

    // Proficiencies / Languages text
    const langParts = [...(RACE_LANGS[C.race]||['Common'])];
    // Extra language choices from racial picks (extraLang, extraLang2, etc.)
    for (const [k,v] of Object.entries(C.racialChoices||{})) {
      if (k.toLowerCase().includes('lang') && v) langParts.push(v);
    }
    if (C.customBg?.lang1) langParts.push(C.customBg.lang1);
    if (C.customBg?.lang2) langParts.push(C.customBg.lang2);
    // Background language choices
    for (const l of (C.bgLangChoices||[])) { if (l) langParts.push(l); }
    const uniqueLangs = [...new Set(langParts.filter(Boolean))];

    // Resolve vague tool names to chosen values
    const resolvedTools = (bg.tools||[]).map(t => VAGUE_TOOL_OPTIONS[t] ? (C.bgToolChoices?.[t]||t) : t);
    const toolsList = [...(bg.custom ? [C.customBg?.tool1, C.customBg?.tool2].filter(Boolean) : resolvedTools)];
    const profLangText = [
      'Armor: '+([...new Set(getAllClasses().flatMap(e=>(CLASSES[e.cls]||{}).armor||[]))].join(', ')||'None'),
      'Tools: '+(toolsList.join(', ')||'None'),
      'Languages: '+uniqueLangs.join(', '),
    ].join('\n');

    // Subrace traits
    const subraceData = (RACES[C.race]?.sub||[]).find(s=>s.name===C.subrace);
    const subraceTraits = subraceData ? (subraceData.traits||[]) : [];

    // Subclass features up to current level
    const scInfo = (SUBCLASS_INFO[C.cls]||{})[C.subclass];
    const scFeats = scInfo ? (scInfo.feats||[]).filter(f=>f.lvl<=C.level).map(f=>f.name) : [];

    // Subclass choices (maneuvers, disciplines, fighting styles, etc.)
    const scChoiceLines = [];
    for (const entry of ((SUBCLASS_CHOICES[C.cls]||{})[C.subclass]||[])) {
      const chosen = C.subclassChoices[entry.key] || [];
      if (chosen.length) scChoiceLines.push(entry.label+': '+chosen.join(', '));
    }

    // Features text (all classes)
    const classFeats = getAllClasses().flatMap(e=>Object.entries((CLASSES[e.cls]||{}).feats||{}).filter(([l])=>parseInt(l)<=e.level).flatMap(([,fns])=>fns));
    const allMcSubclassLines = (C.multiclasses||[]).filter(m=>m.cls&&m.subclass).map(m=>{
      const scInfo=(SUBCLASS_INFO[m.cls]||{})[m.subclass];
      const scFts=scInfo?(scInfo.feats||[]).filter(f=>f.lvl<=m.level).map(f=>f.name):[];
      return `MC Subclass: ${m.subclass}${scFts.length?' ('+scFts.join(', ')+')':''}`;
    });
    const featureText = [
      ...classFeats,
      C.subclass ? 'Subclass: '+C.subclass : '',
      scFeats.length ? 'SC Features: '+scFeats.join(', ') : '',
      ...scChoiceLines,
      ...allMcSubclassLines,
      getChosenFeats().length ? 'Feats: '+getChosenFeats().join(', ') : '',
      race.traits.length ? 'Racial: '+race.traits.join(', ') : '',
      subraceTraits.length ? 'Subrace: '+subraceTraits.join(', ') : '',
      bg.feature ? 'BG Feature: '+bg.feature : '',
    ].filter(Boolean).join('\n');

    // Spellcasting text for AttacksSpellcasting field
    let spellText = '';
    const anyCasterPDF = getAllClasses().some(e=>(CLASSES[e.cls]||{}).caster);
    if (anyCasterPDF) {
      const casterEntries = getAllClasses().filter(e=>(CLASSES[e.cls]||{}).caster);
      const spellHeader = casterEntries.length > 1
        ? casterEntries.map(e=>`${e.cls}: ${(CLASSES[e.cls]||{}).castAbil} DC ${8+profB+mmod(fs((CLASSES[e.cls]||{}).castAbil||'INT'))} Atk +${profB+mmod(fs((CLASSES[e.cls]||{}).castAbil||'INT'))}`).join(' | ')
        : `Spellcasting: ${cls.castAbil} · Save DC ${8+profB+mmod(fs(cls.castAbil||'INT'))} · Atk +${profB+mmod(fs(cls.castAbil||'INT'))}`;
      const parts = [spellHeader];
      const pdfEx2=C.extraSpells||[];
      const mcAllCants=[...Object.values(C.mcSpells||{}).flatMap(st=>st.cantrips||[])];
      const mcAllLv1=[...Object.values(C.mcSpells||{}).flatMap(st=>st.spells1||[])];
      const mcAllOther=[...Object.values(C.mcSpells||{}).flatMap(st=>st.otherSpells||[])];
      const pdfCantrips=[...new Set([...C.cantrips,...pdfEx2.filter(n=>(SPELL_REF[n]||{}).lv===0),...mcAllCants])];
      const pdfLv1=[...new Set([...C.spells1,...pdfEx2.filter(n=>(SPELL_REF[n]||{}).lv===1),...mcAllLv1])];
      const pdfOther=[...new Set([...(C.otherSpells||[]),...pdfEx2.filter(n=>(SPELL_REF[n]||{}).lv>1),...mcAllOther])];
      if (pdfCantrips.length) parts.push('Cantrips: '+pdfCantrips.join(', '));
      if (pdfLv1.length) parts.push('1st Level: '+pdfLv1.join(', '));
      if (pdfOther.length) parts.push('Other: '+pdfOther.join(', '));
      spellText = parts.join('\n');
    }

    // Equipment text (includes dropdown selections and purchased items)
    const equipParts = [];
    if (C.useGold==='gold') {
      equipParts.push('Starting Gold: '+(C.goldAmount||STARTING_GOLD[C.cls]||'—'));
    } else {
      // Resolve PHB-layout rows
      const eRows = EQUIP[C.cls] || [];
      for (let ri = 0; ri < eRows.length; ri++) {
        const row = eRows[ri];
        if (row.fixed) {
          equipParts.push(equipSubstituteAny(row.fixed, `f${ri}_`));
        } else {
          const letter = C.equipRows[ri];
          if (letter) {
            const optIdx = letter.charCodeAt(0) - 97;
            equipParts.push(equipSubstituteAny(row.choices[optIdx]||'', `r${ri}_`));
          }
        }
      }
    }
    if (C.extraEquip) equipParts.push(C.extraEquip);
    if ((C.purchasedItems||[]).length) equipParts.push('Additional: '+C.purchasedItems.map(i=>`${i.name}${i.cost?' ('+i.cost+'gp)':''}`).join(', '));
    const equipText = equipParts.join(', ');

    // Skill map: [pdfTextField, checkBoxKey, skillName, ability, mainCBnum, altCBName]
    const skillMap = [
      ['Acrobatics',    'ChBx Acrobatics',  'Acrobatics',     'DEX', 17],
      ['Animal',        'ChBx Animal',       'Animal Handling','WIS', 18],
      ['Arcana',        'ChBx Arcana',       'Arcana',         'INT', 19],
      ['Athletics',     'ChBx Athletics',    'Athletics',      'STR', 20],
      ['Deception ',    'ChBx Deception',    'Deception',      'CHA', 21],
      ['History ',      'ChBx History',      'History',        'INT', 22],
      ['Insight',       'ChBx Insight',      'Insight',        'WIS', 23],
      ['Intimidation',  'ChBx Intimidation', 'Intimidation',   'CHA', 24],
      ['Investigation ','ChBx Investigation','Investigation',  'INT', 25],
      ['Medicine',      'ChBx Nature',       'Medicine',       'WIS', 26],
      ['Nature',        'ChBx Nature',       'Nature',         'INT', 27],
      ['Perception ',   'ChBx Perception',   'Perception',     'WIS', 28],
      ['Performance',   'ChBx Performance',  'Performance',    'CHA', 29],
      ['Persuasion',    'ChBx Persuasion',   'Persuasion',     'CHA', 30],
      ['Religion',      'ChBx Religion',     'Religion',       'INT', 31],
      ['SleightofHand', 'ChBx Sleight',      'Sleight of Hand','DEX', 32],
      ['Stealth ',      'ChBx Stealth',      'Stealth',        'DEX', 33],
      ['Survival',      'ChBx Survival',     'Survival',       'WIS', 34],
    ];

    const isMain = fileName.includes('Form Fillable') && !fileName.includes('Alternative') && !fileName.includes('Spellcasting') && !fileName.includes('Details');
    const isAlt  = fileName.includes('Alternative - Form Fillable');
    const isDet  = fileName.includes('Details');
    const isSpell = fileName.includes('Spellcasting');

    if (isMain || isAlt) {
      // ── Common fields both sheets share ───────────────────────────────────
      tx('CharacterName', C.name||'');
      tx('ClassLevel', (()=>{const allCE_pdf=getAllClasses();return allCE_pdf.length>1?allCE_pdf.map(e=>`${e.cls} ${e.level}`).join(' / '):((C.cls||'')+(C.level?' '+C.level:''));})());
      tx('Background', C.bg||'');
      tx('Race ', raceDisplay);
      tx('Alignment', C.alignment||'');
      tx('PlayerName', '');
      tx('XP', '0');
      tx('STR', fs('STR')); tx('STRmod', mstr(fs('STR')));
      tx('DEX', fs('DEX')); tx('DEXmod ', mstr(fs('DEX')));
      tx('CON', fs('CON')); tx('CONmod', mstr(fs('CON')));
      tx('INT', fs('INT')); tx('INTmod', mstr(fs('INT')));
      tx('WIS', fs('WIS')); tx('WISmod', mstr(fs('WIS')));
      tx('CHA', fs('CHA')); tx('CHamod', mstr(fs('CHA')));
      tx('ProfBonus', '+'+profB);
      tx('AC', acVal);
      tx('Initiative', (()=>{const {bonus:ib,adv:ia}=computeInitiative();return (ib>=0?'+':'')+ib+(ia?' (Adv)':'');})());
      tx('Speed', race.spd);
      tx('HPMax', maxHP); tx('HPCurrent', maxHP); tx('HPTemp', '');
      tx('HD', cls.hd||'d8'); tx('HDTotal', totalCharLevel());
      tx('Passive', 10+getSkillBonus('Perception'));
      tx('Inspiration', '');
      tx('Equipment', equipText);
      tx('Features and Traits', featureText);
      tx('AttacksSpellcasting', spellText);
      tx('PersonalityTraits ', C.charInfo?.personality||'');
      tx('Ideals', C.charInfo?.ideals||'');
      tx('Bonds', C.charInfo?.bonds||'');
      tx('Flaws', C.charInfo?.flaws||'');
      tx('ProficienciesLang', profLangText);

      // Weapons
      if (wpns[0]) { tx('Wpn Name', wpns[0].name); tx('Wpn1 AtkBonus', wpns[0].atk); tx('Wpn1 Damage', wpns[0].dmg); }
      if (wpns[1]) { tx('Wpn Name 2', wpns[1].name); tx('Wpn2 AtkBonus ', wpns[1].atk); tx('Wpn2 Damage ', wpns[1].dmg); }
      if (wpns[2]) { tx('Wpn Name 3', wpns[2].name); tx('Wpn3 AtkBonus  ', wpns[2].atk); tx('Wpn3 Damage ', wpns[2].dmg); }

      // Money — compute remaining gold from tracked budget minus purchases
      const purchasedSpent = (C.purchasedItems||[]).reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
      let gpFill = '';
      if (C.useGold==='gold') {
        const budget = parseFloat(C.goldAmount)||0;
        gpFill = String(Math.max(0,Math.round((budget-purchasedSpent)*100)/100));
      } else if (C.useGold==='hybrid') {
        const budget = parseFloat(C.hybridGold)||0;
        gpFill = String(Math.max(0,Math.round((budget-purchasedSpent)*100)/100));
      }
      if (gpFill) { tx('CP',''); tx('SP',''); tx('EP',''); tx('GP',gpFill); tx('PP',''); }

      // Saving throws (union of all classes)
      const allSavesPDF=[...new Set(getAllClasses().flatMap(e=>(CLASSES[e.cls]||{}).saves||[]))];
      const saveMods = {STR:'ST Strength',DEX:'ST Dexterity',CON:'ST Constitution',INT:'ST Intelligence',WIS:'ST Wisdom',CHA:'ST Charisma'};
      for (const [ab, field] of Object.entries(saveMods)) {
        const prof = allSavesPDF.includes(ab);
        const val = mmod(fs(ab)) + (prof ? profB : 0);
        tx(field, (val>=0?'+':'')+val);
      }

      // Skills (respects expertise and Jack of All Trades)
      for (const [txField, altCB, skillName, ab, mainCBnum] of skillMap) {
        const prof = allSkills.includes(skillName);
        const val = getSkillBonus(skillName);
        if (isMain) {
          tx(txField, (val>=0?'+':'')+val);
          cb('Check Box '+mainCBnum, prof);
        } else {
          // alt sheet has named skill text fields without trailing spaces
          tx(txField.trim(), (val>=0?'+':'')+val);
          cb(altCB, prof);
        }
      }

      // Saving throw proficiency checkboxes (main sheet uses numbered, alt uses /Btn named fields)
      const allSavesCB=[...new Set(getAllClasses().flatMap(e=>(CLASSES[e.cls]||{}).saves||[]))];
      if (isMain) {
        const saveBoxes = {STR:11,DEX:12,CON:13,INT:14,WIS:15,CHA:16};
        for (const [ab, num] of Object.entries(saveBoxes)) cb('Check Box '+num, allSavesCB.includes(ab));
      }
      // Alt sheet ST* fields are /Btn (checkboxes), not text — already handled above via tx fallback

      // Alt sheet has separate SavingThrows text fields
      if (isAlt) {
        const saveOrder = ['STR','DEX','CON','INT','WIS','CHA'];
        saveOrder.forEach((ab, i) => {
          const prof = allSavesCB.includes(ab);
          const val = mmod(fs(ab)) + (prof ? profB : 0);
          tx('SavingThrows'+(i===0?'':''+( i+1)), (val>=0?'+':'')+val);
        });
      }
    }

    if (isDet) {
      tx('CharacterName 2', C.name||'');
      const ci = C.charInfo || {};
      tx('Age', ci.age||''); tx('Height', ci.height||''); tx('Weight', ci.weight||'');
      tx('Eyes', ci.eyes||''); tx('Skin', ci.skin||''); tx('Hair', ci.hair||'');
      tx('Backstory', ci.backstory||'');
      tx('Feat+Traits', featureText);
      tx('Allies', ''); tx('Treasure', ''); tx('FactionName', '');
    }

    const anyMCCaster=(C.multiclasses||[]).some(mc=>(CLASSES[mc.cls]||{}).caster||SUBCLASS_CASTER_INFO[mc.subclass]);
    if (isSpell && (cls.caster || anyMCCaster)) {
      const pdfCastEntry=getAllClasses().find(e=>(CLASSES[e.cls]||{}).caster||SUBCLASS_CASTER_INFO[e.subclass])||{cls:C.cls,subclass:C.subclass};
      const pdfCastAbil=SUBCLASS_CASTER_INFO[pdfCastEntry.subclass]?.castAbil||(CLASSES[pdfCastEntry.cls]||{}).castAbil||'INT';
      const spDC = 8+profB+mmod(fs(pdfCastAbil));
      const spAtk = profB+mmod(fs(pdfCastAbil));
      tx('Spellcasting Class 2', pdfCastEntry.cls||C.cls||'');
      tx('SpellcastingAbility 2', pdfCastAbil);
      tx('SpellSaveDC  2', spDC);
      tx('SpellAtkBonus 2', '+'+spAtk);

      // Spell slot totals (fields SlotsTotal 19-27 → levels 1-9)
      const casterType = ['Wizard','Cleric','Druid','Bard','Sorcerer'].includes(C.cls)?'full':
        (C.cls==='Warlock'?'warlock':(C.cls==='Paladin'||C.cls==='Ranger'?'half':'full'));
      const slots = casterType==='full'?FULL_SLOTS[C.level-1]:casterType==='half'?HALF_SLOTS[C.level-1]:WARLOCK_SLOTS[C.level-1];
      if (Array.isArray(slots)) {
        slots.forEach((count, i) => {
          tx('SlotsTotal '+(19+i), count);
          tx('SlotsRemaining '+(19+i), count);
        });
      }

      // Spell lines: cantrips (1014-1021), 1st (1022-1033), 2nd (1034-1046), ...
      // Layout: cantrips=8, lv1=12, lv2=13, lv3=13, lv4=13, lv5=9, lv6=9, lv7=9, lv8=7, lv9=7
      const pdfMCCants=Object.values(C.mcSpells||{}).flatMap(st=>st.cantrips||[]);
      const pdfMCLv1=Object.values(C.mcSpells||{}).flatMap(st=>st.spells1||[]);
      const pdfMCOther=Object.values(C.mcSpells||{}).flatMap(st=>st.otherSpells||[]);
      const pdfAllCantrips=[...new Set([...(C.cantrips||[]),...(C.extraSpells||[]).filter(n=>(SPELL_REF[n]||{}).lv===0),...pdfMCCants])];
      const pdfAllLv1=[...new Set([...(C.spells1||[]),...(C.extraSpells||[]).filter(n=>(SPELL_REF[n]||{}).lv===1),...pdfMCLv1])];
      const pdfAllOther=[...new Set([...(C.otherSpells||[]),...(C.extraSpells||[]).filter(n=>(SPELL_REF[n]||{}).lv>1),...pdfMCOther])];
      const spellGroups = [
        { spells: pdfAllCantrips, start: 1014, max: 8  },
        { spells: pdfAllLv1,      start: 1022, max: 12 },
        { spells: pdfAllOther,    start: 1034, max: 86 },
      ];
      const intToField = n => n >= 10100 ? 'Spells 1' + String(n).slice(1) : 'Spells ' + n;
      let slot = 1014;
      const cantripEnd = 1021;
      for (let i = 0; i < pdfAllCantrips.length && slot <= cantripEnd; i++, slot++) {
        tx(intToField(slot), pdfAllCantrips[i]);
        cb('Check Box '+(3010+i), true);
      }
      slot = 1022;
      for (let i = 0; i < pdfAllLv1.length && slot <= 1033; i++, slot++) {
        tx(intToField(slot), pdfAllLv1[i]);
        cb('Check Box '+(3018+i), true);
      }
      slot = 1034;
      for (let i = 0; i < pdfAllOther.length; i++, slot++) {
        if (slot > 10113) break;
        tx(intToField(slot), pdfAllOther[i]);
      }
    }

    const filledBytes = await pdfDoc.save();
    const blob = new Blob([filledBytes], { type: 'application/pdf' });
    const dlUrl = URL.createObjectURL(blob);
    window.open(dlUrl, '_blank');
    setTimeout(()=>URL.revokeObjectURL(dlUrl), 60000);
  } catch(err) {
    alert('Could not fill PDF: ' + err.message);
    console.error(err);
  }
}


window.goStep=goStep;
render();
</script>
</body>
</html>
