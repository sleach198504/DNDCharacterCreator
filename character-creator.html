      {lvl:2,name:'Portent',desc:'After each long rest, roll two d20s and record the results (three d20s at level 14). Once per long rest for each die, replace any attack roll, saving throw, or ability check by a creature you can see with one of these numbers (before or after the roll, before outcome is determined).'},
      {lvl:6,name:'Expert Divination',desc:'When you cast a divination spell of 2nd level or higher using a spell slot, regain one expended spell slot of a lower level (max 5th level).'},
      {lvl:10,name:'The Third Eye',desc:'Action: one benefit until next long rest — darkvision 60 ft, ethereal sight (see the Ethereal Plane out to 60 ft), greater comprehension (read any language), or see invisibility out to 10 ft.'},
      {lvl:14,name:'Greater Portent',desc:'Your Portent feature now produces three d20 results per long rest (instead of two).'},
    ]},
    'School of Enchantment':{src:'PHB',desc:'Enchanters are masters of magic that affect the mind, bending creatures to their will. They can Hypnotic Gaze and share spells with allies.',feats:[
      {lvl:2,name:'Enchantment Savant',desc:'Halve gold and time to copy enchantment spells.'},
      {lvl:2,name:'Hypnotic Gaze',desc:'Action: charm a creature within 5 ft. While charmed it is incapacitated and has reduced speed (CHA save each turn to end). Once the creature makes its save or leaves 5 ft, it\'s immune to this for 24 hrs.'},
      {lvl:6,name:'Instinctive Charm',desc:'Reaction when a creature within 30 ft attacks you: redirect its attack to the nearest other creature. WIS save negates; on save, immune for 24 hrs. Doesn\'t work if you are incapacitated.'},
      {lvl:10,name:'Split Enchantment',desc:'When you cast an enchantment spell of 1st level or higher targeting only one creature, choose a second creature within range to also be targeted.'},
      {lvl:14,name:'Alter Memories',desc:'When you cast an enchantment spell that charms, use an action while the creature is charmed: erase up to 1 hour of memories from its recollection. WIS save negates.'},
    ]},
    'School of Evocation':{src:'PHB',desc:'Evokers channel raw magical energy into devastating spells. Sculpt Spells is exceptional for protecting allies caught in area-of-effect attacks.',feats:[
      {lvl:2,name:'Evocation Savant',desc:'Halve gold and time to copy evocation spells.'},
      {lvl:2,name:'Sculpt Spells',desc:'When you cast an evocation spell affecting other creatures, choose a number of them ≤ (1 + spell level). The chosen creatures automatically succeed their saving throws and take no damage from the spell.'},
      {lvl:6,name:'Potent Cantrip',desc:'When a creature succeeds on a save against your damaging cantrip, it takes half the cantrip\'s damage (instead of none).'},
      {lvl:10,name:'Empowered Evocation',desc:'Add INT modifier to the damage roll of any wizard evocation spell (once per spell, not per target).'},
      {lvl:14,name:'Overchannel',desc:'When you cast a wizard spell of 1st–5th level that deals damage, maximize the damage instead of rolling. Using again before a long rest deals 2d12 necrotic per spell level to yourself (no save, no resistance).'},
    ]},
    'School of Illusion':{src:'PHB',desc:'Illusionists weave images and sounds that deceive the eye and mind. Malleable Illusions let you reshape ongoing illusions at will.',feats:[
      {lvl:2,name:'Illusion Savant',desc:'Halve gold and time to copy illusion spells.'},
      {lvl:2,name:'Improved Minor Illusion',desc:'Learn minor illusion (or another cantrip). You can create both a sound and an image simultaneously with a single casting.'},
      {lvl:6,name:'Malleable Illusions',desc:'When you cast an illusion spell with a duration of 1 minute or longer, use your action to change the nature of that illusion (within the spell\'s rules).'},
      {lvl:10,name:'Illusory Self',desc:'Reaction when a creature attacks you: a phantasmal duplicate causes the attack to miss. Once per short or long rest.'},
      {lvl:14,name:'Illusory Reality',desc:'Once per day, after you cast an illusion spell of 1st level or higher, make one inanimate, non-damaging object in the spell real for 1 minute.'},
    ]},
    'School of Necromancy':{src:'PHB',desc:'Necromancers study the forces of death and undeath, animating skeletons and zombies and extracting life force from living creatures.',feats:[
      {lvl:2,name:'Necromancy Savant',desc:'Halve gold and time to copy necromancy spells.'},
      {lvl:2,name:'Grim Harvest',desc:'Once per turn when you kill a creature with a spell, regain HP equal to twice the spell\'s level (thrice for necromancy spells). Doesn\'t apply to undead or constructs.'},
      {lvl:6,name:'Undead Thralls',desc:'Add animate dead to your spellbook (free). When you cast it, target one extra corpse. Undead created gain +prof bonus HP and deal +prof bonus on damage rolls.'},
      {lvl:10,name:'Inured to Undeath',desc:'Resistance to necrotic damage. Maximum HP can\'t be reduced (immunity to necrotic HP reduction effects).'},
      {lvl:14,name:'Command Undead',desc:'Action: target one undead within 60 ft (CHA save vs. spell save DC). On failure, it is under your control until destroyed or a new casting. Intelligent undead (INT 8+) have advantage on the save.'},
    ]},
    'School of Transmutation':{src:'PHB',desc:'Transmuters modify the physical properties of creatures and matter, becoming master shapeshifters with broad utility.',feats:[
      {lvl:2,name:'Transmutation Savant',desc:'Halve gold and time to copy transmutation spells.'},
      {lvl:2,name:'Minor Alchemy',desc:'Over 10 minutes, transform one object of one material (wood, stone, iron, copper, silver) into another. Reverts after 1 hour or if you use this again.'},
      {lvl:6,name:'Transmuter\'s Stone',desc:'Over 8 hours, create a transmuter\'s stone granting one benefit to its holder: darkvision 60 ft, +10 ft speed, proficiency in CON saves, or resistance to acid/cold/fire/lightning/thunder. Rework as an action. One stone at a time.'},
      {lvl:10,name:'Shapechanger',desc:'Cast polymorph on yourself at will without a spell slot.'},
      {lvl:14,name:'Master Transmuter',desc:'Action: destroy your transmuter\'s stone for one of: Major Transformation (cast polymorph on a creature within 10 ft for 1 hour without a slot), Panacea (end all curses, diseases, and poisons on a creature you touch), Restore Life (cast raise dead without a slot and without material components), Restore Youth (reduce a creature\'s apparent age by 3d10 years to minimum 13).'},
    ]},
    'Bladesinging':{src:'TCoE',desc:'Bladesingers are elven wizards who train in a mystical sword art that combines swordsmanship with spellcasting, entering a dance-like combat style.',feats:[
      {lvl:2,name:'Training in War and Song',desc:'Light armor proficiency and proficiency with one one-handed melee weapon. Performance proficiency.'},
      {lvl:2,name:'Bladesong',desc:'Bonus action: begin the Bladesong for 1 minute (concentration). Benefits: +INT modifier to AC, walk speed +10 ft, advantage on Acrobatics, +INT modifier to concentration saves. Ends if you wear medium/heavy armor, a shield, or make a two-handed attack. Uses = prof bonus per long rest.'},
      {lvl:6,name:'Extra Attack',desc:'Attack twice when you take the Attack action. One of those attacks can be replaced by a cantrip.'},
      {lvl:10,name:'Song of Defense',desc:'Reaction when you take damage while Bladesong is active: expend a spell slot to reduce the damage by 5 per spell level.'},
      {lvl:14,name:'Song of Victory',desc:'While Bladesong is active, add INT modifier to the damage rolls of melee weapon attacks.'},
    ]},
    'War Magic':{src:'XGtE',desc:'War Magic wizards combine offense and protection, weaving defensive magic into every spell to create a resilient battle mage.',feats:[
      {lvl:2,name:'Arcane Deflection',desc:'Reaction when you\'re hit by an attack: +2 AC against the attack. Reaction when you fail a save: +4 to the save. If you use this, until end of next turn you can only cast cantrips.'},
      {lvl:2,name:'Tactical Wit',desc:'Add INT modifier to initiative rolls.'},
      {lvl:6,name:'Power Surge',desc:'Store surges of magical energy (max = prof bonus). Gain a surge when you use Arcane Deflection successfully, or when you counterspell or dispel magic successfully. Spend one when dealing spell damage to add +half-wizard-level force damage. Regain all on long rest.'},
      {lvl:10,name:'Durable Magic',desc:'While concentrating on a spell, +2 bonus to AC and all saving throws.'},
      {lvl:14,name:'Deflecting Shroud',desc:'When you use Arcane Deflection, release magical energy: each creature of your choice within 60 ft takes force damage equal to half your wizard level.'},
    ]},
    'Chronurgy Magic':{src:'EGtW',desc:'Chronurgists manipulate the threads of time, delaying foes and rewriting their own failures. A powerful subclass from Explorer\'s Guide to Wildemount.',feats:[
      {lvl:2,name:'Chronal Shift',desc:'Reaction when a creature within 30 ft makes an attack roll, ability check, or saving throw: force a reroll (must use new result). Uses = 2 per long rest.'},
      {lvl:2,name:'Temporal Awareness',desc:'Add INT modifier to initiative rolls.'},
      {lvl:6,name:'Momentary Stasis',desc:'Action: force a creature within 60 ft to make a CON save or be incapacitated and speed 0 until start of your next turn (ends on taking damage). Uses = INT modifier per long rest.'},
      {lvl:10,name:'Arcane Abeyance',desc:'When you cast a spell of 4th level or lower using a slot, reduce it to a mote (Tiny bead, lasts 1 hour or until another creature grabs it). A creature holding the mote can cast the spell using your stats. Once per short or long rest.'},
      {lvl:14,name:'Convergent Future',desc:'Reaction when you or a creature within 60 ft makes an attack, check, or save: choose to succeed or fail the roll. If you choose success, you gain one level of exhaustion (resets on long rest). Uses unlimited but exhaustion limits it.'},
    ]},
    'Graviturgy Magic':{src:'EGtW',desc:'Graviturgists manipulate the forces of attraction and repulsion, controlling how creatures move across the battlefield.',feats:[
      {lvl:2,name:'Adjust Density',desc:'Action: choose a creature or object within 30 ft. Halve its weight (speed +10 ft, disadvantage on STR checks) or double it (speed -10 ft, advantage on STR checks and saves against being moved). Lasts 1 minute; concentration. Uses = INT modifier per long rest.'},
      {lvl:2,name:'Gravity Well',desc:'When you cast a spell that affects other creatures, one target of your choice must move 5 ft in any direction (not into hazards; STR save negates). Doesn\'t count as forced movement.'},
      {lvl:6,name:'Violent Attraction',desc:'Reaction when a creature within 60 ft is hit by an attack: add 1d10 to the damage. Reaction when an object (not a creature) falls: increase fall damage by 2d10. Uses = INT modifier per long rest.'},
      {lvl:10,name:'Event Horizon',desc:'Action: spin up a gravity field for 1 minute (concentration). Creatures within 30 ft that move toward you must spend 2 ft per 1 ft moved; moving away requires 3× movement. All ranged attacks aimed at you have disadvantage. Creatures within 30 ft at start of their turn take 2d10 force damage. Once per long rest (or 5th+ slot).'},
      {lvl:14,name:'Gravity Fissure',desc:'Action: line 100 ft × 5 ft of immense gravity: 8d8 force damage (CON save for half). Creatures in adjacent 10 ft but not the line are pulled into it (STR save negates). Once per long rest (or 6th+ slot).'},
    ]},
    'Order of Scribes':{src:'TCoE',desc:'The Order of Scribes awakens a wizardly spirit within their spellbook, gaining unmatched flexibility in copying and casting their known spells.',feats:[
      {lvl:2,name:'Wizardly Quill',desc:'Bonus action: create a magic quill. Copies spells in 2 minutes per level instead of 2 hours. Also write using the quill in any language you know, and the ink is free.'},
      {lvl:2,name:'Awakened Spellbook',desc:'Your spellbook is sentient. Ritual cast any ritual in the book without copying it (just read from the book). Also, replace a spell\'s damage type with another type from a different spell in your spellbook once per cast.'},
      {lvl:6,name:'Manifest Mind',desc:'Bonus action: manifest your spellbook\'s mind at a point within 300 ft (lasts 10 minutes or until incapacitated). Cast spells as if you\'re in its space. Uses = prof bonus per long rest.'},
      {lvl:10,name:'Master Scrivener',desc:'Once per long rest after a long rest: create a scroll of a 1st or 2nd level spell from your book (free, takes 1 action). Scroll\'s spell save DC and attack bonus = yours. Lasts until next long rest.'},
      {lvl:14,name:'One with the Word',desc:'While Manifest Mind is active, reaction when you take damage: destroy the mind to negate all the damage. d6s = the damage-negated spell level (random spells of those levels erased from spellbook until long rest). Once per long rest.'},
    ]},
  },
  Artificer:{
    'Alchemist':{src:'TCoE',desc:'Alchemists are the foremost experts on brewing potions and elixirs, creating restorative concoctions and catalysts for explosive results.',feats:[
      {lvl:3,name:'Alchemist Spells',desc:'Always have healing word, ray of sickness, flaming sphere, Melf\'s acid arrow, gaseous form, mass healing word, blight, death ward, cloudkill, raise dead prepared.'},
      {lvl:3,name:'Experimental Elixir',desc:'When you finish a long rest, magically produce an elixir (roll d6 for type: healing, swiftness, resilience, boldness, flight, transformation). Additional elixirs cost a spell slot. Elixirs last until your next long rest.'},
      {lvl:5,name:'Alchemical Savant',desc:'When you cast a spell using your alchemist\'s supplies and it deals acid, fire, necrotic, or poison damage, or restores HP, add INT modifier to one roll of those dice.'},
      {lvl:9,name:'Restorative Reagents',desc:'Creatures that drink your experimental elixir of healing regain an extra 2d6 HP. Also, cast lesser restoration without a spell slot (uses = INT modifier per long rest).'},
      {lvl:15,name:'Chemical Mastery',desc:'Resistance to acid and poison damage. Immunity to the poisoned condition. Cast greater restoration and heal each once per long rest without a slot (no material components).'},
    ]},
    'Armorer':{src:'TCoE',desc:'Armorers pump arcane power into their armor, turning it into a powerful exosuit with integrated weapons and defenses.',feats:[
      {lvl:3,name:'Tools of the Trade',desc:'Proficiency with heavy armor. Proficiency with smith\'s tools (if not already).'},
      {lvl:3,name:'Arcane Armor',desc:'Turn armor you\'re wearing into arcane armor (1 hour work). It can\'t be removed unwillingly, counts as a spellcasting focus, and replaces the need for material components without cost. Your armor also ignores STR requirements. You can extend it to cover your whole body, replacing hands.'},
      {lvl:3,name:'Armor Model',desc:'Choose Guardian or Infiltrator. Guardian: thunder gauntlets (1d8 thunder, creature hit has disadvantage on attacks against others until next turn), defensive field (bonus action: temp HP = prof bonus). Infiltrator: lightning launcher (90/300 ft, 1d6 lightning, once per turn +1d6 to a target), dampening field (+1 Stealth), magnetized armor (advantage on Stealth — wait, that\'s wrong — dampening means advantage on Stealth checks if your base armor would impose disadvantage).'},
      {lvl:5,name:'Extra Attack',desc:'Attack twice when you take the Attack action.'},
      {lvl:9,name:'Armor Modifications',desc:'Infuse your armor with four infusions instead of two, treating the suit as: helmet, chest piece, boots, and the suit itself (four separate infusable items).'},
      {lvl:15,name:'Perfected Armor',desc:'Guardian: when a creature starts its turn within 30 ft, use your reaction to pull it up to 30 ft toward you (STR save negates) and make a thunder gauntlet attack. Infiltrator: when your lightning launcher hits, you can force the target to make a STR save or be knocked prone.'},
    ]},
    'Artillerist':{src:'TCoE',desc:'Artillerists specialize in explosive spells and the construction of magic cannons to blast enemies off the battlefield.',feats:[
      {lvl:3,name:'Artillerist Spells',desc:'Always have shield, thunderwave, scorching ray, shatter, fireball, wind wall, ice storm, wall of fire, cone of cold, wall of force prepared.'},
      {lvl:3,name:'Eldritch Cannon',desc:'Action (smith\'s or woodcarver\'s tools): create a Small or Tiny cannon (AC 18, HP = 5× artificer level). Move it 15 ft as bonus action. Choose: Flamethrower (15-ft cone, 2d8 fire, DEX save for half), Force Ballista (120-ft range, 2d8 force, push 5 ft), Protector (10-ft radius temp HP = 1d8+INT). Use an action to fire it. Lasts 1 hour. Uses = prof bonus per long rest (or spend a spell slot).'},
      {lvl:5,name:'Arcane Firearm',desc:'Infuse a wand, staff, or rod: when you cast an artificer spell through it, add +1d8 to one damage or healing roll.'},
      {lvl:9,name:'Explosive Cannon',desc:'Your cannon deals +1d8 damage. As an action, detonate it in a 20-ft explosion dealing 3d8 force damage (DEX save for half) to all creatures within range.'},
      {lvl:15,name:'Fortified Position',desc:'Create two cannons at once (instead of one). Cannons also create a half-cover bubble (10-ft radius) protecting all creatures inside.'},
    ]},
    'Battle Smith':{src:'TCoE',desc:'Battle Smiths keep their allies in the fight with their Steel Defender companion and magical tinkering.',feats:[
      {lvl:3,name:'Battle Ready',desc:'Proficiency with martial weapons. Use INT instead of STR or DEX for attack and damage rolls with magic weapons.'},
      {lvl:3,name:'Steel Defender',desc:'Create a Steel Defender (Medium construct, AC 15, HP = 2+INT modifier+5× artificer level). It has its own turn; can Dodge, Dash, Help, or use its rend attack (1d8+prof piercing). Reaction: impose disadvantage on an attack roll against a creature other than the Defender within 5 ft. Rebuilt over a long rest if destroyed.'},
      {lvl:5,name:'Extra Attack',desc:'Attack twice when you take the Attack action. One attack can be replaced by a cantrip.'},
      {lvl:9,name:'Arcane Jolt',desc:'When your Steel Defender or a magic weapon you wield hits: deal an extra 2d6 force damage (or restore 2d6 HP to a creature within 30 ft of the attack). Uses = INT modifier per long rest.'},
      {lvl:15,name:'Improved Defender',desc:'Arcane Jolt deals/restores 4d6. Steel Defender gains +2 AC. When it uses its reaction to protect an ally, it also deals 1d4 force damage to the attacker.'},
    ]},
  },
  // ── Matt Mercer (unofficial) ─────────────────────────────────────────────
  'Blood Hunter':{
    'Ghostslayer':{src:'Matt Mercer',desc:'The Order of the Ghostslayer is the oldest of the blood hunter orders, devoted to fighting undead and the forces that seek to bring death to the living. These hunters carry the Rite of the Dawn, channeling radiant power to oppose creatures of darkness.',feats:[
      {lvl:3,name:'Rite of the Dawn',desc:'You can use your Crimson Rite ability with a new rite: Rite of the Dawn. This rite deals radiant damage instead of the usual type. When you deal damage with a Rite of the Dawn weapon to an undead creature, you deal maximum damage on the rite damage die instead of rolling. Additionally, while a Rite of the Dawn is active, you have resistance to necrotic damage.'},
      {lvl:3,name:'Curse Specialist',desc:'You gain an additional use of your Blood Maledict feature and learn the Blood Curse of the Eyeless if you don\'t already know it.'},
      {lvl:7,name:'Ethereal Step',desc:'At the start of your turn, if you aren\'t incapacitated, you can choose to step into the Ethereal Plane. You can see and affect creatures and objects on the Material Plane, but you are invisible and cannot be targeted from it. You return to the Material Plane at the end of your turn. You can use this feature a number of times equal to your proficiency bonus per long rest.'},
      {lvl:11,name:'Brand of Sundering',desc:'Your Brand of Castigation feature is enhanced against undead. When you brand an undead creature, it has disadvantage on saving throws against your blood curses, and when you deal rite damage to it, you deal an additional 1d6 radiant damage.'},
      {lvl:15,name:'Blood Curse of the Exorcist',desc:'You learn the Blood Curse of the Exorcist. When you use this curse, you can attempt to banish a fiend or undead creature you can see within 30 feet. The creature must succeed on a CHA saving throw or be banished to its home plane (if it has one) or incapacitated until the end of your next turn (if it doesn\'t). This amplification does not require spending an additional use.'},
    ]},
    'Lycan':{src:'Matt Mercer',desc:'The Order of the Lycan welcomes blood hunters who embrace the primal curse of lycanthropy, channeling its power into a hybrid beast form while maintaining their humanity through strength of will.',feats:[
      {lvl:3,name:'Heightened Senses',desc:'You gain advantage on Wisdom (Perception) checks that rely on hearing or smell.'},
      {lvl:3,name:'Hybrid Transformation',desc:'As a bonus action, you can transform into a hybrid werewolf form for up to 1 hour. While transformed: your speed increases by 10 ft, you gain a bite attack (1d6+STR piercing), your claws count as weapons (1d6+STR slashing), and you can\'t cast spells or concentrate on them. You can use Blood Maledict and Crimson Rite features normally. If you drop to 0 HP while transformed, you revert to your normal form. Uses per long rest = proficiency bonus.'},
      {lvl:7,name:"Stalker's Prowess",desc:'Your Hybrid Transformation speed bonus increases to 15 ft. You gain the Cunning Action feature (Dash, Disengage, or Hide as a bonus action) while transformed.'},
      {lvl:11,name:'Advanced Transformation',desc:'Your hybrid form gains additional power. While transformed, your bite attack deals an extra 1d6 piercing damage, and you can add your INT modifier (minimum +1) to damage rolls with your natural weapons. You also gain darkvision out to 60 ft (or extend existing darkvision by 30 ft).'},
      {lvl:15,name:'Total Transformation',desc:'Your hybrid form is fully mastered. You can now cast Blood Hunter spells and maintain concentration while in Hybrid Transformation. Additionally, once per transformation, when you drop to 0 HP, you can instead drop to 1 HP and immediately move up to half your speed without provoking opportunity attacks.'},
    ]},
    'Mutant':{src:'Matt Mercer',desc:'The Order of the Mutant pushes the limits of the blood hunter\'s self-experimentation. Through alchemical mutagens, they warp their own bodies to gain supernatural abilities that exceed what other hunters can achieve — at a price.',feats:[
      {lvl:3,name:'Mutagencraft',desc:'You gain the ability to craft a number of mutagens equal to your proficiency bonus whenever you finish a long rest. Choose mutagen types from the Mutant list (Aether, Cruelty, Deftness, Embers, Gelid, Impetus, Mobility, Nighteye, Percipience, Potency, Rapidity, Reconstruction, Sagacity, Shielding, Unbreakable). A mutagen takes effect immediately when consumed and lasts for 1 hour. You suffer the listed drawback for the duration.'},
      {lvl:7,name:'Strange Metabolism',desc:'You gain resistance to poison damage and advantage on Constitution saving throws against poison. Additionally, whenever you consume a mutagen and suffer its drawback, you can use your reaction to suppress the drawback for a number of rounds equal to your proficiency bonus.'},
      {lvl:11,name:'Brand of Axiom',desc:'When you use Brand of Castigation, if the branded creature is polymorphed or has transformed, it must succeed on a CHA saving throw or revert to its true form. It cannot polymorph or transform again for 1 minute. Additionally, your rite damage ignores resistance.'},
      {lvl:15,name:'Blood Curse of Corrosion',desc:'You learn the Blood Curse of Corrosion. When you use this curse on a creature, it suffers the poisoned condition until the curse ends, and whenever it fails a saving throw while cursed, it takes additional necrotic damage equal to your proficiency bonus. This amplification does not require spending an additional use.'},
    ]},
    'Profane Soul':{src:'Matt Mercer',desc:'The Order of the Profane Soul binds itself to otherworldly patrons — demons, devils, undead lords, or elder beings — to supplement their blood hunter training with eldritch power. They walk the razor\'s edge between hunter and hunted.',feats:[
      {lvl:3,name:'Otherworldly Patron',desc:'You choose an Otherworldly Patron — the same patrons available to Warlocks (Archfey, Fiend, Great Old One, Celestial, Hexblade, or others). Your patron grants you expanded spell options and may contact you with cryptic guidance.'},
      {lvl:3,name:'Pact Magic',desc:'You gain a warlock spell slot (regains on short or long rest), one cantrip from the warlock spell list, and two 1st-level spells from your patron\'s expanded list. Spellcasting ability is INT. Spell slots scale with Blood Hunter level: 1st-level slot at levels 3–6, 2nd-level at 7–10, 3rd-level at 11–16, 4th-level at 17+.'},
      {lvl:7,name:'Mystic Frenzy',desc:'When you use your action to cast a cantrip while a Crimson Rite is active on a weapon, you can make one weapon attack with that weapon as a bonus action.'},
      {lvl:11,name:'Revealed Arcana',desc:'Your patron reveals a more powerful spell to you. You can cast one 5th-level or lower spell from your patron\'s expanded list once per long rest without expending a spell slot. The spellcasting ability is INT.'},
      {lvl:15,name:'Blood Curse of the Soulfinder',desc:'You learn the Blood Curse of the Soulfinder. When a creature cursed by you drops to 0 HP, you can use your reaction to trap its soul — the creature cannot be resurrected except by a wish spell for 24 hours. Additionally, you gain temporary HP equal to the creature\'s CR (minimum 1) when its soul is trapped. This amplification does not require spending an additional use.'},
    ]},
  },
};

let step = 0;

// ─── HELPERS ──────────────────────────────────────────────────────────────────

// Resolve equipment choices into a human-readable string
// Substitute "any X weapon" placeholders in text with chosen values; safe against infinite loops
function equipSubstituteAny(text, keyPrefix) {
  let remaining = text; let result = ''; let ci = 0;
  let found = true;
  while (found && remaining) {
    found = false;
    for (const {pattern} of EQUIP_CHOICES) {
      const m = remaining.match(pattern);
      if (m) {
        result += remaining.slice(0, m.index) + (C.equipChoices[keyPrefix+ci] || m[0]);
        remaining = remaining.slice(m.index + m[0].length);
        ci++; found = true; break;
      }
    }
  }
  return result + remaining;
}

function resolveEquip() {
  const eRows = EQUIP[C.cls] || [];
  const parts = [];
  for (let ri = 0; ri < eRows.length; ri++) {
    const row = eRows[ri];
    if (row.fixed) {
      parts.push(equipSubstituteAny(row.fixed, `f${ri}_`));
    } else {
      const letter = C.equipRows[ri];
      if (letter !== undefined) {
        const optIdx = letter.charCodeAt(0) - 97;
        parts.push(equipSubstituteAny(row.choices[optIdx] || '', `r${ri}_`));
      }
    }
  }
  return parts.join(', ');
}

// Detect armor and shield from the character's inventory strings
// Returns a Set of armor names (from ARMOR_TABLE) found in the character's inventory.
function getArmorInInventory() {
  const equipStr = [
    resolveEquip(), C.extraEquip||'',
    ...(C.purchasedItems||[]).map(i=>i.name||''),
  ].join(' ');
  const found = new Set();
  for (const row of ARMOR_TABLE) {
    if (row[1]==='Shield') continue;
    if (new RegExp('\\b'+row[0].replace(/\s+/g,'\\s+')+'\\b','i').test(equipStr)) found.add(row[0]);
  }
  return found;
}

// Returns ARMOR_TABLE rows (excluding Shield) that any of the character's classes is proficient with.
function getArmorOptions() {
  const profs = getAllClasses().flatMap(e=>(CLASSES[e.cls]||{}).armor||[]);
  const allowAll = profs.some(a=>/^all armor/i.test(a));
  const allowMedium = allowAll || profs.some(a=>/^medium$/i.test(a));
  const allowLight  = allowAll || allowMedium || profs.some(a=>/^light$/i.test(a));
  return ARMOR_TABLE.filter(r => {
    if (r[1] === 'Shield') return false;
    if (r[1] === 'Light')  return allowLight;
    if (r[1] === 'Medium') return allowMedium;
    if (r[1] === 'Heavy')  return allowAll;
    return false;
  });
}

// Returns true if any of the character's classes is proficient with shields.
function classHasShieldProf() {
  return getAllClasses().some(e=>(CLASSES[e.cls]||{}).armor?.some(a=>/shield/i.test(a)));
}

function inferArmorFromInventory() {
  const equipStr = [
    resolveEquip(), C.extraEquip||'',
    ...(C.purchasedItems||[]).map(i=>i.name||''),
  ].join(' ');
  const hasShield = /\bshield\b/i.test(equipStr);
  let bestArmor = null; let bestBase = -1;
  for (const row of ARMOR_TABLE) {
    if (row[1]==='Shield') continue;
    if (new RegExp('\\b'+row[0].replace(/\s+/g,'\\s+')+'\\b','i').test(equipStr)) {
      const base = parseInt(row[2]) || 10;
      if (base > bestBase) { bestBase=base; bestArmor=row[0]; }
    }
  }
  return { armor: bestArmor||'Unarmored', hasShield };
}

// Returns all active fighting style names for this character
function getActiveFightingStyles() {
  const styles = new Set();
  const clsStyle = (C.classChoices?.fightingStyle||[])[0];
  if (clsStyle) styles.add(clsStyle);
  // Multiclass fighting styles
  for (const mc of (C.multiclasses||[])) {
    const mcStyle = (mc.classChoices?.fightingStyle||[])[0];
    if (mcStyle) styles.add(mcStyle);
  }
  const swordsStyle = (C.subclassChoices?.swordsFightingStyle||[])[0];
  if (swordsStyle) styles.add(swordsStyle);
  const valorStyle = (C.subclassChoices?.valorFightingStyle||[])[0];
  if (valorStyle) styles.add(valorStyle);
  for (const imp of (C.improvements||[])) {
    if (imp?.type==='feat' && imp.feat==='Fighting Initiate' && imp.choices?.fiStyle) styles.add(imp.choices.fiStyle);
  }
  if (C.racialFeat==='Fighting Initiate' && C.racialFeatChoices?.fiStyle) styles.add(C.racialFeatChoices.fiStyle);
  return [...styles];
}

function computeAC() {
  const dexMod = mmod(fs('DEX'));
  const autoInfo = C.armorName==='Auto' ? inferArmorFromInventory() : null;
  const armor = autoInfo ? autoInfo.armor : (C.armorName || 'Unarmored');
  const shield = C.hasShield ? 2 : 0; // always manual — never auto-inferred
  const defenseBonus = getActiveFightingStyles().includes('Defense') && armor !== 'Unarmored' ? 1 : 0;
  const race = RACES[C.race] || {};
  const na = race.naturalArmor;
  const profB = pb(totalCharLevel());

  // Helper: compute natural armor base AC (no shield added yet)
  const naturalAC = na ? (
    na.type === 'fixed'    ? na.base :
    na.type === 'dex'      ? na.base + dexMod :
    na.type === 'prof+dex' ? na.base + profB + dexMod :
    na.base
  ) : null;

  // Tortle (armorOnly): natural armor replaces everything — only shield can stack
  if (na && na.armorOnly) return naturalAC + shield;

  // Unarmored path
  if (armor === 'Unarmored') {
    let base;
    const allCls = getAllClasses().map(e=>e.cls);
    const isBarbarian = allCls.includes('Barbarian');
    const isMonk = allCls.includes('Monk');
    if (isBarbarian && !isMonk) base = 10 + dexMod + mmod(fs('CON'));
    else if (isMonk && !isBarbarian) return 10 + dexMod + mmod(fs('WIS')); // monks: no shield with unarmored defense
    else if (isBarbarian && isMonk) base = 10 + dexMod + mmod(fs('CON')); // PHB: can't combine; Barbarian version used
    else base = 10 + dexMod;
    // For Lizardfolk / Warforged: use natural armor if it's higher
    if (naturalAC != null) base = Math.max(base, naturalAC);
    return base + shield;
  }

  // Wearing regular armor
  const row = ARMOR_TABLE.find(r => r[0] === armor);
  if (!row) return 10 + dexMod + shield + defenseBonus;
  const acStr = row[2];
  let armoredAC;
  if (acStr.includes('+ DEX')) {
    const base = parseInt(acStr);
    const capMatch = acStr.match(/max (\d)/);
    const maxDex = capMatch ? parseInt(capMatch[1]) : 99;
    armoredAC = base + Math.min(dexMod, maxDex);
  } else {
    armoredAC = parseInt(acStr);
  }
  // Lizardfolk: can use natural armor instead if it would be higher
  if (naturalAC != null && !na.armorOnly) armoredAC = Math.max(armoredAC, naturalAC);
  return armoredAC + shield + defenseBonus;
}

function computeMaxHP() {
  const conMod = mmod(fs('CON'));
  const toughBonus = getChosenFeats().includes('Tough') ? 2 * totalCharLevel() : 0;
  const hdLevels = getHdByCharLevel();
  if (!hdLevels.length) return 0;
  if (C.hpMethod === 'manual') {
    let total = hdLevels[0].hd + conMod; // level 1: max
    for (let i = 1; i < hdLevels.length; i++) {
      const roll = parseInt((C.hpPerLevel||[])[i]) || 0;
      total += roll + conMod;
    }
    return total + toughBonus;
  }
  // Average: level 1 max, subsequent = floor(hd/2)+1 + CON
  let total = hdLevels[0].hd + conMod;
  for (let i = 1; i < hdLevels.length; i++) {
    total += Math.floor(hdLevels[i].hd / 2) + 1 + conMod;
  }
  return total + toughBonus;
}

const mmod = s => Math.floor((s-10)/2);
const mstr = s => { const m=mmod(s); return (m>=0?'+':'')+m; };
const pb = lvl => Math.ceil(lvl/4)+1;
const fs = ab => {
  const race = RACES[C.race]||{bonus:{}};
  const sub = (race.sub||[]).find(s => s.name === C.subrace);
  const asiBonus = (C.improvements||[]).reduce((total, imp) => {
    if (!imp || imp.type !== 'asi') return total;
    if (imp.mode === 'double' && imp.ab1 === ab) return total + 2;
    if (imp.mode === 'split') {
      if (imp.ab1 === ab) total += 1;
      if (imp.ab2 === ab) total += 1;
    }
    return total;
  }, 0);
  const featAsiBonus = (C.improvements||[]).reduce((total, imp) => {
    if (!imp || imp.type !== 'feat' || !imp.feat) return total;
    if (imp.featAsiChoice === ab) return total + 1;
    return total;
  }, 0);
  const racialFeatAsiBonus = (()=>{
    if (!C.racialFeat) return 0;
    const rf = FEATS.find(f=>f.name===C.racialFeat);
    if (rf && rf.asiChoice && C.racialFeatAsiChoice === ab) return 1;
    return 0;
  })();
  const activeFlex = race.flexBonus || (sub && sub.flexBonus);
  const flexBonus = activeFlex ? (C.racialFlexChoices||[]).filter(x=>x===ab).length : 0;
  return C.scores[ab] + (race.bonus[ab]||0) + (sub ? (sub.bonus[ab]||0) : 0) + asiBonus + featAsiBonus + racialFeatAsiBonus + flexBonus;
};

const getChosenFeats = () => (C.improvements||[]).filter(i=>i&&i.type==='feat'&&i.feat).map(i=>i.feat);

// ─── MULTICLASS HELPERS ───────────────────────────────────────────────────────

// Total character level (all classes combined)
function totalCharLevel() {
  return C.level + (C.multiclasses||[]).filter(m=>m.cls).reduce((s,m)=>s+(m.level||0),0);
}

// All class entries: primary + multiclasses (filtered to those with a class chosen)
function getAllClasses() {
  const primary = {cls:C.cls,level:C.level,subclass:C.subclass,classSkills:C.classSkills,classChoices:C.classChoices,subclassChoices:C.subclassChoices,isPrimary:true};
  const mcs = (C.multiclasses||[]).filter(m=>m.cls).map(m=>({...m,isPrimary:false}));
  return [primary,...mcs].filter(e=>e.cls);
}

// Initiative bonus — DEX mod + feat/subclass bonuses; also returns advantage flag
function computeInitiative() {
  let bonus = mmod(fs('DEX'));
  let adv = false;
  const profB = pb(totalCharLevel());

  // Alert feat: +5
  if ((C.improvements||[]).some(imp => imp && imp.type==='feat' && imp.feat==='Alert')) bonus += 5;

  for (const entry of getAllClasses()) {
    const clsLvl = entry.isPrimary ? C.level : (entry.level||0);

    // Gloom Stalker Ranger (level 3+): +WIS — Dread Ambusher
    if (entry.subclass === 'Gloom Stalker' && clsLvl >= 3) bonus += mmod(fs('WIS'));

    // Swashbuckler Rogue (level 3+): +CHA — Rakish Audacity
    if (entry.subclass === 'Swashbuckler' && clsLvl >= 3) bonus += mmod(fs('CHA'));

    // War Magic / Chronurgy Wizard (level 2+): +INT — Tactical Wit / Temporal Awareness
    if ((entry.subclass === 'War Magic' || entry.subclass === 'Chronurgy Magic') && clsLvl >= 2) bonus += mmod(fs('INT'));

    // Oath of the Watchers Paladin (level 7+): +proficiency bonus — Aura of the Sentinel
    if (entry.subclass === 'Oath of the Watchers' && clsLvl >= 7) bonus += profB;

    // Feral Instinct — Barbarian level 7+ (advantage)
    if (entry.cls === 'Barbarian' && clsLvl >= 7) adv = true;

    // Ambush Master — Scout Rogue level 13+ (advantage)
    if (entry.subclass === 'Scout' && clsLvl >= 13) adv = true;
  }

  return {bonus, adv};
}

// Returns daily prepared spell count for a prepared/spellbook caster, or null for known casters.
// Paladin/Artificer use half-level (PHB rule); all others use full level.
function getPreparedCount(clsName, clsLevel) {
  const spType = SPELL_TYPE[clsName];
  if (spType !== 'prepared' && spType !== 'spellbook') return null;
  const castAbil = (CLASSES[clsName] || {}).castAbil || 'INT';
  const half = clsName === 'Paladin' || clsName === 'Artificer';
  return Math.max(1, mmod(fs(castAbil)) + (half ? Math.floor(clsLevel / 2) : clsLevel));
}

// Caster level contribution for combined multiclass spell slots (PHB p.164)
function getCasterContrib(cls, level, subclass) {
  if (['Bard','Cleric','Druid','Sorcerer','Wizard'].includes(cls)) return level;
  if (['Paladin','Ranger'].includes(cls)) return Math.floor(level/2);
  if (cls==='Artificer') return Math.ceil(level/2);
  if (cls==='Warlock') return 0; // pact magic kept separate
  if (subclass && SUBCLASS_CASTER_INFO[subclass]) {
    const sci=SUBCLASS_CASTER_INFO[subclass];
    if (sci.slotType==='third') return Math.floor(level/3);
    if (sci.slotType==='half') return Math.floor(level/2);
  }
  return 0;
}

// Combined multiclass spell slots (null if single class or no caster levels)
function getMulticlassSlots() {
  const entries=getAllClasses();
  if (entries.length<=1) return null;
  let total=0;
  for (const e of entries) total+=getCasterContrib(e.cls,e.level,e.subclass);
  if (total<1) return null;
  return FULL_SLOTS[Math.min(total,20)-1]||null;
}

// Returns structured spell slot info: {rows:[{label,count}], warlockRow, note}
function getSpellSlotsInfo() {
  const ord = lv => lv===1?'1st':lv===2?'2nd':lv===3?'3rd':lv+'th';
  const allCE = getAllClasses();
  const anyC = allCE.some(e => (CLASSES[e.cls]||{}).caster || SUBCLASS_CASTER_INFO[e.subclass]);
  if (!anyC) return null;
  const mcSlots = getMulticlassSlots();
  if (mcSlots) {
    const rows = mcSlots.map((n,i)=>({label:ord(i+1)+' Level',count:n})).filter(r=>r.count>0);
    const wEntry = allCE.find(e=>e.cls==='Warlock');
    let warlockRow = null;
    if (wEntry) { const ws=WARLOCK_SLOTS[(wEntry.level||1)-1]||[]; if(ws[0]) warlockRow={label:`Pact Slots (${ord(ws[1])})`,count:ws[0]}; }
    return {rows, warlockRow, note:'Combined multiclass slots (PHB p.165)'};
  }
  const primary = allCE[0]; if (!primary) return null;
  if (primary.cls === 'Warlock') {
    const ws = WARLOCK_SLOTS[(primary.level||1)-1]||[];
    if (!ws[0]) return {rows:[], note:'Pact Magic — slots unlock at level 1'};
    return {rows:[{label:`Pact Slots (${ord(ws[1])})`,count:ws[0]}], note:'Pact Magic: all slots recharge on short or long rest'};
  }
  let slots = [];
  const sci = SUBCLASS_CASTER_INFO[primary.subclass];
  if (sci) slots = THIRD_SLOTS[(primary.level||1)-1]||[];
  else if (['Wizard','Cleric','Druid','Bard','Sorcerer'].includes(primary.cls)) slots = FULL_SLOTS[(primary.level||1)-1]||[];
  else if (primary.cls==='Paladin'||primary.cls==='Ranger') slots = HALF_SLOTS[(primary.level||1)-1]||[];
  else if (primary.cls==='Artificer') slots = ART_SLOTS[(primary.level||1)-1]||[];
  const rows = slots.map((n,i)=>({label:ord(i+1)+' Level',count:n})).filter(r=>r.count>0);
  const note = sci ? `1/3-caster — slots from ${primary.subclass} subclass` : null;
  return {rows, note};
}

// Returns HTML rows for spell slots to embed in guide .box elements
function getSpellSlotsHTMLRows() {
  const info = getSpellSlotsInfo();
  if (!info) return '';
  const allRows = info.warlockRow ? [...info.rows, info.warlockRow] : info.rows;
  if (!allRows.length) return '';
  return allRows.map(r=>`<div class="row"><span>Slots — ${r.label}</span><span>${r.count}</span></div>`).join('')
    + (info.note ? `<div class="row"><span style="font-style:italic;font-size:10px;color:#888;">${info.note}</span><span></span></div>` : '');
}

// All ASI opportunities across all classes, ordered by class then class level
function getAllASIOpportunities() {
  const opps=[];
  for (const e of getAllClasses()) {
    const lvls=(ASI_LEVELS[e.cls]||DEFAULT_ASI_LEVELS).filter(l=>l<=e.level);
    for (const clsLvl of lvls) {
      opps.push({cls:e.cls, clsLvl, label:e.isPrimary?`Level ${clsLvl}`:`${e.cls} Lv${clsLvl}`, shortLabel:e.isPrimary?`Lv${clsLvl}`:`${e.cls.split(' ')[0].substring(0,4)} Lv${clsLvl}`});
    }
  }
  return opps;
}

// Check if character meets prerequisites for multiclassing into a class
function meetsMulticlassPrereq(cls) {
  const reqs=MC_PREREQ[cls];
  if (!reqs) return true;
  for (const req of reqs) {
    if (req.or) { if (fs(req.ab)<req.min && fs(req.or)<req.min) return false; }
    else { if (fs(req.ab)<req.min) return false; }
  }
  return true;
}

// Skill options available when multiclassing into a class (from class's skillOpts)
function getMCSkillOpts(cls) {
  const clsObj=CLASSES[cls]||{};
  return clsObj.skillOpts==='any'?ALL_SKILLS:(clsObj.skillOpts||[]);
}

// Hit die (numeric) for each character level, primary class first then multiclasses
function getHdByCharLevel() {
  const result=[];
  const primaryHd=parseInt((CLASSES[C.cls]||{hd:'d8'}).hd.replace('d',''));
  for (let i=0;i<C.level;i++) result.push({hd:primaryHd,cls:C.cls});
  for (const mc of (C.multiclasses||[])) {
    if (!mc.cls) continue;
    const mcHd=parseInt((CLASSES[mc.cls]||{hd:'d8'}).hd.replace('d',''));
    for (let i=0;i<mc.level;i++) result.push({hd:mcHd,cls:mc.cls});
  }
  return result;
}

// Returns the prerequisite string for a class
function prereqStr(cls) {
  const reqs=MC_PREREQ[cls]||[];
  return reqs.map(r=>r.or?`${r.ab} or ${r.or} ${r.min}+`:`${r.ab} ${r.min}+`).join(' and ');
}

// Returns the effective background data, merging custom bg choices when applicable
function getEffectiveBg() {
  const bg = BACKGROUNDS[C.bg]||{skills:[],tools:[],langs:0,feature:''};
  if (!bg.custom) return bg;
  const cb = C.customBg||{};
  return {
    skills: (cb.skills||[]).filter(Boolean),
    tools:  [cb.tool1,cb.tool2].filter(Boolean),
    langs:  0,
    feature: cb.feature||'Custom Feature',
    custom: true,
  };
}

// Returns all skill proficiencies granted by the current race/subrace (fixed + chosen flex)
function getRaceSkills() {
  const race = RACES[C.race]||{};
  const sub = (race.sub||[]).find(s=>s.name===C.subrace);
  const fixed = [...(race.skills||[]), ...(sub&&sub.skills||[])];
  // Include skills chosen via racial choice pickers (Kenku, Changeling, Lizardfolk, Warforged, etc.)
  const choiceSkills = Object.values(C.racialChoices||{}).flat().filter(v=>typeof v==='string' && ALL_SKILLS.includes(v));
  return [...new Set([...fixed, ...(C.racialSkills||[]), ...choiceSkills])];
}

// All skills the character is proficient in (class + bg + race + class choices + subclass choices + multiclass)
function getAllSkillProfs() {
  const bg = getEffectiveBg();
  const bgRep = C.bgSkillReplacements || {};
  const base = [
    ...C.classSkills,
    ...bg.skills.map(s => bgRep[s] || s),
    ...getRaceSkills(),
  ];
  // Multiclass skill grants
  for (const mc of (C.multiclasses||[])) base.push(...(mc.classSkills||[]));
  // Class choices granting proficiency or expertise (primary class)
  for (const def of (CLASS_CHOICES[C.cls] || [])) {
    if (def.isSkillGrant || def.isExpertise) {
      for (const v of (C.classChoices[def.key] || [])) if (ALL_SKILLS.includes(v)) base.push(v);
    }
  }
  // Multiclass class choices
  for (const mc of (C.multiclasses||[])) {
    for (const def of (CLASS_CHOICES[mc.cls]||[])) {
      if (def.isSkillGrant || def.isExpertise) {
        for (const v of ((mc.classChoices||{})[def.key]||[])) if (ALL_SKILLS.includes(v)) base.push(v);
      }
    }
  }
  // Subclass choices granting proficiency or expertise (primary class)
  for (const def of ((SUBCLASS_CHOICES[C.cls]||{})[C.subclass]||[])) {
    if (def.isSkillGrant || def.isExpertise) {
      for (const v of (C.subclassChoices[def.key] || [])) if (ALL_SKILLS.includes(v)) base.push(v);
    }
  }
  // Multiclass subclass choices
  for (const mc of (C.multiclasses||[])) {
    for (const def of ((SUBCLASS_CHOICES[mc.cls]||{})[mc.subclass]||[])) {
      if (def.isSkillGrant || def.isExpertise) {
        for (const v of ((mc.subclassChoices||{})[def.key]||[])) if (ALL_SKILLS.includes(v)) base.push(v);
      }
    }
  }
  return [...new Set(base)];
}

// Skills that have expertise (proficiency bonus doubled)
function getExpertiseSkills() {
  const result = [];
  for (const def of (CLASS_CHOICES[C.cls] || [])) {
    if (def.isExpertise) result.push(...(C.classChoices[def.key] || []));
  }
  for (const mc of (C.multiclasses||[])) {
    for (const def of (CLASS_CHOICES[mc.cls]||[])) {
      if (def.isExpertise) result.push(...((mc.classChoices||{})[def.key]||[]));
    }
  }
  for (const def of ((SUBCLASS_CHOICES[C.cls]||{})[C.subclass]||[])) {
    if (def.isExpertise) result.push(...(C.subclassChoices[def.key] || []));
  }
  for (const mc of (C.multiclasses||[])) {
    for (const def of ((SUBCLASS_CHOICES[mc.cls]||{})[mc.subclass]||[])) {
      if (def.isExpertise) result.push(...((mc.subclassChoices||{})[def.key]||[]));
    }
  }
  return [...new Set(result)];
}

// Full skill bonus including expertise and Jack of All Trades
function getSkillBonus(skill) {
  const ab = SKILLS_MAP[skill];
  if (!ab) return 0;
  const proficient = getAllSkillProfs().includes(skill);
  const profB = pb(totalCharLevel());
  const abilMod = mmod(fs(ab));
  if (proficient && getExpertiseSkills().includes(skill)) return abilMod + profB * 2;
  if (proficient) return abilMod + profB;
  // Jack of All Trades: Bard lv 2+ adds half proficiency to non-proficient skills
  const bardEntry = getAllClasses().find(e=>e.cls==='Bard');
  if (bardEntry && bardEntry.level >= 2) return abilMod + Math.floor(profB / 2);
  return abilMod;
}

// Check if a feat's prerequisites are met by the current character
function featEligible(feat) {
  if(!feat.pre) return true;
  const pre = feat.pre;
  const race = C.race; const subrace = C.subrace;
  const cls = CLASSES[C.cls]||{};
  const armor = [...new Set(getAllClasses().flatMap(e=>(CLASSES[e.cls]||{}).armor||[]))];
  if(pre.includes('Dragonborn race')) return race==='Dragonborn';
  if(pre.includes('Halfling race')) return race==='Halfling';
  if(pre.includes('Dwarf race') && !pre.includes('Dwarf or Small')) return race==='Dwarf';
  if(pre.includes('Gnome race')) return race==='Gnome';
  if(pre.includes('Tiefling race')) return race==='Tiefling';
  if(pre.includes('Half-Orc race')) return race==='Half-Orc';
  if(pre.includes('Elf or Half-Elf race')) return race==='Elf'||race==='Half-Elf';
  if(pre.includes('High Elf subrace')) return subrace==='High Elf';
  if(pre.includes('Wood Elf subrace')) return subrace==='Wood Elf';
  if(pre.includes('Dwarf or Small race')) return ['Dwarf','Gnome','Halfling'].includes(race);
  if(pre.includes('Human, Half-Elf, or Half-Orc')) return ['Human','Half-Elf','Half-Orc'].includes(race);
  const dexM=pre.match(/DEX (\d+)\+/); if(dexM && fs('DEX')<parseInt(dexM[1])) return false;
  const chaM=pre.match(/CHA (\d+)\+/); if(chaM && fs('CHA')<parseInt(chaM[1])) return false;
  if(pre.includes('INT or WIS 13+')) return fs('INT')>=13||fs('WIS')>=13;
  if(pre.includes('Spellcasting or Pact Magic')) return getAllClasses().some(e=>(CLASSES[e.cls]||{}).caster||SUBCLASS_CASTERS[e.subclass]);
  if(pre.includes('heavy armor')) return armor.some(a=>/heavy/i.test(a));
  if(pre.includes('Medium Armor')) return armor.some(a=>/medium|heavy/i.test(a));
  if(pre.includes('Light Armor')) return armor.some(a=>/light|medium|heavy/i.test(a));
  if(pre.includes('martial weapon')) return getAllClasses().some(e=>['Barbarian','Fighter','Paladin','Ranger'].includes(e.cls));
  return true;
}

function showPopup(title, body, src) {

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function mkSelect(label, opts, val, onChange, placeholder) {
  const wrap = document.createElement('div');
  wrap.style.marginBottom = '14px';
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  const sel = document.createElement('select');
  if (placeholder) sel.innerHTML = `<option value="">${placeholder}</option>`;
  for (const o of opts) {
    const op = document.createElement('option');
    op.value = o.v||o; op.textContent = o.l||o;
    if ((o.v||o) === val) op.selected = true;
    sel.appendChild(op);
  }
  sel.addEventListener('change', e => onChange(e.target.value));
  wrap.appendChild(lbl); wrap.appendChild(sel);
  return wrap;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  const noFeats = getAllASIOpportunities().length === 0;
  const noSpells = !C.cls || getAllClasses().every(e=>!CLASSES[e.cls]?.caster && !SUBCLASS_CASTERS[e.subclass]);
  // Helper: advance step index past any hidden steps
  const skipHidden = (s, dir) => { let r=s; while((r===5&&noSpells)||(r===6&&noFeats)) r+=dir; return r; };
  if (noFeats && step === 6) step = skipHidden(5, -1);
  if (noSpells && step === 5) step = 4;
  if (noFeats) C.improvements = [];
  document.getElementById('stepBar').innerHTML = STEPS.map((s,i) => {
    if (i === 5 && noSpells) return '';
    if (i === 6 && noFeats) return '';
    const warn = i < step && stepWarning(i);
    const pillCls = i===step ? 'active' : warn ? 'warn' : i<step ? 'done' : '';
    return `<div class="step-pill ${pillCls}" onclick="goStep(${i})">${warn?'⚠ ':''}${s}</div>`;
  }).join('');
  const el = document.getElementById('stepContent');
  el.innerHTML = '';
  [renderRace,renderClass,renderBG,renderAbility,renderEquip,renderSpells,renderFeats,renderCharInfo,renderReview][step](el);
  document.getElementById('navBar').innerHTML = '';
  const nav = document.getElementById('navBar');
  const back = document.createElement('button');
  back.textContent = '← Back';
  if (step===0) back.disabled = true;
  back.addEventListener('click', () => { step = skipHidden(step-1, -1); render(); });
  nav.appendChild(back);
  if (step < STEPS.length-1) {
    const next = document.createElement('button');
    next.className = 'btn-primary';
    const ok = validStep(step);
    next.disabled = !ok;
    const nextStep = skipHidden(step+1, 1);
    next.textContent = ok ? `Next: ${STEPS[nextStep]} →` : 'Complete required fields →';
    next.addEventListener('click', () => { step = skipHidden(step+1, 1); render(); });
    nav.appendChild(next);
  } else {
    const btns = document.createElement('div');
    btns.style.display = 'flex'; btns.style.gap = '10px';
    const p = document.createElement('button');
    p.className = 'btn-primary'; p.textContent = '🖨 Print Sheet';
    p.addEventListener('click', printSheet);
    const d = document.createElement('button');
    d.className = 'btn-success'; d.textContent = '⬇ Download HTML';
    d.addEventListener('click', downloadSheet);
    btns.appendChild(p); btns.appendChild(d);
    nav.appendChild(btns);
  }
}

function goStep(i) {
  if (i <= step || (i > 0 && validStep(step))) { step = i; render(); }
}

function validStep(s) {
  if (s===0) {
    if (!C.race) return false;
    const r = RACES[C.race];
    if (r && r.sub.length > 0 && !C.subrace) return false;
    return true;
  }
  if (s===1) return !!C.cls;
  if (s===2) return !!C.bg;
  return true;
}

// Returns true if a completed step has optional fields left unfilled (shows ⚠ on pill)
function stepWarning(s) {
  if (s===0) {
    const r = RACES[C.race]||{};
    const subObj = (r.sub||[]).find(x=>x.name===C.subrace);
    const activeFlex = r.flexBonus||(subObj&&subObj.flexBonus);
    if (activeFlex && (C.racialFlexChoices||[]).length < activeFlex.count) return true;
    if (r.skillFlex && (C.racialSkills||[]).length < r.skillFlex.count) return true;
    if (subObj && subObj.grantsFeat && !C.racialFeat) return true;
    // Check all racial choice pickers are complete
    const allChoices = [...(r.choices||[]), ...((subObj&&subObj.choices)||[])];
    for (const ch of allChoices) {
      const val = (C.racialChoices||{})[ch.id];
      const filled = Array.isArray(val) ? val.filter(Boolean).length : (val ? 1 : 0);
      if (filled < ch.count) return true;
    }
    return false;
  }
  if (s===1) {
    if (!C.cls) return false;
    const cls = CLASSES[C.cls];
    if (cls && C.classSkills.length < cls.skillPick) return true;
    // Check multiclass skill picks
    for (const mc of (C.multiclasses||[])) {
      if (!mc.cls) continue;
      const needed = (MC_PROFS[mc.cls]||{}).skills||0;
      if (needed > 0 && (mc.classSkills||[]).length < needed) return true;
    }
    return false;
  }
  if (s===3) {
    if (C.method==='standard') {
      const assigned = ABS.filter(a=>STD.includes(C.scores[a])).length;
      if (assigned < 6) return true;
    }
    return false;
  }
  if (s===4) {
    if (C.useGold!=='equipment' && C.useGold!=='hybrid') return false;
    const rows = EQUIP[C.cls] || [];
    return rows.some((r,ri) => r.choices && C.equipRows[ri] === undefined);
  }
  return false;
}

      card.appendChild(flexDiv);
    }
    // Bonus feat grant (e.g. Variant Human)
    if (subObj && subObj.grantsFeat) {
      const featDiv = document.createElement('div'); featDiv.style.marginBottom='10px';
      featDiv.innerHTML=`<div class="label">Bonus Feat</div><div style="font-size:11px;color:var(--parchment-dim);margin-bottom:6px;">Variant Humans gain one feat at 1st level. You must meet the feat's prerequisites.</div>`;
      const featSel = document.createElement('select');
      // Only show feats where racial/subrace prereqs are satisfied (or there are none)
      const racialOkFeats = FEATS.filter(f => {
        if (!f.pre) return true;
        if (/race|subrace/i.test(f.pre)) return featEligible(f);
        return true;
      });
      featSel.innerHTML=`<option value="">— Choose a feat —</option>`+racialOkFeats.map(f=>`<option value="${f.name}"${C.racialFeat===f.name?' selected':''}>${f.name}</option>`).join('');
      featSel.addEventListener('change', e=>{C.racialFeat=e.target.value||null;C.racialFeatAsiChoice='';C.racialFeatChoices={};render();});
      featDiv.appendChild(featSel);
      if(C.racialFeat){
        const f=FEATS.find(x=>x.name===C.racialFeat);
        if(f){
          const desc=document.createElement('div'); desc.style.cssText='font-size:12px;color:var(--parchment-dim);margin-top:6px;'; desc.textContent=f.desc; featDiv.appendChild(desc);
          if(f.asiChoice && f.asiChoice.length){
            const asiWrap=document.createElement('div'); asiWrap.style.cssText='margin-top:8px;';
            asiWrap.innerHTML=`<div class="label" style="margin-bottom:6px;">Ability Score Bonus from ${f.name}</div>`;
            const asiSel=document.createElement('select');
            asiSel.innerHTML=`<option value="">— Choose ability —</option>`+f.asiChoice.map(ab=>`<option value="${ab}"${C.racialFeatAsiChoice===ab?' selected':''}>${ab} (${fs(ab)} → ${fs(ab)+1})</option>`).join('');
            asiSel.addEventListener('change',e=>{C.racialFeatAsiChoice=e.target.value;renderFinalRow&&renderFinalRow();});
            asiWrap.appendChild(asiSel); featDiv.appendChild(asiWrap);
          }
          const extraDefs=FEAT_CHOICES[f.name]||[];
          if(extraDefs.length){
            if(!C.racialFeatChoices) C.racialFeatChoices={};
            const cg=document.createElement('div'); cg.className='g2'; cg.style.marginTop='8px';
            for(const def of extraDefs){ const el2=renderFeatChoiceUI('racial',{choices:C.racialFeatChoices},def); if(el2) cg.appendChild(el2); }
            featDiv.appendChild(cg);
          }
        }
      }
      card.appendChild(featDiv);
    }
    // Dragonborn breath weapon + resistance info
    if(C.race==='Dragonborn' && subObj && subObj.dragon){
      const d=subObj.dragon;
      const bwDmg=['2d6','2d6','2d6','2d6','2d6','3d6','3d6','3d6','3d6','3d6','4d6','4d6','4d6','4d6','4d6','5d6','5d6','5d6','5d6','5d6'][Math.min(totalCharLevel(),20)-1];
      const bwDC=8+pb(totalCharLevel())+mmod(fs('CON'));
      const dbDiv=document.createElement('div'); dbDiv.style.marginBottom='10px';
      dbDiv.innerHTML=`<div class="label">Draconic Ancestry: ${C.subrace} (${d.dmg})</div>`;
      const dbg=document.createElement('div'); dbg.className='g2';
      dbg.innerHTML=`<div><div class="label" style="font-size:9px;">Breath Weapon</div><div style="font-size:12px;">${d.shape} · <strong style="color:var(--gold)">${bwDmg} ${d.dmg}</strong> · DC ${bwDC} ${d.save} save (half on success)</div></div><div><div class="label" style="font-size:9px;">Damage Resistance</div><div style="font-size:12px;"><strong style="color:var(--gold)">${d.dmg}</strong></div></div>`;
      dbDiv.appendChild(dbg);
      card.appendChild(dbDiv);
    }
    // Half-Elf (and any race with skillFlex) — skill versatility picker
    if(r.skillFlex){
      const sf=r.skillFlex;
      const sfDiv=document.createElement('div'); sfDiv.style.marginBottom='10px';
      sfDiv.innerHTML=`<div class="label">${sf.note}</div><div style="font-size:11px;color:var(--parchment-dim);margin-bottom:6px;">Choose ${sf.count} skills:</div>`;
      const sfTags=document.createElement('div');
      for(const sk of ALL_SKILLS){
        const chosen=(C.racialSkills||[]).includes(sk);
        const sp=document.createElement('span');
        sp.className='tag'+(chosen?' sel-class':'');
        sp.textContent=sk; sp.style.cursor='pointer';
        sp.addEventListener('click',()=>{
          const cur=C.racialSkills||[];
          if(cur.includes(sk)) C.racialSkills=cur.filter(x=>x!==sk);
          else if(cur.length<sf.count) C.racialSkills=[...cur,sk];
          render();
        });
        sfTags.appendChild(sp);
      }
      sfDiv.appendChild(sfTags);
      const sfChosen=(C.racialSkills||[]).length;
      if(sfChosen<sf.count){const w=document.createElement('div');w.style.cssText='font-size:11px;color:var(--gold);margin-top:4px;';w.textContent=`Select ${sf.count-sfChosen} more`;sfDiv.appendChild(w);}
      card.appendChild(sfDiv);
    }
    // ── Racial Choice Pickers ─────────────────────────────────────────────
    const allRacialChoices = [...(r.choices||[]), ...((subObj&&subObj.choices)||[])];
    for (const ch of allRacialChoices) {
      const choiceDiv=document.createElement('div'); choiceDiv.style.marginBottom='12px';
      const chLbl=document.createElement('div'); chLbl.className='label'; chLbl.textContent=ch.label;
      choiceDiv.appendChild(chLbl);
      const cur = C.racialChoices[ch.id];

      if (ch.type==='language') {
        const sel=document.createElement('select');
        sel.innerHTML=`<option value="">— Choose a language —</option>`+LANGUAGES.map(l=>`<option value="${l}"${cur===l?' selected':''}>${l}</option>`).join('');
        sel.addEventListener('change',e=>{C.racialChoices[ch.id]=e.target.value||null;render();});
        choiceDiv.appendChild(sel);

      } else if (ch.type==='cantrip') {
        const list=CANTRIPS[ch.list]||[];
        const sel=document.createElement('select');
        sel.innerHTML=`<option value="">— Choose a cantrip —</option>`+list.map(c=>`<option value="${c}"${cur===c?' selected':''}>${c}</option>`).join('');
        sel.addEventListener('change',e=>{C.racialChoices[ch.id]=e.target.value||null;});
        choiceDiv.appendChild(sel);

      } else if (ch.type==='skill') {
        const opts=ch.opts||ALL_SKILLS;
        const chosen=Array.isArray(cur)?cur:[];
        if(ch.count===1){
          const sel=document.createElement('select');
          sel.innerHTML=`<option value="">— Choose a skill —</option>`+opts.map(s=>`<option value="${s}"${cur===s?' selected':''}>${s}</option>`).join('');
          sel.addEventListener('change',e=>{C.racialChoices[ch.id]=e.target.value||null;});
          choiceDiv.appendChild(sel);
        } else {
          const note=document.createElement('div'); note.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:4px;'; note.textContent=`Choose ${ch.count}:`;
          choiceDiv.appendChild(note);
          const tags=document.createElement('div');
          for(const s of opts){
            const isSel=chosen.includes(s);
            const sp=document.createElement('span'); sp.className='tag'+(isSel?' sel-class':'');
            sp.textContent=s; sp.style.cursor='pointer';
            if(!isSel && chosen.length>=ch.count) sp.style.opacity='0.4';
            sp.addEventListener('click',()=>{
              const c2=Array.isArray(C.racialChoices[ch.id])?[...C.racialChoices[ch.id]]:[];
              if(c2.includes(s)) C.racialChoices[ch.id]=c2.filter(x=>x!==s);
              else if(c2.length<ch.count) C.racialChoices[ch.id]=[...c2,s];
              render();
            });
            tags.appendChild(sp);
          }
          choiceDiv.appendChild(tags);
          if(chosen.length<ch.count){const w=document.createElement('div');w.style.cssText='font-size:11px;color:var(--gold);margin-top:3px;';w.textContent=`Select ${ch.count-chosen.length} more`;choiceDiv.appendChild(w);}
        }

      } else if (ch.type==='tool') {
        const sel=document.createElement('select');
        sel.innerHTML=`<option value="">— Choose a tool —</option>`+TOOLS_LIST.map(t=>`<option value="${t}"${cur===t?' selected':''}>${t}</option>`).join('');
        sel.addEventListener('change',e=>{C.racialChoices[ch.id]=e.target.value||null;});
        choiceDiv.appendChild(sel);

      } else if (ch.type==='weapon') {
        const wList=(ch.list?WEAPONS[ch.list]:[])||[];
        const chosen=Array.isArray(cur)?cur:[];
        const note=document.createElement('div'); note.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:6px;'; note.textContent=`Choose ${ch.count} weapons:`;
        choiceDiv.appendChild(note);
        for(let wi=0;wi<ch.count;wi++){
          const wSel=document.createElement('select'); wSel.style.marginBottom='4px';
          const widx=wi;
          wSel.innerHTML=`<option value="">— Choose weapon ${wi+1} —</option>`+wList.map(w=>`<option value="${w}"${chosen[widx]===w?' selected':''}>${w}</option>`).join('');
          wSel.addEventListener('change',e=>{
            const arr=Array.isArray(C.racialChoices[ch.id])?[...C.racialChoices[ch.id]]:[];
            arr[widx]=e.target.value||null;
            C.racialChoices[ch.id]=arr;
          });
          choiceDiv.appendChild(wSel);
        }
      }
      card.appendChild(choiceDiv);
    }

    // Languages
    {
      const langDiv=document.createElement('div'); langDiv.style.marginBottom='10px';
      langDiv.innerHTML=`<div class="label">Languages</div>`;
      const fixedLangs = RACE_LANGS[C.race] || ['Common'];
      // Also add extra language choices (racialChoices with 'lang' in key)
      const extraLangChoices = Object.entries(C.racialChoices||{})
        .filter(([k])=>k.toLowerCase().includes('lang'))
        .map(([,v])=>v).filter(Boolean);
      const allLangs = [...new Set([...fixedLangs, ...extraLangChoices])];
      const langsRow = document.createElement('div'); langsRow.style.cssText='font-size:13px;display:flex;flex-wrap:wrap;gap:4px;';
      for (const l of allLangs) {
        const sp=document.createElement('span'); sp.className='badge badge-purple'; sp.textContent=l; langsRow.appendChild(sp);
      }
      // Show placeholder if race has extra language choice not yet made
      const allChoices=[...(r.choices||[]),...(((r.sub||[]).find(s=>s.name===C.subrace))?.choices||[])];
      const pendingLangCount = allChoices.filter(ch=>ch.type==='language').reduce((s,ch)=>s+ch.count-((C.racialChoices||{})[ch.id]?1:0),0);
      if (pendingLangCount>0) {
        const pl=document.createElement('span'); pl.className='badge'; pl.style.cssText='opacity:0.6;font-style:italic;'; pl.textContent=`+${pendingLangCount} to choose below`; langsRow.appendChild(pl);
      }
      langDiv.appendChild(langsRow);
      card.appendChild(langDiv);
    }

    const traitDiv=document.createElement('div');
    traitDiv.innerHTML=`<div class="label">Racial traits</div>`;
    // Base race traits + selected subrace traits
    const sub=C.subrace?(r.sub||[]).find(s=>s.name===C.subrace):null;
    const allTraits=[...r.traits,...(sub&&sub.traits||[])];
    for (const t of allTraits) {
      const sp=document.createElement('span');
      const hasTrait = !!TRAIT_DESC[t];
      sp.className='tag'+(hasTrait?' has-popup':'');
      sp.textContent=t;
      if(hasTrait) sp.addEventListener('click',()=>showPopup(t, TRAIT_DESC[t], r.src));
      traitDiv.appendChild(sp);
    }
    card.appendChild(traitDiv);
    el.appendChild(card);
  }
}

function renderClass(el) {
  const title=document.createElement('div'); title.className='step-title'; title.textContent='Choose Your Class';
  el.appendChild(title);
  const g=document.createElement('div'); g.className='g3';
  g.appendChild(mkSelect('Class',Object.keys(CLASSES),C.cls,v=>{C.cls=v;C.subclass='';C.classSkills=[];C.subclassChoices={};C.classChoices={};C.equipRows={};C.equipChoices={};C.multiclasses=(C.multiclasses||[]).filter(m=>m.cls!==v);render();},'Select class...'));
  if (C.cls) {
    const subLvl = SUBCLASS_LVL[C.cls]||3;
    if (C.level >= subLvl) {
      g.appendChild(mkSelect('Subclass',CLASSES[C.cls].sub.map(s=>({v:s,l:s})),C.subclass,v=>{C.subclass=v;C.subclassChoices={};render();},'Select subclass...'));
    } else {
      if (C.subclass) C.subclass = '';
      const lockDiv=document.createElement('div'); lockDiv.style.marginBottom='14px';
      lockDiv.innerHTML=`<div class="label">Subclass</div><div style="font-size:12px;color:var(--parchment-dim);padding:9px 12px;border:1px solid var(--border);border-radius:6px;background:rgba(8,4,1,0.8);">Unlocks at level ${subLvl}</div>`;
      g.appendChild(lockDiv);
    }
  }
  const maxPrimaryLvl = 20 - (C.multiclasses||[]).filter(m=>m.cls).reduce((s,m)=>s+(m.level||0),0);
  if (C.level > maxPrimaryLvl) C.level = maxPrimaryLvl;
  g.appendChild(mkSelect('Class Level',Array.from({length:maxPrimaryLvl},(_,i)=>({v:i+1,l:`Level ${i+1}`})),C.level,v=>{C.level=parseInt(v);render();}));
  el.appendChild(g);
  const cls=CLASSES[C.cls];
  if (cls) {
    const card=document.createElement('div'); card.className='card';
    const info=document.createElement('div'); info.className='g3'; info.style.marginBottom='12px';
    for(const [l,v] of [['Hit Die',cls.hd],['Primary Ability',cls.pri],['Saving Throws',cls.saves.join(', ')]]) {
      const d=document.createElement('div'); d.innerHTML=`<div class="label">${l}</div><div style="font-size:13px;">${v}</div>`; info.appendChild(d);
    }
    card.appendChild(info);
    const armorDiv=document.createElement('div'); armorDiv.style.marginBottom='12px';
    armorDiv.innerHTML=`<div class="label">Armor Proficiencies</div><div style="font-size:13px;">${cls.armor.join(', ')||'None'}</div>`;
    card.appendChild(armorDiv);
    const skillOpts=cls.skillOpts==='any'?ALL_SKILLS:cls.skillOpts;
    const raceSkills=getRaceSkills();
    // Remove any class skills that are now locked by race
    C.classSkills=C.classSkills.filter(s=>!raceSkills.includes(s));
    const skillDiv=document.createElement('div');
    skillDiv.innerHTML=`<div class="label" style="margin-bottom:8px;">Choose ${cls.skillPick} Skills</div>`;
    if(raceSkills.length){ const rn=document.createElement('div'); rn.style.cssText='font-size:11px;color:var(--parchment-dim);margin-bottom:6px;'; rn.textContent=`Already proficient from race: ${raceSkills.join(', ')}`; skillDiv.appendChild(rn); }
    for (const s of skillOpts) {
      const sp=document.createElement('span');
      const fromRace=raceSkills.includes(s);
      if(fromRace){
        sp.className='tag'; sp.style.cssText='opacity:0.4;cursor:not-allowed;';
        sp.textContent=s+' (race)';
        const sd=SKILL_DESC[s]; if(sd) sp.title=`Already proficient from race (${sd.ab})`;
        skillDiv.appendChild(sp); continue;
      }
      sp.className='tag'+(C.classSkills.includes(s)?' sel-class':'');
      const sd=SKILL_DESC[s];
      if(sd) sp.title=`${s} (${sd.ab}) — ${sd.desc}`;
      sp.textContent=s;
      sp.addEventListener('click',()=>{
        if(C.classSkills.includes(s)) C.classSkills=C.classSkills.filter(x=>x!==s);
        else if(C.classSkills.length<cls.skillPick) C.classSkills=[...C.classSkills,s];
        render();
      });
      // Small info icon for popup
      if(sd){
        const info=document.createElement('span');
        info.style.cssText='font-size:9px;opacity:0.6;margin-left:3px;cursor:pointer;vertical-align:middle;';
        info.textContent='ⓘ';
        info.title='Click for details';
        info.addEventListener('click',e=>{e.stopPropagation();showPopup(s,`<strong style="color:var(--gold)">${sd.ab}</strong><br><br>${sd.desc}`,'PHB');});
        sp.appendChild(info);
      }
      skillDiv.appendChild(sp);
    }
    card.appendChild(skillDiv);
    if(cls.caster){
      const sp=document.createElement('div'); sp.style.marginTop='10px';
      sp.innerHTML=`<span class="badge badge-purple">✦ Spellcaster — ${cls.castAbil} modifier</span>`;
      card.appendChild(sp);
    }
    el.appendChild(card);

    // Optional Features (TCoE) — individual toggles above class features
    const optFeatureDefs = (OPT_FEATURES[C.cls] || []).filter(f => C.level >= f.minLevel);
    if (optFeatureDefs.length) {
      const optCard = document.createElement('div'); optCard.className='card'; optCard.style.marginBottom='14px';
      const optHdr = document.createElement('div');
      optHdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
      optHdr.innerHTML='<div class="label" style="margin-bottom:0;">Optional Features</div><span style="font-size:9px;color:var(--parchment-dim);font-family:Cinzel,serif;letter-spacing:0.08em;">[TCoE — check with your DM]</span>';
      optCard.appendChild(optHdr);
      for (const feat of optFeatureDefs) {
        const enabled = !!(C.optFeatures?.[feat.key]);
        const row = document.createElement('div');
        row.style.cssText='display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);';
        // Toggle button
        const btn = document.createElement('button');
        btn.style.cssText='font-family:Cinzel,serif;font-size:9px;letter-spacing:0.08em;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid;flex-shrink:0;transition:all 0.2s;margin-top:1px;';
        btn.textContent = enabled ? 'ON' : 'OFF';
        btn.style.background    = enabled ? 'rgba(201,168,76,0.18)' : 'transparent';
        btn.style.borderColor   = enabled ? 'var(--gold)'            : 'rgba(154,128,96,0.4)';
        btn.style.color         = enabled ? 'var(--gold)'            : 'var(--parchment-dim)';
        btn.addEventListener('click', () => {
          if (!C.optFeatures) C.optFeatures = {};
          C.optFeatures[feat.key] = !C.optFeatures[feat.key];
          // Clear class choices that belong to this opt feature when disabled
          if (!C.optFeatures[feat.key]) delete (C.classChoices||{})[feat.key];
          render();
        });
        // Name + source + replaces line
        const nameWrap = document.createElement('div'); nameWrap.style.flex='1';
        const nameLine = document.createElement('div'); nameLine.style.cssText='font-size:12px;display:flex;align-items:baseline;gap:5px;';
        const nameSpan = document.createElement('span');
        nameSpan.textContent = feat.label;
        nameSpan.style.color = enabled ? 'var(--parchment)' : 'var(--parchment-dim)';
        const srcBadge = document.createElement('span');
        srcBadge.style.cssText='font-size:8px;color:var(--gold);opacity:0.7;';
        srcBadge.textContent='[TCoE]';
        nameLine.appendChild(nameSpan); nameLine.appendChild(srcBadge);
        nameWrap.appendChild(nameLine);
        if (feat.replaces) {
          const replLine = document.createElement('div');
          replLine.style.cssText='font-size:10px;color:var(--parchment-dim);margin-top:2px;';
          replLine.textContent = 'Replaces: ' + feat.replaces;
          nameWrap.appendChild(replLine);
        }
        // Info icon
        const infoIcon = document.createElement('span');
        infoIcon.textContent = 'ⓘ';
        infoIcon.style.cssText='font-size:12px;cursor:pointer;color:var(--gold);flex-shrink:0;margin-top:1px;';
        infoIcon.title = 'Click for details';
        infoIcon.addEventListener('click', e => { e.stopPropagation(); showPopup(feat.label, feat.desc, feat.src); });
        row.appendChild(btn); row.appendChild(nameWrap); row.appendChild(infoIcon);
        optCard.appendChild(row);
      }
      el.appendChild(optCard);
    }

    // Class features by level (clickable)
    if(cls.feats && Object.keys(cls.feats).length){
      const featCard=document.createElement('div'); featCard.className='card'; featCard.style.marginBottom='14px';
      const fhdr=document.createElement('div'); fhdr.style.cssText='display:flex;justify-content:space-between;align-items:center;cursor:pointer;';
      fhdr.innerHTML=`<div class="label" style="margin-bottom:0;">Class Features</div><span style="color:var(--parchment-dim);font-size:12px;" id="cls-feats-toggle">▶ Show</span>`;
      const fBody=document.createElement('div'); fBody.style.display='none'; fBody.style.marginTop='10px';
      let fOpen=false;
      fhdr.addEventListener('click',()=>{
        fOpen=!fOpen;
        fBody.style.display=fOpen?'block':'none';
        fhdr.querySelector('#cls-feats-toggle').textContent=fOpen?'▼ Hide':'▶ Show';
      });
      for(const [lvl,featureNames] of Object.entries(cls.feats).sort((a,b)=>parseInt(a)-parseInt(b))){
        const row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start;';
        const lvlSpan=document.createElement('span');
        lvlSpan.style.cssText="font-family:'Cinzel',serif;color:var(--gold);font-size:10px;min-width:28px;padding-top:2px;flex-shrink:0;";
        lvlSpan.textContent=`Lv${lvl}`;
        const namesSpan=document.createElement('span');
        featureNames.forEach((fname,i)=>{
          if(i>0){const sep=document.createElement('span');sep.textContent=', ';namesSpan.appendChild(sep);}
          // Substitute name if an enabled opt feature replaces this base feature
          const optRepl=(OPT_FEATURES[C.cls]||[]).find(f=>f.replaces===fname && C.optFeatures?.[f.key]);
          const displayName = optRepl ? optRepl.label : fname;
          const desc = optRepl ? optRepl.desc : CLASS_FEAT_DESC[fname];
          const src  = optRepl ? optRepl.src  : 'PHB';
          if(desc){
            const a=document.createElement('span');
            a.textContent=displayName;
            a.style.cssText='color:var(--gold);cursor:pointer;text-decoration:underline dotted;';
            if(optRepl) a.title='TCoE optional feature';
            a.addEventListener('click',e=>{e.stopPropagation();showPopup(displayName,desc,src);});
            namesSpan.appendChild(a);
          } else {
            const s=document.createElement('span');s.textContent=displayName;namesSpan.appendChild(s);
          }
        });
        row.appendChild(lvlSpan); row.appendChild(namesSpan);
        fBody.appendChild(row);
      }
      featCard.appendChild(fhdr); featCard.appendChild(fBody);
      el.appendChild(featCard);
    }

    // Class choice pickers (fighting style, expertise, metamagic, invocations, etc.)
    {
      const clsChoiceDefs = (CLASS_CHOICES[C.cls] || []).filter(e => {
        if ((e.counts[C.level-1]||0) === 0) return false;
        if (e.requiresChoice) {
          const dep = C.classChoices[e.requiresChoice.key] || [];
          if (dep.length === 0 && e.requiresChoice.isDefault) return true;
          if (!dep.includes(e.requiresChoice.value)) return false;
        }
        if (e.showWithOpt && !C.optFeatures?.[e.showWithOpt]) return false;
        if (e.hideWithOpt && C.optFeatures?.[e.hideWithOpt]) return false;
        return true;
      });
      if (clsChoiceDefs.length) {
        const clsChoiceCard = document.createElement('div'); clsChoiceCard.className='card'; clsChoiceCard.style.marginBottom='14px';
        clsChoiceCard.innerHTML = `<div class="label" style="margin-bottom:10px;">Class Choices</div>`;
        for (const entry of clsChoiceDefs) {
          const count = entry.counts[C.level-1] || 0;
          const chosen = C.classChoices[entry.key] || [];
          const sec = document.createElement('div'); sec.style.marginBottom='14px';
          const hdr = document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;';

      const scChoicesCard = document.createElement('div'); scChoicesCard.className='card'; scChoicesCard.style.marginBottom='14px';
      scChoicesCard.innerHTML = `<div class="label" style="margin-bottom:10px;">Subclass Choices</div>`;
      for (const entry of activeChoiceDefs) {
        const count = entry.counts[C.level-1] || 0;
        const chosen = C.subclassChoices[entry.key] || [];
        const sec = document.createElement('div'); sec.style.marginBottom='14px';

        // Header row: label + count badge
        const hdr = document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;';
